<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video 1 - Band</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow-x: hidden;
    
    /* خلفية متحركة */
    background: linear-gradient(-45deg, red, purple, #111);
    background-size: 400% 400%;
    animation: bgMove 8s infinite alternate;
}

@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

/* حاوية الفيديو */
.video-container {
    width: 100%;
    max-width: 800px;
    margin: 30px auto;
    position: relative;
}

/* iframe */
iframe {
    width: 100%;
    height: 450px;
    border-radius: 10px;
    border: none;
}

/* دائرة تحميل */
.loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 60px;
    height: 60px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    0% { transform: translate(-50%,-50%) rotate(0deg); }
    100% { transform: translate(-50%,-50%) rotate(360deg); }
}

/* أزرار المشاركة */
.share-box {
    text-align: center;
    margin-top: 15px;
}

.share-box button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-size: 16px;
}

.fb { background: #1877f2; }
.ms { background: #0084ff; }

</style>
</head>
<body>

<div class="video-container">

    <!-- دائرة تحميل -->
    <div class="loader" id="loader"></div>

    <!-- الفيديو -->
    <iframe id="videoFrame"
        src="https://player.vimeo.com/video/1180429598?title=0&byline=0&portrait=0&badge=0"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen>
    </iframe>

</div>

<!-- مشاركة -->
<div class="share-box">
    <button class="fb" onclick="shareFB()">مشاركة في فيسبوك</button>
    <button class="ms" onclick="shareMSG()">ارسال في ماسنجر</button>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>

let iframe = document.getElementById("videoFrame");
let player = new Vimeo.Player(iframe);
let loader = document.getElementById("loader");

/* بداية التحميل */
player.on('loadstart', function() {
    loader.style.display = "block";
});

/* عند التشغيل */
player.on('playing', function() {
    loader.style.display = "none";
});

/* عند التوقف المؤقت (ضعف الانترنت) */
player.on('waiting', function() {
    loader.style.display = "block";
});

/* مشاركة فيسبوك */
function shareFB(){
    let url = encodeURIComponent(window.location.href);
    window.open("https://www.facebook.com/sharer/sharer.php?u=" + url);
}

/* مشاركة ماسنجر */
function shareMSG(){
    let url = encodeURIComponent(window.location.href);
    window.open("https://www.facebook.com/dialog/send?link=" + url);
}

</script>

</body>
</html>
