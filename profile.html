<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Profile</title>
</head>

<body style="background:black; color:white; text-align:center;">

<h1>ملف المستخدم</h1>

<p id="userName"></p>

<script>

// 🔓 فك التشفير
function decodeUser(encoded) {
    return atob(encoded);
}

// 📥 جلب البيانات من الرابط
const params = new URLSearchParams(window.location.search);
const encoded = params.get("u");

if (encoded) {
    const username = decodeUser(encoded);
    document.getElementById("userName").innerText = "مرحبا " + username;
} else {
    document.getElementById("userName").innerText = "لا يوجد مستخدم";
}

</script>

</body>
</html>
