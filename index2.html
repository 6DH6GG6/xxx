<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio Mobile</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* BODY */
body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
}

/* 🔥 الجوانب المظللة */
body::before,
body::after{
content:"";
position:fixed;
top:0;
width:50px;
height:100%;
background:linear-gradient(to right, black, transparent);
z-index:5;
}

body::after{
right:0;
transform:scaleX(-1);
}

body::before{
left:0;
}

/* LOGO */
.logo{
width:250px;
margin-bottom:10px;
filter:drop-shadow(0 0 25px #00eaff);
}

/* 3D */
.character{
width:240px;
height:300px;
margin-bottom:10px;
}

/* MENU عمودي */
.menu{
display:flex;
flex-direction:column;
gap:15px;
}

/* BUTTON */
.btn{
width:260px;
height:120px;
background-size:cover;
background-position:center;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
position:relative;
}

/* overlay */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.btn span{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:16px;
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

</style>
</head>

<body>

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<model-viewer 
class="character"
src="3D/CT_1001_01_body_Color1.glb"
auto-rotate
camera-controls>
</model-viewer>

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')"><span>أنمي</span></div>
<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')"><span>فضائح عصابات</span></div>
<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')"><span>قوانين الدعس</span></div>
<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')"><span>ترسيم أعضاء</span></div>
<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')"><span>أسماء الظلال</span></div>
<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')"><span>تحميل ملفات</span></div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
