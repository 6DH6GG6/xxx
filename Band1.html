<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1 - ديناميت الذي يجعل الصمت يصبح انفجارًا</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: url('i-am-atomic.gif') center/cover no-repeat fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    color: white;
}

/* عنوان */
.title {
    margin: 20px 0;
    font-size: 28px;
    text-shadow: 0 0 10px black;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
    width: 100%;
    max-width: 900px;
}

/* المربعات */
.box {
    position: relative;
    width: 100%;
    padding-top: 100%; /* مربع */
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    background: #222;
    box-sizing: border-box;
}

/* تأثير GIF دائم على كامل المربع */
.box::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: url('fire-effect.gif') center/cover no-repeat; /* ضع هنا مسار GIF للنار */
    opacity: 0.7; /* دائم */
    pointer-events: none;
}

/* الصورة داخل المربع */
.box img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* عارض الصور */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
    margin-bottom: 20px;
}

.close-btn {
    padding: 12px 25px;
    font-size: 18px;
    background: linear-gradient(45deg, red, purple);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px red;
}
</style>
</head>
<body>

<div class="title">ديناميت الذي يجعل الصمت يصبح انفجارًا</div>

<div class="grid">
    <!-- 25 مربع PNG -->
    <div class="box"><img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png"></div>
    <div class="box"><img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png"></div>
    <div class="box"><img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png"></div>
    <div class="box"><img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png"></div>
    <div class="box"><img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png"></div>
    
    <div class="box"><img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png"></div>
    <div class="box"><img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png"></div>
    <div class="box"><img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png"></div>
    <div class="box"><img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png"></div>
    <div class="box"><img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png"></div>
</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeImg()">اغلاق ✕</button>
</div>

<script>
function openImg(el) {
    const img = el.querySelector("img");
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = img.dataset.full;
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
