<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القانون رقم 1</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: url('i-am-atomic.gif') center/cover no-repeat fixed;
}

/* العنوان */
.title {
    margin-top: 40px;
    font-size: 28px;
    color: white;
    text-shadow: 
        -2px -2px 0 black,
         2px -2px 0 black,
        -2px  2px 0 black,
         2px  2px 0 black,
         0 0 20px orange;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    0% { text-shadow: 0 0 5px orange, 0 0 10px orange; opacity: 0.6; }
    100% { text-shadow: 0 0 25px orange, 0 0 50px orange; opacity: 1; }
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 20px;
}

.box {
    width: 100%;
    padding-top: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.box img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="title">العابث الأخير في هاذا القرن</div>
