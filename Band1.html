<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
}

/* الحاوية */
.container {
    width: 420px;
    min-height: 100vh;
    background: url('20260404_185559.jpg') center/cover no-repeat fixed;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

/* المربعات */
.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* عارض الصور */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.viewer img,
.viewer video {
    max-width: 90%;
    max-height: 80%;
}

/* زر اغلاق */
.close-btn {
    margin-top: 10px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
}

/* زر دائري */
.menu-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 20px red;
}

.menu-btn img {
    width: 100%;
    height: 100%;
}

/* القائمة */
.menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    z-index: 1000;
    padding: 20px;
}

.menu-title {
    color: white;
    text-align: center;
    font-size: 24px;
}

.menu-box {
    background: black;
    margin: 10px;
    padding: 15px;
    color: white;
    text-align: center;
    border-radius: 10px;
    background-image: url('effect.gif');
    background-size: cover;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="grid">

<!-- صورك كما هي بدون حذف -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png">
</div>

</div>

</div>

<!-- العارض -->
<div class="viewer" id="viewer">
    <div id="content"></div>
    <button class="close-btn" onclick="closeViewer()">اغلاق ✕</button>
</div>

<!-- زر دائري -->
<div class="menu-btn" onclick="openMenu()">
<img src="menu.png">
</div>

<!-- القائمة -->
<div class="menu" id="menu">

<button onclick="closeMenu()">اغلاق ✕</button>

<div class="menu-title">ملفات انمي</div>

<div class="menu-box" onclick="downloadFile('naruto.zip')">انمي ناروتو</div>
<div class="menu-box" onclick="downloadFile('video.mp4')">فيديو</div>

</div>

<script>

/* فتح صورة */
function openImg(el) {
    let img = el.querySelector("img");

    document.getElementById("content").innerHTML =
        `<img src="${img.dataset.full}">`;

    document.getElementById("viewer").style.display = "flex";
}

/* اغلاق */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* القائمة */
function openMenu(){
    document.getElementById("menu").style.display = "block";
}
function closeMenu(){
    document.getElementById("menu").style.display = "none";
}

/* تحميل */
function downloadFile(file){
    let a = document.createElement("a");
    a.href = file;
    a.download = file;
    a.click();
}

</script>

</body>
</html>
