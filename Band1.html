<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1 - العابث الأخير</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: url('i-am-atomic.gif') center/cover no-repeat fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    color: white;
}

/* عنوان */
.title {
    margin: 20px 0;
    font-size: 28px;
    text-shadow: 0 0 10px black;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    padding: 10px;
    width: 100%;
    max-width: 1200px;
}

/* المربعات */
.box {
    position: relative;
    width: 100%;
    padding-top: 100%; /* مربع */
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    background: #222;
    transition: transform 0.3s;
}

.box:hover {
    transform: scale(1.1);
}

/* الصورة داخل المربع */
.box img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* تأثير GIF عند مرور الماوس */
.box::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url('effect.gif') center/cover no-repeat;
    opacity: 0;
    transition: opacity 0.3s;
}

.box:hover::after {
    opacity: 0.5;
}

/* عارض الصور */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
    margin-bottom: 20px;
}

.close-btn {
    padding: 12px 25px;
    font-size: 18px;
    background: linear-gradient(45deg, red, purple);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px red;
}

</style>
</head>
<body>

<div class="title">العابث الأخير - شبكة الصور</div>

<div class="grid">
    <!-- مثال على 20 مربع -->
    <div class="box" onclick="openImg(this)"><img src="1.png" data-full="1.png"></div>
    <div class="box" onclick="openImg(this)"><img src="2.png" data-full="2.png"></div>
    <div class="box" onclick="openImg(this)"><img src="3.png" data-full="3.png"></div>
    <div class="box" onclick="openImg(this)"><img src="4.png" data-full="4.png"></div>
    <div class="box" onclick="openImg(this)"><img src="5.png" data-full="5.png"></div>
    <div class="box" onclick="openImg(this)"><img src="6.png" data-full="6.png"></div>
    <div class="box" onclick="openImg(this)"><img src="7.png" data-full="7.png"></div>
    <div class="box" onclick="openImg(this)"><img src="8.png" data-full="8.png"></div>
    <div class="box" onclick="openImg(this)"><img src="9.png" data-full="9.png"></div>
    <div class="box" onclick="openImg(this)"><img src="10.png" data-full="10.png"></div>
    
    <div class="box" onclick="openImg(this)"><img src="11.png" data-full="11.png"></div>
    <div class="box" onclick="openImg(this)"><img src="12.png" data-full="12.png"></div>
    <div class="box" onclick="openImg(this)"><img src="13.png" data-full="13.png"></div>
    <div class="box" onclick="openImg(this)"><img src="14.png" data-full="14.png"></div>
    <div class="box" onclick="openImg(this)"><img src="15.png" data-full="15.png"></div>
    <div class="box" onclick="openImg(this)"><img src="16.png" data-full="16.png"></div>
    <div class="box" onclick="openImg(this)"><img src="17.png" data-full="17.png"></div>
    <div class="box" onclick="openImg(this)"><img src="18.png" data-full="18.png"></div>
    <div class="box" onclick="openImg(this)"><img src="19.png" data-full="19.png"></div>
    <div class="box" onclick="openImg(this)"><img src="20.png" data-full="20.png"></div>
</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeImg()">اغلاق ✕</button>
</div>

<script>
function openImg(el) {
    const img = el.querySelector("img");
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = img.dataset.full;
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
