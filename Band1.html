<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    font-family: Arial, sans-serif;
}
.container {
    width: 420px;
    min-height: 100vh;
    background: black;
    text-align: center;
    color: white;
}
.name { font-size: 28px; margin-top: 15px; color: red; text-shadow: 0 0 10px red; }
.desc { margin: 10px; color: #ccc; }
.title { font-size: 18px; margin-bottom: 10px; }

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    color: white;
}

.box img,
.box iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* طبقة كلمة فيديو */
#videoOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
}

/* أزرار الفيديو */
#videoControls {
    display:none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
}
#videoControls button {
    width:50px;
    height:50px;
    border-radius:50%;
    margin:5px;
    background:red;
    border:none;
    cursor:pointer;
    color:white;
    font-size:18px;
}

/* عارض الصور */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}
.viewer img { max-width: 90%; border-radius: 10px; }

.viewer .close-btn {
    position: absolute;
    bottom: 20px;
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* زر الرجوع */
#backToPage {
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* نافذة التأكيد */
#exitConfirm {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:2000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#exitConfirm div {
    background:#111;
    padding:30px;
    border-radius:12px;
}
#exitConfirm button {
    margin:5px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    color:white;
}
.yes { background:red; }
.no { background:gray; }

</style>
</head>

<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">

<!-- صور -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png">
</div>

<!-- فيديو -->
<div class="box" id="videoBox">
    <iframe id="vimeoVideo"
        src="https://player.vimeo.com/video/1180429598?autoplay=0&muted=0"
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen
        style="display:none;">
    </iframe>

    <div id="videoOverlay">فيديو</div>
</div>

</div>
</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeViewer()">اغلاق الصورة ✕</button>
</div>

<!-- أزرار الفيديو -->
<div id="videoControls">
    <button id="btnPlayPause">⏯️</button>
    <button id="btnOpenPage">🔗</button>
</div>

<!-- زر الرجوع -->
<button id="backToPage">الرجوع</button>

<!-- تأكيد الخروج -->
<div id="exitConfirm">
    <div>
        <p>هل أنت متأكد من أنك تريد الخروج من الموقع؟</p>
        <button class="yes">نعم</button>
        <button class="no">لا</button>
    </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>

let iframe = document.getElementById("vimeoVideo");
let player = new Vimeo.Player(iframe);
let overlay = document.getElementById("videoOverlay");
let controls = document.getElementById("videoControls");

/* فتح صورة */
function openImg(el){
    document.getElementById("viewerImg").src = el.querySelector("img").dataset.full;
    document.getElementById("viewer").style.display = "flex";
}
function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

/* تشغيل الفيديو */
document.getElementById("videoBox").onclick = function(){
    overlay.style.display = "none";
    iframe.style.display = "block";
    player.play();
    controls.style.display = "flex";
};

/* تشغيل / إيقاف */
document.getElementById("btnPlayPause").onclick = function(e){
    e.stopPropagation();
    player.getPaused().then(paused=>{
        if(paused) player.play();
        else player.pause();
    });
};

/* فتح صفحة الفيديو */
document.getElementById("btnOpenPage").onclick = function(e){
    e.stopPropagation();
    window.location.href = "Videio1_Band1.html";
};

/* زر الرجوع */
document.getElementById("backToPage").onclick = function(){
    document.getElementById("exitConfirm").style.display="flex";
};

document.querySelector(".yes").onclick = function(){
    window.location.href="index.html";
};

document.querySelector(".no").onclick = function(){
    document.getElementById("exitConfirm").style.display="none";
};

</script>

</body>
</html>
