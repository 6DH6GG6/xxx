<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
}

/* الحاوية */
.container {
    width: 420px;
    min-height: 100vh;
    background: black;
    text-align: center;
    color: white;
}

/* العناوين */
.name {
    font-size: 28px;
    margin-top: 15px;
    color: red;
    text-shadow: 0 0 10px red;
}

.desc { margin: 10px; color: #ccc; }
.title { font-size: 18px; margin-bottom: 10px; }

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

/* المربعات */
.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

.box img,
.box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* زر أسفل الموقع يظهر عند تشغيل الفيديو */
.bottom-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    font-size: 16px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    display: none;
    z-index: 999;
    cursor: pointer;
}

/* عارض الصور */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
}

/* زر اغلاق */
.close-btn {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">

<!-- صورة -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png">
</div>

<!-- فيديو -->
<div class="box video-box" onclick="toggleVideo(this)">
<video src="video.mp4"></video>
</div>

<!-- صور أخرى -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png">
</div>

</div>

</div>

<!-- العارض -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeViewer()">اغلاق ✕</button>
</div>

<!-- زر أسفل الموقع -->
<button class="bottom-btn" id="bottomBtn" onclick="openVideoPage('video.html')">فتح الفيديو كامل</button>

<script>
let currentVideo = null;

/* فتح صورة */
function openImg(el) {
    let img = el.querySelector("img");
    document.getElementById("viewerImg").src = img.dataset.full;
    document.getElementById("viewer").style.display = "flex";
}

/* اغلاق الصور */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* تشغيل/إيقاف الفيديو في المربع */
function toggleVideo(box) {
    let video = box.querySelector("video");
    let btn = document.getElementById("bottomBtn");

    if (currentVideo && currentVideo !== video) {
        currentVideo.pause(); // توقف أي فيديو آخر
    }

    if (video.paused) {
        video.play();
        btn.style.display = "block";
        currentVideo = video;
    } else {
        video.pause();
        btn.style.display = "none";
        currentVideo = null;
    }
}

/* فتح صفحة الفيديو كامل */
function openVideoPage(link) {
    window.location.href = link;
}
</script>

</body>
</html>
