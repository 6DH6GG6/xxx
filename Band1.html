<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
}

.container {
    width: 420px;
    min-height: 100vh;
    background: url('20260404_185559.jpg') center/cover no-repeat fixed;
    text-align: center;
    color: white;
}

.name {
    font-size: 28px;
    margin-top: 15px;
    color: red;
    text-shadow: 0 0 10px red;
}

.desc {
    margin: 10px;
    color: #ccc;
}

.title {
    font-size: 18px;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

.box img, .box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* زر فتح الفيديو */
.open-btn {
    position: absolute;
    bottom: 5px;
    left: 5px;
    right: 5px;
    padding: 5px;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 12px;
    border: none;
    border-radius: 6px;
}

/* العارض */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
}

/* أزرار */
.btns button {
    margin: 5px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
}
</style>

</head>

<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">

<!-- صورة -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-type="img" data-full="Screenshot_20260329-103054.png">
</div>

<!-- فيديو -->
<div class="box">

<video src="video1.mp4" muted loop autoplay></video>

<button class="open-btn" onclick="openVideoPage(event, 'video.html')">
فتح الفيديو
</button>

</div>

<!-- باقي صورك -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181836.png" data-type="img" data-full="Screenshot_20260329-181836.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093641.png" data-type="img" data-full="Screenshot_20260401-093641.png">
</div>

</div>

</div>

<!-- العارض -->
<div class="viewer" id="viewer">
    <img id="viewerImg">

    <div class="btns">
        <button onclick="shareImg()">مشاركة</button>
        <button onclick="closeViewer()">اغلاق ✕</button>
    </div>
</div>

<script>

let currentImg = "";

/* فتح صورة */
function openImg(el) {
    let img = el.querySelector("img");

    currentImg = img.dataset.full;

    document.getElementById("viewerImg").src = currentImg;
    document.getElementById("viewer").style.display = "flex";
}

/* اغلاق */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* مشاركة */
function shareImg() {
    let url = window.location.origin + "/" + currentImg;

    if (navigator.share) {
        navigator.share({ url });
    } else {
        window.open("https://www.facebook.com/sharer/sharer.php?u=" + url);
    }
}

/* فتح صفحة فيديو */
function openVideoPage(e, link) {
    e.stopPropagation(); // يمنع فتح الصورة
    window.location.href = link;
}

</script>

</body>
</html>
