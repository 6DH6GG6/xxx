<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    font-family: Arial, sans-serif;
}

/* الحاوية */
.container {
    width: 420px;
    min-height: 100vh;
    background: black;
    text-align: center;
    color: white;
}

/* العناوين */
.name { font-size: 28px; margin-top: 15px; color: red; text-shadow: 0 0 10px red; }
.desc { margin: 10px; color: #ccc; }
.title { font-size: 18px; margin-bottom: 10px; }

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

/* المربعات */
.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

.box img,
.box iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* زر أسفل الموقع يظهر عند تشغيل الفيديو */
.bottom-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    font-size: 16px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    display: none;
    z-index: 999;
    cursor: pointer;
}

/* عارض الصور */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

/* صورة العارض */
.viewer img {
    max-width: 90%;
    border-radius: 10px;
    position: relative;
}

/* زر اغلاق داخل العارض */
.viewer .close-btn {
    position: absolute;
    bottom: 20px;
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    z-index: 1001;
}

/* نافذة تأكيد الخروج */
#exitConfirm {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:2000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

#exitConfirm div {
    background:#111;
    padding:30px;
    border-radius:12px;
    text-align:center;
}

#exitConfirm p {
    font-size:18px;
    margin-bottom:20px;
}

#exitConfirm button {
    margin:5px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

#exitConfirm button.yes { background:red; }
#exitConfirm button.no { background:gray; }
</style>
</head>

<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">

<!-- صور -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png">
</div>

<!-- فيديو Vimeo -->
<div class="box video-box" onclick="toggleVideo(this)">
<iframe id="vimeoVideo" src="https://player.vimeo.com/video/1180429598?background=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<!-- باقي الصور -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png">
</div>

</div>
</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeViewer()">اغلاق الصورة ✕</button>
</div>

<!-- زر أسفل الموقع -->
<button class="bottom-btn" id="bottomBtn" onclick="openVideoPage('video.html')">فتح الفيديو كامل</button>

<!-- نافذة تأكيد الخروج -->
<div id="exitConfirm">
    <div>
        <p>هل أنت متأكد من أنك تريد الخروج من الموقع؟</p>
        <button class="yes" onclick="exitSite()">نعم</button>
        <button class="no" onclick="closeExitConfirm()">لا</button>
    </div>
</div>

<script>
let vimeoPlaying = false;

/* فتح صورة */
function openImg(el) {
    let img = el.querySelector("img");
    document.getElementById("viewerImg").src = img.dataset.full;
    document.getElementById("viewer").style.display = "flex";
}

/* اغلاق الصور */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* تشغيل/إيقاف الفيديو في المربع */
function toggleVideo(box) {
    let iframe = box.querySelector("iframe");
    let btn = document.getElementById("bottomBtn");

    if (!vimeoPlaying) {
        iframe.src = "https://player.vimeo.com/video/1180429598?autoplay=1";
        btn.style.display = "block";
        vimeoPlaying = true;
    } else {
        iframe.src = "https://player.vimeo.com/video/1180429598?background=1";
        btn.style.display = "none";
        vimeoPlaying = false;
    }
}

/* فتح صفحة الفيديو كامل */
function openVideoPage(link) {
    window.location.href = link;
}

/* زر الرجوع */
window.addEventListener("popstate", function(event) {
    showExitConfirm();
});
history.pushState({}, "");

function showExitConfirm(){
    document.getElementById("exitConfirm").style.display = "flex";
}

function closeExitConfirm(){
    document.getElementById("exitConfirm").style.display = "none";
    history.pushState({}, "");
}

function exitSite(){
    window.location.href = "about:blank";
}
</script>

</body>
</html>
