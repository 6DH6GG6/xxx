<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القانون رقم 1</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    text-align: center;
    overflow-x: hidden;
}

/* تشغيل الموسيقى تلقائي */
audio {
    display: none;
}

/* العنوان */
.title {
    margin-top: 20px;
    font-size: 28px;
    color: white;
    text-shadow: 
        -2px -2px 0 black,
         2px -2px 0 black,
        -2px  2px 0 black,
         2px  2px 0 black,
         0 0 20px orange;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    0% { text-shadow: 0 0 5px orange, 0 0 10px orange; opacity: 0.6; }
    100% { text-shadow: 0 0 25px orange, 0 0 50px orange; opacity: 1; }
}

/* شبكة الصور */
.grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    padding: 20px;
}

/* المربعات */
.box {
    position: relative;
    width: 100%;
    padding-top: 100%; /* نسبه مربعة */
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
}

/* صورة PNG */
.box img.png-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
}

/* تأثير GIF */
.box img.gif-effect {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* عارض الصور */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* زر اغلاق */
.close-btn {
    padding: 15px 30px;
    font-size: 18px;
    background: linear-gradient(45deg, red, purple);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 15px red;
}

/* تأثير تكبير عند المرور */
.box:hover img.png-img {
    transform: scale(1.1);
    transition: transform 0.3s;
}

</style>
</head>
<body>

<!-- تشغيل الموسيقى -->
<audio autoplay loop>
    <source src="💜 ♪ 𝑺 𝒊 𝒏 𝒈 ♪ 💜.mp3" type="audio/mpeg">
</audio>

<div class="title">العابث الأخير - صور</div>

<div class="grid">
    <!-- مثال أول 10 مربعات -->
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="1.png">
        <img class="gif-effect" src="effect1.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="2.png">
        <img class="gif-effect" src="effect2.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="3.png">
        <img class="gif-effect" src="effect3.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="4.png">
        <img class="gif-effect" src="effect4.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="5.png">
        <img class="gif-effect" src="effect5.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="6.png">
        <img class="gif-effect" src="effect6.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="7.png">
        <img class="gif-effect" src="effect7.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="8.png">
        <img class="gif-effect" src="effect8.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="9.png">
        <img class="gif-effect" src="effect9.gif">
    </div>
    <div class="box" onclick="openImg(this)">
        <img class="png-img" src="10.png">
        <img class="gif-effect" src="effect10.gif">
    </div>
</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeImg()">اغلاق ✕</button>
</div>

<script>
function openImg(el) {
    const img = el.querySelector(".png-img");
    const viewer = document.getElementById("viewer");
    const viewerImg = document.getElementById("viewerImg");
    viewerImg.src = img.src;
    viewer.style.display = "flex";
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
