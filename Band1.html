<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    font-family: Arial, sans-serif;
}
.container {
    width: 420px;
    min-height: 100vh;
    background: black;
    text-align: center;
    color: white;
}
.name { font-size: 28px; margin-top: 15px; color: red; text-shadow: 0 0 10px red; }
.desc { margin: 10px; color: #ccc; }
.title { font-size: 18px; margin-bottom: 10px; }
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}
.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}
.box img,
.box iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}
.viewer img { max-width: 90%; border-radius: 10px; position: relative; }
.viewer .close-btn {
    position: absolute;
    bottom: 20px;
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    z-index: 1001;
}
#exitConfirm {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:2000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}
#exitConfirm div { background:#111; padding:30px; border-radius:12px; text-align:center; }
#exitConfirm p { font-size:18px; margin-bottom:20px; }
#exitConfirm button { margin:5px; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; color:white; }
#exitConfirm button.yes { background:red; }
#exitConfirm button.no { background:gray; }
#videoControls {
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:999;
}
#videoControls button {
    width:50px; height:50px; border-radius:50%; margin:5px; background:red; border:none; cursor:pointer; color:white; font-size:18px;
}
#backToPage {
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    font-size:16px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    z-index:999;
}
</style>
</head>
<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png"></div>

<!-- فيديو Vimeo -->
<div class="box video-box" onclick="startVideo()">
<iframe id="vimeoVideo" src="https://player.vimeo.com/video/1180429598?background=1&muted=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<div class="box" onclick="openImg(this)"><img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png"></div>
<div class="box" onclick="openImg(this)"><img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png"></div>

</div>
</div>

<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeViewer()">اغلاق الصورة ✕</button>
</div>

<div id="videoControls">
    <button id="btnLeft">⏯️</button>
    <button id="btnCenter">🔗</button>
    <button id="btnRight">🔇</button>
</div>

<button id="backToPage">الرجوع</button>

<div id="exitConfirm">
    <div>
        <p>هل أنت متأكد من أنك تريد الخروج من الموقع؟</p>
        <button class="yes">نعم</button>
        <button class="no">لا</button>
    </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
let iframe = document.getElementById("vimeoVideo");
let player = new Vimeo.Player(iframe);
let videoControls = document.getElementById("videoControls");
let vimeoPlaying = false;
let videoMuted = false;

/* فتح صورة */
function openImg(el) {
    document.getElementById("viewerImg").src = el.querySelector("img").dataset.full;
    document.getElementById("viewer").style.display = "flex";
}
function closeViewer() { document.getElementById("viewer").style.display = "none"; }

/* تشغيل الفيديو وعرض الأزرار */
function startVideo() {
    player.play().then(() => {
        videoControls.style.display = "flex";
        vimeoPlaying = true;
    }).catch(() => { console.log("خطأ في تشغيل الفيديو"); });
}

/* زر يسار ⏯️ */
document.getElementById("btnLeft").onclick = function() {
    player.getPaused().then(paused => {
        if(paused) player.play();
        else player.pause();
    });
};

/* زر يمين 🔇 */
document.getElementById("btnRight").onclick = function() {
    videoMuted = !videoMuted;
    if(videoMuted) player.setVolume(0);
    else player.setVolume(1);
};

/* زر وسط 🔗 */
document.getElementById("btnCenter").onclick = function() {
    window.location.href = "مسار.html";
};

/* زر الرجوع المستطيل */
document.getElementById("backToPage").onclick = function() {
    document.getElementById("exitConfirm").style.display = "flex";
};
document.querySelector("#exitConfirm .yes").onclick = function() { window.location.href="مسار.html"; };
document.querySelector("#exitConfirm .no").onclick = function() { document.getElementById("exitConfirm").style.display="none"; };

/* زر الرجوع الافتراضي */
let backPressed = false;
history.pushState({page:1},"");
window.addEventListener('popstate', function(event){
    if(!backPressed){
        document.getElementById("exitConfirm").style.display = "flex";
        history.pushState({page:1},"");
        backPressed = true;
    } else { history.back(); }
});
</script>

</body>
</html>
