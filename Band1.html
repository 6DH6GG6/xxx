<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 1</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
}

/* الحاوية */
.container {
    width: 420px;
    min-height: 100vh;
    background: black;
    text-align: center;
    color: white;
}

/* العناوين */
.name {
    font-size: 28px;
    margin-top: 15px;
    color: red;
    text-shadow: 0 0 10px red;
}

.desc { margin: 10px; color: #ccc; }
.title { font-size: 18px; margin-bottom: 10px; }

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

/* المربعات */
.box {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

.box img,
.box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* زر حر */
.floating-btn {
    position: absolute;
    bottom: 6px;
    right: 6px;
    padding: 5px 8px;
    font-size: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    border-radius: 6px;
    display: none;
}

/* يظهر عند تشغيل الفيديو */
.video-box.active .floating-btn {
    display: block;
}

/* عارض الصور */
.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.viewer img {
    max-width: 90%;
}

/* زر اغلاق */
.close-btn {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
}
</style>

</head>

<body>

<div class="container">

<div class="name">اسم الموقع</div>
<div class="desc">هذا وصف الموقع</div>
<div class="title">عنوان الصفحة</div>

<div class="grid">

<!-- صورة -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-103054.png" data-full="Screenshot_20260329-103054.png">
</div>

<!-- فيديو -->
<div class="box video-box" onclick="toggleVideo(this)">

<video src="video.mp4"></video>

<button class="floating-btn" onclick="openVideoPage(event, 'video.html')">
فتح
</button>

</div>

<!-- صور -->
<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181836.png" data-full="Screenshot_20260329-181836.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093641.png" data-full="Screenshot_20260401-093641.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203417.png" data-full="Screenshot_20260401-203417.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758.png" data-full="Screenshot_20260401-093758.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-183322.png" data-full="Screenshot_20260329-183322.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-093758~2.png" data-full="Screenshot_20260401-093758~2.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260401-203547.png" data-full="Screenshot_20260401-203547.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-210804.png" data-full="Screenshot_20260329-210804.png">
</div>

<div class="box" onclick="openImg(this)">
<img src="Screenshot_20260329-181240.png" data-full="Screenshot_20260329-181240.png">
</div>

</div>

</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer">
    <img id="viewerImg">
    <button class="close-btn" onclick="closeViewer()">اغلاق ✕</button>
</div>

<script>

/* فتح صورة */
function openImg(el) {
    let img = el.querySelector("img");

    document.getElementById("viewerImg").src = img.dataset.full;
    document.getElementById("viewer").style.display = "flex";
}

/* اغلاق */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* تشغيل فيديو */
function toggleVideo(box) {
    let video = box.querySelector("video");

    if (video.paused) {
        video.muted = false;
        video.play();
        box.classList.add("active");
    } else {
        video.pause();
        box.classList.remove("active");
    }
}

/* فتح صفحة */
function openVideoPage(e, link) {
    e.stopPropagation();
    window.location.href = link;
}

</script>

</body>
</html>
