<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0b0f1a;
color:white;
overflow:hidden;
}

/* ===== العنوان الفخم ===== */
.title{
font-size:60px;
font-weight:bold;
letter-spacing:4px;

background:linear-gradient(
to bottom,
#ffffff 0%,
#d6d6d6 30%,
#999 50%,
#ffffff 70%,
#aaa 100%
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
-webkit-text-stroke:2px #000;

text-shadow:
0 2px 0 #000,
0 4px 10px rgba(0,0,0,0.8),
0 0 20px #00eaff;

animation:shine 3s infinite linear;
}

@keyframes shine{
0%{filter:brightness(1);}
50%{filter:brightness(1.4);}
100%{filter:brightness(1);}
}

/* SHADOW */
.subtitle{
font-size:28px;
letter-spacing:6px;
margin-bottom:40px;
color:#00eaff;

text-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;
}

/* ===== الشبكة ===== */
.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

.row{
display:flex;
gap:25px;
}

.row.bottom{
margin-top:-60px;
}

/* ===== الزر السداسي ===== */
.hex-btn{
width:230px;
height:260px;

clip-path:polygon(
50% 0%,
100% 25%,
100% 75%,
50% 100%,
0% 75%,
0% 25%
);

position:relative;
cursor:pointer;
overflow:hidden;
transition:.3s;

/* إطار */
box-shadow:0 0 15px #00eaff;
}

/* صورة */
.hex-btn img{
width:100%;
height:100%;
object-fit:cover;
}

/* طبقة تدرج */
.hex-btn::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* النص */
.hex-btn span{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-weight:bold;
font-size:18px;
text-shadow:0 0 10px black;
}

/* hover */
.hex-btn:hover{
transform:scale(1.08);
filter:brightness(1.2);
box-shadow:0 0 40px #00eaff;
}

/* ===== overlay ===== */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* زر START */
.start{
padding:15px 40px;
background:#00eaff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* 📱 موبايل */
@media(max-width:768px){

.row{
flex-direction:column;
}

.row.bottom{
margin-top:0;
}

.hex-btn{
width:80%;
height:200px;
}

.title{
font-size:30px;
}

.subtitle{
font-size:18px;
}
}
</style>
</head>

<body>

<h1 class="title">KAGE NO TEIO</h1>
<h2 class="subtitle">( SHADOW )</h2>

<div class="menu">

<!-- الصف العلوي -->
<div class="row">
<div class="hex-btn" onclick="go('index.html')">
<img src="team.jpg">
<span>قاعدة بيانات</span>
</div>

<div class="hex-btn" onclick="go('index.html')">
<img src="story.jpg">
<span>تحميل ملفات</span>
</div>

<div class="hex-btn" onclick="openMembers()">
<img src="challenge.jpg">
<span>أسماء الأعضاء</span>
</div>
</div>

<!-- الصف السفلي -->
<div class="row bottom">
<div class="hex-btn" onclick="openJoin()">
<img src="arena.jpg">
<span>تسجيل الإنضمام</span>
</div>

<div class="hex-btn" onclick="go('index.html')">
<img src="fairplay.jpg">
<span>فضائح عصابات</span>
</div>

<div class="hex-btn" onclick="go('index.html')">
<img src="training.jpg">
<span>قوانين الدعس</span>
</div>
</div>

</div>

<!-- قائمة الأعضاء -->
<div class="overlay" id="members">
<h2>أعضاء الطائفة</h2>
</div>

<!-- تسجيل -->
<div class="overlay" id="join">
<h2>انضمام لطائفة الظلام</h2>
<button class="start" onclick="start()">START</button>
</div>

<script>
function go(page){
window.location=page;
}

function openMembers(){
document.getElementById("members").style.display="flex";
}

function openJoin(){
document.getElementById("join").style.display="flex";
}

function start(){
fetch('/api/send', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status:"join_request"})
});
alert("تم الإرسال");
}
</script>

</body>
</html>
