<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXORA</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Tahoma", sans-serif;
}

body {
    background: linear-gradient(135deg, #000000, #1a0000, #330000);
    color: white;
}

/* النافبار */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
}

.logo {
    font-size: 24px;
    color: gold;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 25px;
}

.menu a {
    color: #ccc;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    color: gold;
}

.login-btn {
    padding: 10px 20px;
    background: #8b0000;
    border-radius: 8px;
    color: white;
    border: none;
    cursor: pointer;
}

/* القسم الرئيسي */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero-content {
    max-width: 600px;
}

.hero h1 {
    font-size: 50px;
    color: gold;
}

.hero p {
    margin: 20px 0;
    color: #ccc;
}

/* الأزرار */
.buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
}

.primary {
    background: #b30000;
    color: white;
}

.secondary {
    background: transparent;
    border: 1px solid gold;
    color: gold;
}

.btn:hover {
    transform: scale(1.05);
}

/* تصميم الهاتف */
@media(max-width: 768px) {
    nav {
        padding: 15px;
    }

    .menu {
        display: none;
    }

    .hero h1 {
        font-size: 35px;
    }
}
</style>

</head>
<body>

<nav>
    <div class="logo">LUXORA</div>

    <div class="menu">
        <a href="#">الرئيسية</a>
        <a href="#">خدماتنا</a>
        <a href="#">المتجر</a>
        <a href="#">من نحن</a>
        <a href="#">تواصل</a>
    </div>

    <button class="login-btn">تسجيل الدخول</button>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>مرحباً بك في LUXORA</h1>
        <p>أسلوب حياة فاخر وتجربة استثنائية</p>

        <div class="buttons">
            <button class="btn primary">استكشف الآن</button>
            <button class="btn secondary">إنشاء حساب</button>
            <button class="btn secondary">تسجيل الدخول</button>
        </div>
    </div>
</section>

</body>
</html>
