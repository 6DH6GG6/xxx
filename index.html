<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Shadow Gate</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Tahoma;

    /* 🔴 خلفية حمراء قوية */
    background: radial-gradient(circle at center, #ff0000 0%, #2b0000 40%, #000 100%);
}

/* =========================
   3D SCENE
========================= */
#scene {
    width: 100vw;
    height: 100vh;
    position: fixed;
    inset: 0;
}

/* =========================
   PASSWORD UI
========================= */
#lockScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 10px;
}

input {
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #111;
    color: white;
    text-align: center;
    width: 220px;
}

button {
    padding: 10px 20px;
    background: darkred;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#msg {
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- 3D SCENE -->
<div id="scene"></div>

<!-- PASSWORD UI -->
<div id="lockScreen">
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="checkPass()">OK</button>
    <div id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let model;
let doorLeft, doorRight;
let selected = false;

/* =========================
   INIT SCENE
========================= */
function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("scene").appendChild(renderer.domElement);

    // 🔥 إضاءة قوية
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 5, 5);
    scene.add(light);

    const loader = new THREE.GLTFLoader();

    loader.load(
        "ALBOMS/3D/GLB/gate_renamed.glb",
        function(gltf) {

            model = gltf.scene;

            model.scale.set(2,2,2);
            model.position.set(0,-1,0);

            scene.add(model);

            // أبواب
            doorLeft = model.getObjectByName("Door_Left");
            doorRight = model.getObjectByName("Door_Right");

            animate();
        }
    );

    camera.position.z = 4;
}

/* =========================
   RENDER LOOP
========================= */
function animate() {
    requestAnimationFrame(animate);

    // دوران خفيف قبل التفاعل
    if (model && !selected) {
        model.rotation.y += 0.002;
    }

    renderer.render(scene, camera);
}

init();

/* =========================
   فتح نافذة كلمة السر
========================= */
window.addEventListener("click", () => {

    if (!selected) {
        selected = true;
        document.getElementById("lockScreen").style.display = "flex";
    }
});

/* =========================
   التحقق من كلمة السر
========================= */
function checkPass() {

    const pass = document.getElementById("pass").value;
    const msg = document.getElementById("msg");

    if (pass === "shadow") {

        msg.innerText = "✔ Opening Gate...";

        setTimeout(() => {
            document.getElementById("lockScreen").style.display = "none";
            openDoor();
        }, 800);

    } else {
        msg.innerText = "❌ Wrong Password";
    }
}

/* =========================
   فتح الباب (يمين + يسار)
========================= */
function openDoor() {

    let t = 0;

    function anim() {

        t += 0.02;

        if (doorLeft) {
            doorLeft.position.x = -t * 2;
            doorLeft.rotation.y = t;
        }

        if (doorRight) {
            doorRight.position.x = t * 2;
            doorRight.rotation.y = -t;
        }

        if (t < 1) {
            requestAnimationFrame(anim);
        }
    }

    anim();
}

</script>

</body>
</html>
