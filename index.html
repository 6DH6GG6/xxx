<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الجحيم</title>
<style>
/* ريسيت الصفحة */
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,sans-serif}
body{background:#000;overflow:hidden}

/* شاشة سوداء البداية */
.black-screen{position:fixed;inset:0;background:#000;z-index:50000;transition:opacity 1s ease}
.black-screen.hidden{opacity:0;pointer-events:none}

/* شاشة البوابة الكاملة */
.portal-screen{position:fixed;inset:0;z-index:40000;background:url('ALBOMS/IMAGE/SiteBackground/file_000000006e2c722f9a965efdf432912b.png') center/cover no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 1s ease}
.portal-screen.show{opacity:1}
.portal-screen.hidden{opacity:0;pointer-events:none}

/* اسم المملكة يتنفس */
.kingdom-title{font-size:38px;color:#ff0000;text-shadow:0 0 30px #ff0000;margin-bottom:30px;animation:kingdomBreath 4s ease-in-out infinite}
@keyframes kingdomBreath{0%,100%{opacity:0.3}50%{opacity:1}}

/* حاوية الباب */
.door-container{position:relative;width:320px;height:420px;cursor:pointer;transition:transform 0.3s ease}
.door-container.selected{transform:scale(1.05)}
.door-container model-viewer{width:100%;height:100%}

/* نص تحت الباب */
.portal-warning{margin-top:25px;color:#ff0000;font-size:19px;font-weight:bold;text-shadow:0 0 15px #ff0000;text-align:center;animation:glowText 2s ease-in-out infinite alternate}
@keyframes glowText{from{text-shadow:0 0 10px #ff0000}to{text-shadow:0 0 25px #ff0000,0 0 35px #ff0000}}

/* قائمة الدخول الفخمة */
.shadow-form{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:400px;background:rgba(0,0,0,0.95);border:3px solid #ff0000;box-shadow:0 0 50px #ff0000;padding:25px;z-index:41000;display:none}
.shadow-form.active{display:block}
.shadow-form h2{color:#ff0000;text-align:center;margin-bottom:15px;text-shadow:0 0 10px #ff0000}
.shadow-form input,.shadow-form select{width:100%;padding:12px;margin:10px 0;background:#1a0000;border:2px solid #ff0000;color:#ff0000;font-size:16px;outline:none}
.shadow-form input::placeholder{color:#8b0000}
.shadow-form button{width:100%;padding:15px;background:#8b0000;border:2px solid #ff0000;color:#fff;font-size:18px;cursor:pointer;margin-top:15px;transition:0.3s}
.shadow-form button:hover{background:#ff0000;box-shadow:0 0 20px #ff0000}

/* قائمة الطرد */
.ban-form{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:450px;background:rgba(0,0,0,0.98);border:3px solid #ff0000;box-shadow:0 0 60px #ff0000;padding:30px;z-index:41000;text-align:center;display:none}
.ban-form.active{display:block}
.ban-form h2{color:#ff0000;margin-bottom:15px}
.ban-form p{color:#ff0000;margin:15px 0;line-height:1.6}

/* الموقع الرئيسي */
.main-site{position:fixed;inset:0;background:#111;display:none;z-index:1000;overflow:auto}
.main-site.active{display:block}
.main-site-content{padding:50px;color:#ff0000;text-align:center;font-size:24px}

/* صندوق عرض أسماء الأجزاء */
.debug-names{position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.9);border:1px solid #ff0000;color:#0f0;padding:10px;font-size:12px;max-width:300px;max-height:200px;overflow:auto;z-index:60000;font-family:monospace;display:none}
.debug-names.active{display:block}
</style>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

<div class="black-screen" id="blackScreen"></div>
<div class="debug-names" id="debugNames"></div>

<div class="portal-screen" id="portalScreen">
<div class="kingdom-title">مملكة طائفة الظلام</div>
<div class="door-container" id="doorContainer">
<model-viewer id="gateModel" src="ALBOMS/3D/GLB/بوابة_العبور.glb" camera-controls disable-zoom disable-pan interaction-prompt="none" style="background:transparent"></model-viewer>
</div>
<div class="portal-warning">لا يمكنك زيارة المملكة ما لم تعبر بوابة الجحيم (سالمًا)</div>
</div>

<div class="shadow-form" id="shadowForm">
<h2>💀 عرف من أنت 💀</h2>
<input type="text" id="userName" placeholder="الاسم" required>
<input type="password" id="userPass" placeholder="كلمة السر" required>
<label style="color:#ff0000;display:block;margin-top:10px">سؤال: هل أنت من ظلال الجحيم؟</label>
<select id="userAnswer" required>
<option value="">اختر...</option>
<option value="نعم">نعم</option>
<option value="لا">لا</option>
<option value="ناه">ناه</option>
<option value="ربما">ربما</option>
</select>
<button onclick="checkShadowAccess()">دخول</button>
</div>

<div class="ban-form" id="banForm">
<h2>❌ تم طردك من قبل الحراس</h2>
<p>أنت مجرد نكرة ولست مؤهلاً لتزور مملكة أعلى منك مقامًا</p>
<p>تم حظرك نهائياً من البوابة</p>
</div>

<div class="main-site" id="mainSite">
<div class="main-site-content">
<h1>مرحباً بك في مملكة طائفة الظلام</h1>
<p>لقد عبرت بوابة الجحيم بنجاح</p>
</div>
</div>

<audio id="clickSound" src="ALBOMS/VIDEIOS/km_20260504_1080p_30f_20260504_220606.mp4"></audio>
<audio id="openSound" src="ALBOMS/AUDIOS/MP3/screen-20260502-213818.mp3"></audio>
<audio id="mainMusic" src="ALBOMS/AUDIOS/MP3/km_20260504_1080p_30f_20260504_223643.mp3" loop></audio>

<script>
/* متغيرات عامة للتحكم */
let doorL = null, doorR = null, gateOpened = false;
const correctPassword = "الظلال666";
const correctAnswer = "ناه";

/* فحص الحظر عند تحميل الصفحة */
function checkBanStatus(){
if(localStorage.getItem('hellGateBanned') === 'true'){
document.getElementById('banForm').classList.add('active');
document.getElementById('portalScreen').classList.add('show');
return true;
}
return false;
}

/* بدء تسلسل ظهور البوابة */
function initPortalSequence(){
if(checkBanStatus()) return;
setTimeout(()=>{
document.getElementById('blackScreen').classList.add('hidden');
setTimeout(()=>{
document.getElementById('portalScreen').classList.add('show');
setupGateModel();
},1000);
},1000);
}

/* طباعة كل أسماء الأجزاء داخل الموديل عشان نعرف اسم البابين */
function logAllMeshNames(model){
const debugBox = document.getElementById('debugNames');
debugBox.classList.add('active');
let names = 'أسماء الأجزاء داخل الـ GLB:<br>';
model.traverse((obj)=>{
if(obj.name){
names += obj.name + '<br>';
console.log('Mesh Name:', obj.name);
const lower = obj.name.toLowerCase();
if(lower.includes("door") || lower.includes("gate") || lower.includes("باب")){
names += '← احتمال باب<br>';
}
}
});
debugBox.innerHTML = names + '<br>افتح Console F12 وشوف الأسماء';
}

/* تجهيز موديل البوابة وتحديد الأبواب */
function setupGateModel(){
const modelViewer = document.getElementById('gateModel');
modelViewer.addEventListener('load', ()=>{
const model = modelViewer.model;
if(model){
logAllMeshNames(model);
model.traverse((obj)=>{
const name = obj.name.toLowerCase();
if(name.includes("door_l") || name.includes("left") || name.includes("l_door") || name.includes("leftdoor") || name.includes("doorleft")) doorL = obj;
if(name.includes("door_r") || name.includes("right") || name.includes("r_door") || name.includes("rightdoor") || name.includes("doorright")) doorR = obj;
if(name === "door1" || name === "door01") doorL = obj;
if(name === "door2" || name === "door02") doorR = obj;
});
if(!doorL || !doorR){
console.log('doorL:', doorL, 'doorR:', doorR);
alert('ما لقيت الأبواب. شوف المربع الأخضر فوق يسار أو Console واعطيني اسم البابين');
}
}
});
document.getElementById('doorContainer').addEventListener('click', activateDoor);
}

/* تفعيل البوابة عند الضغط */
function activateDoor(){
if(gateOpened) return;
document.getElementById('clickSound').play();
document.getElementById('doorContainer').classList.add('selected');
setTimeout(()=>{
document.getElementById('shadowForm').classList.add('active');
},500);
}

/* فحص بيانات الدخول */
function checkShadowAccess(){
const name = document.getElementById('userName').value.trim();
const pass = document.getElementById('userPass').value.trim();
const answer = document.getElementById('userAnswer').value;
if(!name || !pass || !answer){
alert('املأ كل الحقول');
return;
}
if(pass === correctPassword && answer === correctAnswer){
document.getElementById('shadowForm').classList.remove('active');
openKingdomGate();
}else{
document.getElementById('shadowForm').classList.remove('active');
localStorage.setItem('hellGateBanned','true');
document.getElementById('banForm').classList.add('active');
}
}

/* فتح بوابة المملكة بأنيميشن */
function openKingdomGate(){
if(gateOpened) return;
gateOpened = true;
document.getElementById('openSound').play();
if(!doorL || !doorR){
alert('الأبواب غير محددة. لازم تجيب لي الأسماء من المربع الأخضر');
return;
}
const duration = 5000;
const startTime = performance.now();
const doorLStart = doorL.rotation.y;
const doorRStart = doorR.rotation.y;
function animateDoors(currentTime){
const elapsed = currentTime - startTime;
const progress = Math.min(elapsed / duration, 1);
const angle = progress * (Math.PI / 2);
doorL.rotation.y = doorLStart + angle;
doorR.rotation.y = doorRStart - angle;
if(progress < 1){
requestAnimationFrame(animateDoors);
}else{
setTimeout(()=>{
document.getElementById('portalScreen').classList.add('hidden');
document.getElementById('mainSite').classList.add('active');
document.getElementById('mainMusic').play();
},500);
}
}
requestAnimationFrame(animateDoors);
}

/* تشغيل التسلسل عند تحميل الصفحة */
window.addEventListener('DOMContentLoaded', initPortalSequence);
</script>
</body>
</html>
