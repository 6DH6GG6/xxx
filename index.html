<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kage No Teio - GLB Gate</title>
    <style>
        /* ========================================
           1. GLOBAL + RESET
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma;
        }

        body {
            min-height: 100vh;
            background: black;
            color: white;
            overflow: hidden;
        }

        /* ========================================
           2. KEYFRAMES
        ======================================== */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
        }

        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           3. DOOR SCREEN - شاشة الباب 3D
        ======================================== */
        .door-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #doorCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .password-box {
            position: absolute;
            bottom: 15%;
            display: flex;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.4s;
            z-index: 10001;
        }

        .password-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .password-box input {
            padding: 12px 20px;
            border: 2px solid #a020f0;
            border-radius: 8px;
            outline: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 16px;
        }

        .password-box button {
            padding: 12px 25px;
            background: #a020f0;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .password-box button:hover {
            background: #c040ff;
            box-shadow: 0 0 20px #a020f0;
        }

        .enter-effect {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #a020f0 0%, black 70%);
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: 1s;
        }

        .enter-effect.active {
            opacity: 1;
            transform: scale(3);
            filter: blur(20px);
        }

        .flash {
            position: fixed;
            inset: 0;
            background: #a020f0;
            z-index: 10002;
            animation: flash 0.6s ease;
            pointer-events: none;
        }

        .loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a020f0;
            font-size: 20px;
            z-index: 10001;
            text-shadow: 0 0 10px #a020f0;
        }

        /* ========================================
           4. ERROR BOX
        ======================================== */
        .error-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0,0,0,0.95);
            color: red;
            padding: 20px 30px;
            border: 2px solid red;
            border-radius: 12px;
            font-size: 18px;
            opacity: 0;
            transition: 0.3s;
            z-index: 99999;
        }

        .error-box.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: shake 0.3s;
        }

        /* ========================================
           5. MAIN CONTENT - بعد فتح الباب
        ======================================== */
        .main-content {
            position: fixed;
            inset: 0;
            background: url('ALBOMS/IMAGE/SiteBackground/file_0000000089e071f8b71e687d9cf82965.png') center/cover no-repeat;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .main-content.active {
            display: flex;
        }

        .logo {
            width: clamp(180px, 45vw, 420px);
            margin: 15px 0;
            filter: drop-shadow(0 0 25px #ff0000);
            opacity: 0;
            animation: fadeUp 1s ease 0.5s forwards;
        }

        .welcome-text {
            font-size: 32px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin: 20px;
            opacity: 0;
            animation: fadeUp 1s ease 1s forwards;
        }
    </style>
</head>
<body>
    <!-- ======================================== عناصر الباب ======================================== -->
    <div id="errorBox" class="error-box">❌ كلمة السر خاطئة</div>
    <div class="enter-effect" id="enterEffect"></div>

    <div class="door-screen" id="doorScreen">
        <div class="loading-msg" id="loadingMsg">جاري تحميل البوابة...</div>
        <canvas id="doorCanvas"></canvas>
        <div class="password-box" id="passBox">
            <input type="password" id="passInput" placeholder="كلمة السر">
            <button onclick="checkPass()">دخول</button>
        </div>
    </div>

    <!-- ======================================== الأصوات ======================================== -->
    <audio id="doorSound" src="open.mp3"></audio>
    <audio id="bgMusic" src="bg.mp3" loop></audio>

    <!-- ======================================== المحتوى الرئيسي بعد الباب ======================================== -->
    <div class="main-content" id="mainContent">
        <img src="ALBOMS/IMAGE/PNG/20260429_130547.png" class="logo">
        <div class="welcome-text">☠ مرحباً بك في طائفة الظلال ☠</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        /* ========================================
           1. المتغيرات العامة
        ======================================== */
        const doorScreen = document.getElementById("doorScreen");
        const passBox = document.getElementById("passBox");
        const enterEffect = document.getElementById("enterEffect");
        const errorBox = document.getElementById("errorBox");
        const loadingMsg = document.getElementById("loadingMsg");
        const mainContent = document.getElementById("mainContent");
        const doorSound = document.getElementById("doorSound");
        const bgMusic = document.getElementById("bgMusic");

        let doorLocked = false;
        let doorL = null, doorR = null;
        let scene, camera, renderer, model;
        let doorOpening = false;
        let doorOpenProgress = 0;

        /* ========================================
           2. إعداد Three.js
        ======================================== */
        function initThreeJS() {
            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById("doorCanvas"),
                antialias: true,
                alpha: true
            });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pointLight = new THREE.PointLight(0xa020f0, 8, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(0, 5);
            scene.add(dirLight);

            // تحميل الموديل
            loadGLBModel();
        }

        /* ========================================
           3. تحميل موديل GLB - مصحح
        ======================================== */
        function loadGLBModel() {
            const loader = new GLTFLoader();
            
            // ⚠️ غير هذا المسار لمسار ملفك
            loader.load(
                "ALBOMS/3D/GLB/fantasy_door.glb",
                (gltf) => {
                    loadingMsg.innerText = "✅ تم تحميل البوابة";
                    setTimeout(() => loadingMsg.style.display = "none", 1000);

                    model = gltf.scene;
                    scene.add(model);

                    // 1. حل مشكلة الانعكاس - نقلب على X
                    model.scale.x = -1;

                    // تعديل الحجم والموقع
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3()).length();
                    
                    model.position.sub(center);
                    model.position.y += size * 0.1; // نرفعها شوي
                    
                    camera.position.set(0, size * 0.35, size * 1.3);
                    camera.lookAt(0, size * 0.2, 0);

                    // 2. البحث عن الأبواب
                    model.traverse((obj) => {
                        const name = obj.name.toLowerCase();
                        if (name.includes("door_l") || name.includes("left") || name.includes("l_door")) {
                            doorL = obj;
                            console.log("✅ Door Left Found:", obj.name);
                        }
                        if (name.includes("door_r") || name.includes("right") || name.includes("r_door")) {
                            doorR = obj;
                            console.log("✅ Door Right Found:", obj.name);
                        }
                    });

                    // 3. لو ما لقينا أبواب منفصلة، نفتح الموديل كامل
                    if (!doorL && !doorR) {
                        console.warn("⚠️ لم أجد أبواب منفصلة، سيتم فتح الباب كامل");
                        doorL = model; // نستخدم الموديل كامل
                        doorR = null;
                    }

                    setTimeout(() => passBox.classList.add("active"), 500);
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    loadingMsg.innerText = `جاري التحميل... ${percent}%`;
                },
                (err) => {
                    loadingMsg.innerText = "❌ فشل تحميل البوابة";
                    console.error("GLB Load Error:", err);
                }
            );
        }

        /* ========================================
           4. الأنيميشن - مصحح
        ======================================== */
        function animate() {
            requestAnimationFrame(animate);

            // فتح الباب
            if (doorOpening && doorOpenProgress < Math.PI / 1.8) {
                doorOpenProgress += 0.025;
                
                if (doorL && doorR) {
                    // لو فيه بابين منفصلين
                    doorL.rotation.y = -doorOpenProgress;
                    doorR.rotation.y = doorOpenProgress;
                } else if (doorL) {
                    // لو باب واحد أو الموديل كامل
                    doorL.rotation.y = -doorOpenProgress;
                }
            }

            renderer.render(scene, camera);
        }

        /* ========================================
           5. التحقق من كلمة السر
        ======================================== */
        window.checkPass = function() {
            const val = document.getElementById("passInput").value;
            if (val === "الظلال666") {
                doorLocked = true;
                passBox.classList.remove("active");

                // فلاش
                const flash = document.createElement("div");
                flash.className = "flash";
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 600);

                // صوت الباب
                doorSound.currentTime = 0;
                doorSound.play().catch(() => {});

                // افتح الباب
                setTimeout(() => {
                    doorOpening = true;
                }, 300);

                // تأثير الدخول
                setTimeout(() => {
                    enterEffect.classList.add("active");
                }, 1500);

                // اخفاء شاشة الباب + اظهار المحتوى
                setTimeout(() => {
                    doorScreen.style.display = "none";
                    mainContent.classList.add("active");
                    bgMusic.volume = 0.6;
                    bgMusic.play().catch(() => {});
                }, 3500);

            } else {
                showError();
            }
        }

        function showError() {
            errorBox.classList.add("show");
            setTimeout(() => errorBox.classList.remove("show"), 1500);
        }

        // Enter للدخول
        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") checkPass();
        });

        /* ========================================
           6. Resize
        ======================================== */
        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        /* ========================================
           7. بدء التشغيل
        ======================================== */
        initThreeJS();
        animate();
    </script>
</body>
</html>
