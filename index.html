<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Shadows</title>

<style>

/* الخلفية العامة + توسيط التصميم */
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
}

/* الإطار الثابت (تصميم الهاتف) */
.app-container {
    width: 420px;
    min-height: 100vh;
    background: linear-gradient(-45deg, #000000, #2b0000, #ff0000, #6a00ff, #000000);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    overflow: hidden;
    position: relative;
}

/* الجوانب المظللة */
body::before,
body::after {
    content: "";
    position: fixed;
    top: 0;
    width: calc((100% - 420px) / 2);
    height: 100%;
    z-index: -1;
}

body::before {
    left: 0;
    background: linear-gradient(to right, black, transparent);
}

body::after {
    right: 0;
    background: linear-gradient(to left, black, transparent);
}

/* حركة الخلفية */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* الغلاف */
.cover {
    width: 100%;
    height: 230px;
    background: url('20260328_013942.jpg') center/cover no-repeat;
}

/* العنوان */
.title {
    color: white;
    font-size: 26px;
    margin: 10px;
    text-align: center;
    text-shadow: 0 0 10px red, 0 0 25px purple;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 15px;
}

/* المربعات */
.box {
    aspect-ratio: 1/1;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
}

/* الصور */
.box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* عرض الصورة */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* صورة البروفايل */
.profile {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid purple;
    box-shadow: 0 0 15px red;
    cursor: pointer;
}

.profile img {
    width: 100%;
    height: 100%;
}

/* القائمة */
.menu {
    position: fixed;
    bottom: 100px;
    left: 20px;
    width: 250px;
    background: rgba(0,0,0,0.9);
    border-radius: 15px;
    padding: 15px;
    display: none;
    box-shadow: 0 0 20px purple;
}

/* أزرار القائمة */
.menu-btn {
    display: inline-block;
    margin: 10px;
    text-align: center;
}

.menu-btn img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

.menu-btn p {
    color: white;
    font-size: 12px;
    margin: 5px 0 0;
}

</style>
</head>

<body>

<div class="app-container">

    <div class="cover"></div>

    <div class="title">KingDom Shadows ✦ مملكة الظلال</div>

    <div class="grid">
        <div class="box" onclick="openImg(this)">
            <img src="8db181a18a8685cfcb518a644f63ee27.jpg" data-full="8db181a18a8685cfcb518a644f63ee27.jpg">
        </div>
        <div class="box" onclick="openImg(this)">
            <img src="8d5f12901b3d3fe00fdec8f329332676.jpg" data-full="8d5f12901b3d3fe00fdec8f329332676.jpg">
        </div>
        <div class="box" onclick="openImg(this)">
            <img src="8142f94dbbd40f1a28b0236f5658383d.jpg" data-full="8142f94dbbd40f1a28b0236f5658383d.jpg">
        </div>
        <div class="box" onclick="openImg(this)">
            <img src="6c7435b8f897d29f3a18145521aa6f0e.jpg" data-full="6c7435b8f897d29f3a18145521aa6f0e.jpg">
        </div>
        <div class="box" onclick="openImg(this)">
            <img src="5.png" data-full="5.png">
        </div>
        <div class="box" onclick="openImg(this)">
            <img src="6.png" data-full="6.png">
        </div>
    </div>

</div>

<!-- عارض الصور -->
<div class="viewer" id="viewer" onclick="closeImg(event)">
    <img id="viewerImg">
</div>

<!-- البروفايل -->
<div class="profile" onclick="toggleMenu()">
    <img src="20260329_085456.jpg">
</div>

<!-- القائمة -->
<div class="menu" id="menu">
    <a href="Band1.html" class="menu-btn">
        <img src="20260331_141448.jpg">
        <p>القانون رقم 1</p>
    </a>

    <a href="page2.html" class="menu-btn">
        <img src="hggg.png">
        <p>القانون رقم 2</p>
    </a>

    <a href="page3.html" class="menu-btn">
        <img src="القانون رقم 2.jpg">
        <p>القانون رقم 3</p>
    </a>
</div>

<script>

function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openImg(el) {
    const img = el.querySelector("img");
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = img.dataset.full;
}

function closeImg(e) {
    if (e.target.id === "viewer") {
        document.getElementById("viewer").style.display = "none";
    }
}

</script>

</body>
</html>
