<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تجربة الكبسة السائلة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f1e;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    h1 {
      font-size: 24px;
      opacity: 0.8;
    }

   .liquid-btn {
      position: relative;
      width: 280px;
      height: 70px;
      border: none;
      border-radius: 16px;
      background: #1a1a2e;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      overflow: hidden;
      isolation: isolate;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

   .liquid-btn:active {
      transform: scale(0.98);
    }

   .btn-text {
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

   .liquid-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

   .info {
      text-align: center;
      opacity: 0.6;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>تجربة الكبسات السائلة</h1>

  <button class="liquid-btn">
    <canvas class="liquid-canvas"></canvas>
    <span class="btn-text">اضغطني</span>
  </button>

  <button class="liquid-btn">
    <canvas class="liquid-canvas"></canvas>
    <span class="btn-text">جرب السحب علي</span>
  </button>

  <div class="info">
    1. اضغط ضغطة عادية = صوت النقرة<br>
    2. اضغط واسحب 2 بكسل = صوت السحب
  </div>

  <script>
    class LiquidButton {
      constructor(btn, sounds) {
        this.btn = btn;
        this.canvas = btn.querySelector('.liquid-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.activeRipple = null;
        this.mouse = { x: 0, y: 0, down: false };
        this.dragDistance = 0;
        this.dragSoundPlayed = false;

        this.clickSound = new Audio(sounds.click);
        this.dragSound = new Audio(sounds.drag);
        this.clickSound.preload = 'auto';
        this.dragSound.preload = 'auto';
        this.clickSound.volume = 0.5;
        this.dragSound.volume = 0.6;

        this.resize();
        this.bindEvents();
        this.animate();
        window.addEventListener('resize', () => this.resize());
      }

      playClickSound() {
        this.clickSound.currentTime = 0;
        this.clickSound.play().catch(e => {});
      }

      playDragSound() {
        this.dragSound.currentTime = 0;
        this.dragSound.play().catch(e => {});
      }

      resize() {
        this.width = this.btn.offsetWidth;
        this.height = this.btn.offsetHeight;
        this.canvas.width = this.width * devicePixelRatio;
        this.canvas.height = this.height * devicePixelRatio;
        this.ctx.scale(devicePixelRatio, devicePixelRatio);
      }

      bindEvents() {
        this.btn.addEventListener('mousedown', e => this.down(e));
        this.btn.addEventListener('mousemove', e => this.move(e));
        this.btn.addEventListener('mouseup', () => this.up());
        this.btn.addEventListener('mouseleave', () => this.up());
        this.btn.addEventListener('touchstart', e => this.down(e.touches[0]));
        this.btn.addEventListener('touchmove', e => this.move(e.touches[0]));
        this.btn.addEventListener('touchend', () => this.up());
      }

      getPos(e) {
        const rect = this.btn.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      down(e) {
        const pos = this.getPos(e);
        this.mouse.down = true;
        this.dragDistance = 0;
        this.dragSoundPlayed = false;

        // كل نقرة تشغل صوت النقرة فوراً
        this.playClickSound();

        this.activeRipple = {
          startX: pos.x,
          startY: pos.y,
          x: pos.x,
          y: pos.y,
          radius: 0,
          maxRadius: 0,
          alpha: 0.8,
          state: 'dragging'
        };
      }

      move(e) {
        if (!this.mouse.down ||!this.activeRipple) return;
        const pos = this.getPos(e);

        const dx = pos.x - this.activeRipple.startX;
        const dy = pos.y - this.activeRipple.startY;
        this.dragDistance = Math.sqrt(dx*dx + dy*dy);

        // كل سحبة توصل 2 بكسل تشغل صوت السحب مرة وحدة
        if (this.dragDistance > 2 &&!this.dragSoundPlayed) {
          this.playDragSound();
          this.dragSoundPlayed = true;
        }

        this.activeRipple.x = pos.x;
        this.activeRipple.y = pos.y;
        this.activeRipple.maxRadius = Math.max(this.activeRipple.maxRadius, this.dragDistance + 40);
      }

      up() {
        if (!this.activeRipple) return;
        this.mouse.down = false;
        this.activeRipple.state = 'releasing';
        this.activeRipple.releaseTime = 0;
      }

      animate() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.drawDistortion();
        requestAnimationFrame(() => this.animate());
      }

      drawDistortion() {
        const imageData = this.ctx.createImageData(this.width, this.height);
        const data = imageData.data;

        if (this.activeRipple) {
          const r = this.activeRipple;
          if (r.state === 'dragging') {
            r.radius = r.maxRadius;
          } else if (r.state === 'releasing') {
            r.releaseTime += 0.08;
            r.radius = r.maxRadius * (1 + Math.sin(r.releaseTime * 8) * Math.exp(-r.releaseTime * 3) * 0.4);
            r.alpha *= 0.94;
            if (r.alpha < 0.01) this.activeRipple = null;
          }

          for (let y = 0; y < this.height; y++) {
            for (let x = 0; x < this.width; x++) {
              const dist = Math.sqrt((x - r.x) ** 2 + (y - r.y) ** 2);
              let dx = 0, dy = 0;
              if (dist < r.radius && r.radius > 0) {
                const normDist = dist / r.radius;
                const wave = Math.cos(normDist * Math.PI) * 0.5 + 0.5;
                const force = wave * wave * 30 * r.alpha;
                const angle = Math.atan2(y - r.y, x - r.x);
                dx = Math.cos(angle) * force;
                dy = Math.sin(angle) * force;
              }
              const i = (y * this.width + x) * 4;
              const distortion = Math.sqrt(dx*dx + dy*dy);
              const brightness = 26 + distortion * 10;
              data[i] = brightness;
              data[i+1] = brightness;
              data[i+2] = brightness + 25;
              data[i+3] = 255;
            }
          }
        } else {
          for (let i = 0; i < data.length; i += 4) {
            data[i] = 26; data[i+1] = 26; data[i+2] = 46; data[i+3] = 255;
          }
        }
        this.ctx.putImageData(imageData, 0, 0);
      }
    }

    document.querySelectorAll('.liquid-btn').forEach(btn => {
      new LiquidButton(btn, {
        click: './sounds/click.mp3',
        drag: './sounds/drag.mp3'
      });
    });

    // لازم أول تفاعل عشان المتصفح يسمح بالصوت
    document.body.addEventListener('click', () => {}, { once: true });
  </script>
</body>
</html>
