<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/bg.png') center/cover no-repeat;
overflow:hidden;
}

/* طبقة الظلام */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* ===== اللوجو ===== */
.logo{
width:420px;
margin-bottom:40px;

filter:drop-shadow(0 0 25px #00eaff);
}

/* ===== الشبكة ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 260px);
grid-template-rows:repeat(2, 210px);
gap:35px;

justify-content:center;
}

/* ===== الأزرار ===== */
.btn{
width:260px;
height:210px;

background-size:contain;
background-repeat:no-repeat;
background-position:center;

cursor:pointer;
transition:0.3s;

border:none;
background-color:transparent;

filter:drop-shadow(0 10px 25px rgba(0,0,0,0.7));
}

/* Hover فاخر */
.btn:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 30px #00eaff);
}

/* نزول الصف الثاني */
.menu .btn:nth-child(4),
.menu .btn:nth-child(5),
.menu .btn:nth-child(6){
margin-top:50px;
}

/* ===== الاستجابة بدون كسر ===== */
@media (max-width: 900px){
.menu{
transform:scale(0.8);
}
.logo{
transform:scale(0.8);
}
}

@media (max-width: 600px){
.menu{
transform:scale(0.65);
}
.logo{
transform:scale(0.65);
}
}

@media (max-width: 400px){
.menu{
transform:scale(0.5);
}
.logo{
transform:scale(0.5);
}
}

</style>
</head>

<body>

<!-- 🔥 اللوجو (الصورة اللي أرسلتها) -->
<img src="Logo/logo.png" class="logo">

<!-- 🔥 القائمة -->
<div class="menu">

<div class="btn" onclick="go('team.html')" style="background-image:url('Pictures/team.png')"></div>

<div class="btn" onclick="go('story.html')" style="background-image:url('Pictures/story.png')"></div>

<div class="btn" onclick="go('challenge.html')" style="background-image:url('Pictures/challenge.png')"></div>

<div class="btn" onclick="go('arena.html')" style="background-image:url('Pictures/arena.png')"></div>

<div class="btn" onclick="go('fairplay.html')" style="background-image:url('Pictures/fairplay.png')"></div>

<div class="btn" onclick="go('training.html')" style="background-image:url('Pictures/training.png')"></div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
