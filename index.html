    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
        }

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const doorScreen = document.getElementById("doorScreen");
        const doorCanvas = document.getElementById("doorCanvas");
        const gateFormBox = document.getElementById("gateFormBox");
        const whiteFlash = document.getElementById("whiteFlash");
        const mainSite = document.getElementById("mainSite");
        const doorSound = document.getElementById("doorSound");
        const optionsList = document.getElementById("optionsList");

        let doorL = null, doorR = null;
        let scene, camera, renderer, model;
        let doorOpening = false;
        let doorOpenProgress = 0;
        let selectedOption = null;
        let formShown = false;

        const DOOR_OPEN_SPEED = 0.0058;
        const DOOR_MAX_ANGLE = Math.PI / 1.8;

        function initThreeJS() {
            renderer = new THREE.WebGLRenderer({
                canvas: doorCanvas,
                antialias: true,
                alpha: true
            });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pointLight = new THREE.PointLight(0xff0000, 8, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(0, 5);
            scene.add(dirLight);

            loadGLBModel();
            doorCanvas.addEventListener('click', onDoorClick);
        }

        function loadGLBModel() {
            const loader = new GLTFLoader();
            loader.load(
                "ALBOMS/3D/GLB/بوابة_العبور.glb",
                (gltf) => {
                    model = gltf.scene;
                    scene.add(model);
                    model.scale.x = -1;

                    model.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.material = obj.material.clone();
                            obj.material.color.setHex(0xff0000);
                            obj.material.emissive = new THREE.Color(0x440000);
                            obj.material.emissiveIntensity = 0.3;
                        }
                    });

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3()).length();

                    model.position.sub(center);
                    model.position.y += size * 0.1;

                    camera.position.set(0, size * 0.35, size * 1.3);
                    camera.lookAt(0, size * 0.2, 0);

                    model.traverse((obj) => {
                        const name = obj.name.toLowerCase();
                        if (name.includes("door_l") || name.includes("left") || name.includes("l_door")) doorL = obj;
                        if (name.includes("door_r") || name.includes("right") || name.includes("r_door")) doorR = obj;
                    });

                    if (!doorL &&!doorR) doorL = model;
                },
                null,
                (err) => { console.error("GLB Load Error:", err); }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            if (doorOpening && doorOpenProgress < DOOR_MAX_ANGLE) {
                doorOpenProgress += DOOR_OPEN_SPEED;
                if (doorL && doorR) {
                    doorL.rotation.y = -doorOpenProgress;
                    doorR.rotation.y = doorOpenProgress;
                } else if (doorL) {
                    doorL.rotation.y = -doorOpenProgress;
                }
            }
            renderer.render(scene, camera);
        }

        function onDoorClick(e) {
            if (formShown) return;

            doorCanvas.classList.add("clicked");
            setTimeout(() => doorCanvas.classList.remove("clicked"), 250);

            setTimeout(() => {
                formShown = true;
                gateFormBox.classList.add("active");
            }, 300);
        }

        window.hideForm = function() {
            gateFormBox.classList.remove("active");
            formShown = false;
        }

        window.toggleOptions = function() {
            optionsList.classList.toggle("show");
        }

        document.querySelectorAll('.gate-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.gate-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedOption = this.dataset.value;
                optionsList.classList.remove("show");
            });
        });

        window.submitGateForm = function() {
            const name = document.getElementById("visitorName").value.trim();
            const pass = document.getElementById("passInput").value;

            if (!name) {
                alert("يجب ادخال اسم الدخيل");
                return;
            }

            if (!pass) {
                alert("كلمة السر إجباري");
                return;
            }

            if (!selectedOption) {
                alert("يجب تحديد من أي مصدر قادم انت");
                return;
            }

            if (pass === "الظلال666") {
                enterKingdom();
            } else {
                alert("كلمة السر خاطئة - مرفوض");
            }
        }

        function enterKingdom() {
            hideForm();
            doorSound.currentTime = 0;
            doorSound.play().catch(() => {});
            setTimeout(() => { doorOpening = true; }, 300);
            setTimeout(() => { whiteFlash.classList.add("active"); }, 4200);
            setTimeout(() => {
                doorScreen.style.display = "none";
                mainSite.classList.add("active");
                initMainSite();
            }, 5400);
        }

        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") submitGateForm();
        });

        gateFormBox.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.addEventListener('click', (e) => {
            if (formShown &&!gateFormBox.contains(e.target) && e.target!== doorCanvas) {
                hideForm();
            }
        });

        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        initThreeJS();
        animate();

        function initMainSite() {
            let cursor = document.getElementById("cursor");
            document.addEventListener("mousemove", e => {
                cursor.style.top = e.clientY + "px";
                cursor.style.left = e.clientX + "px";
            });

            let menuData = {
                "أنمي": "قسم الأنمي", "فضائح عصابات": "أرشيف الفضائح", "قوانين الدعس": "قوانين الطائفة",
                "ترسيم أعضاء": "نظام الترسيم", "أسماء الظلال": "قائمة الظلال", "تحميل ملفات": "قسم التحميل"
            };

            window.openMenu = function(title) {
                document.getElementById("menuTitle").innerText = title;
                document.getElementById("menuDesc").innerText = menuData || "لا يوجد محتوى";
                document.getElementById("menuPage").classList.add("active");
                history.pushState({ page: "menu" }, "");
            }[title]

            window.closeMenuPage = function() {
                document.getElementById("menuPage").classList.remove("active");
            }

            window.closeMenu = function() {
                document.getElementById("popup").classList.remove("active");
            }

            let exitArmed = false;
            history.pushState({page:"home"}, "");
            window.addEventListener("popstate", function () {
                let menu = document.getElementById("menuPage");
                if(menu.classList.contains("active")){
                    menu.classList.remove("active");
                    return;
                }
                if(!exitArmed){
                    exitArmed = true;
                    document.getElementById("exitPopup").classList.add("active");
                    history.pushState({page:"home"}, "");
                    setTimeout(()=> exitArmed = false, 3000);
                }else{
                    window.close();
                }
            });

            let frameTexts = [
                "طائفة الظلام، يعود تاريخ تأسيس المملكة في عام 2019",
                "لدينا أعين في كل مكان نحن الظلال نتربص في ظلال",
                "نخب 🥂 زوار الكرام، حتا لو كانو من الخصوم فا نشارك النخب تواضعًا 👑",
            ];
            let frameIndex = 0;
            let frameSpan = document.querySelector(".frame-text span");
            if (frameSpan) {
                setInterval(() => {
                    frameIndex = (frameIndex + 1) % frameTexts.length;
                    frameSpan.innerText = frameTexts;
                }, 4000);
            }[frameIndex]

            window.confirmExit = function() { window.close(); }
            window.closeExit = function() { document.getElementById("exitPopup").classList.remove("active"); }

            const waveLayer = document.getElementById("waveLayer");
            document.addEventListener("pointerdown", createWave);
            document.addEventListener("pointermove", function(e){
                if(e.buttons!== 1) return;
                createWave(e);
            });
            function createWave(e){
                const wave = document.createElement("div");
                wave.className = "wave";
                wave.style.left = e.clientX + "px";
                wave.style.top = e.clientY + "px";
                waveLayer.appendChild(wave);
                setTimeout(() => wave.remove(), 1200);
            }
        }
    </script>
</body>
</html>
