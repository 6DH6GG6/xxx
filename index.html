<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow:hidden;
}

/* طبقة */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95));
backdrop-filter:blur(3px);
z-index:0;
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:1;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== SOCIAL ===== */
.social{
position:fixed;
right:15px;
top:15px;
z-index:999;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#1877f2;
color:white;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
box-shadow:0 0 20px #1877f2;
}

/* ===== LOGO ===== */
.logo{
width:clamp(200px,40vw,340px);
margin-bottom:25px;
filter:drop-shadow(0 0 25px #00eaff);

/* دخول */
animation:fadeDown 1s ease;
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;
transition:0.25s;

/* ✨ أنيميشن دخول */
opacity:0;
transform:translateY(40px);
animation:fadeUp 0.8s ease forwards;
}

/* ترتيب ظهور الأزرار */
.btn:nth-child(1){ animation-delay:0.2s; }
.btn:nth-child(2){ animation-delay:0.4s; }
.btn:nth-child(3){ animation-delay:0.6s; }
.btn:nth-child(4){ animation-delay:0.8s; }
.btn:nth-child(5){ animation-delay:1s; }
.btn:nth-child(6){ animation-delay:1.2s; }

/* overlay */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* glow */
.btn::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg, transparent, rgba(0,234,255,0.3), transparent);
opacity:0;
}

/* النص */
.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:clamp(11px,1.6vw,16px);
font-weight:bold;
line-height:1.2;
text-shadow:0 0 10px #00eaff;
}

/* hover */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

.btn:hover::after{
opacity:1;
animation:glowMove 1s linear;
}

@keyframes glowMove{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

/* ضغط */
.btn:active{
transform:scale(0.92);
box-shadow:0 0 15px #00eaff inset;
}

/* ===== FADE ===== */
.fade{
position:fixed;
inset:0;
background:black;
opacity:0;
display:flex;
justify-content:center;
align-items:center;
transition:0.5s;
z-index:9999;
}

.fade.active{
opacity:1;
}

.loading{
color:#00eaff;
font-size:20px;
letter-spacing:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
.menu{gap:12px;}
}

@media(max-width:350px){
.menu{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- FADE -->
<div id="fade" class="fade">
<div class="loading">LOADING...</div>
</div>

<!-- FACEBOOK -->
<div class="social">
<a href="https://www.facebook.com/Kage.No.Teio2" target="_blank">F</a>
</div>

<div class="container">

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')">
<span>أنمي</span>
</div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')">
<span>فضائح<br>عصابات</span>
</div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')">
<span>قوانين<br>الدعس</span>
</div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')">
<span>ترسيم<br>أعضاء</span>
</div>

<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')">
<span>أسماء<br>الظلال</span>
</div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')">
<span>تحميل<br>ملفات</span>
</div>

</div>

</div>

<script>

function go(page){
let sound = document.getElementById("clickSound");
let fade = document.getElementById("fade");

if(sound){
sound.currentTime = 0;
sound.play();
}

if(navigator.vibrate){
navigator.vibrate(80);
}

fade.classList.add("active");

setTimeout(()=>{
window.location.href = page;
},2000);
}

</script>

</body>
</html>
