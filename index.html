<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/bg.jpg') center/cover no-repeat;
position:relative;
overflow:hidden;
color:white;
}

/* طبقة الظلام */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* الشعار */
.logo{
width:280px;
margin-bottom:30px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* ===== الشبكة الثابتة ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 240px);
grid-template-rows:repeat(2, 200px);
gap:30px;

/* أهم شيء */
justify-content:center;
}

/* الأزرار */
.btn{
width:240px;
height:200px;

background-size:contain;
background-repeat:no-repeat;
background-position:center;

cursor:pointer;
transition:0.25s;

border:none;
outline:none;
background-color:transparent;

filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));
}

/* تأثير hover */
.btn:hover{
transform:scale(1.08);
filter:drop-shadow(0 0 25px #00eaff);
}

/* نزول الصف الثاني مثل الألعاب */
.menu .btn:nth-child(4),
.menu .btn:nth-child(5),
.menu .btn:nth-child(6){
margin-top:40px;
}

/* ===== الاستجابة (تصغير بدل تكسير) ===== */
@media (max-width: 900px){
.menu{
transform: scale(0.8);
}
}

@media (max-width: 600px){
.menu{
transform: scale(0.65);
}
}

@media (max-width: 400px){
.menu{
transform: scale(0.5);
}
}

</style>
</head>

<body>

<!-- الشعار -->
<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- القائمة -->
<div class="menu">

<div class="btn" onclick="go('background.html')" style="background-image:url('Pictures/20260426_133305.png')"></div>

<div class="btn" onclick="go('developers.html')" style="background-image:url('Pictures/20260426_134027.png')"></div>

<div class="btn" onclick="go('pictures.html')" style="background-image:url('Pictures/20260426_134027.png')"></div>

<div class="btn" onclick="go('team.html')" style="background-image:url('Pictures/20260426_134027.png')"></div>

<div class="btn" onclick="go('arena.html')" style="background-image:url('Pictures/20260426_134027.png')"></div>

<div class="btn" onclick="go('training.html')" style="background-image:url('Pictures/20260426_134027.png')"></div>

</div>

<script>
function go(page){
window.location = page;
}
</script>

</body>
</html>
