<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الظلال</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}
</style>

</head>
<body>

<canvas id="bg"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

/* إعداد */
const canvas = document.getElementById("bg");

const renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 1.5, 4);

/* إضاءة فخمة */
const redLight = new THREE.PointLight(0xff0000, 2);
redLight.position.set(5, 5, 5);
scene.add(redLight);

const purpleLight = new THREE.PointLight(0x8000ff, 2);
purpleLight.position.set(-5, -5, 5);
scene.add(purpleLight);

/* تحميل الموديل */
let doorL = null;
let doorR = null;

const loader = new GLTFLoader();

loader.load("ALBOMS/3D/GLB/بوابة_العبور.glb", (gltf) => {

    const model = gltf.scene;
    scene.add(model);

    model.position.set(0, 0, 0);
    model.scale.set(1.5, 1.5, 1.5);

    model.traverse((child) => {

        // 🔥 الأسماء الصحيحة
        if (child.name === "Door_L") {
            doorL = child;
        }

        if (child.name === "Door_R") {
            doorR = child;
        }

    });

});

/* حركة */
let time = 0;

function animate() {
    requestAnimationFrame(animate);

    time += 0.02;

    /* خلفية متحركة */
    const r = Math.sin(time) * 0.5 + 0.5;
    const b = Math.cos(time) * 0.5 + 0.5;

    renderer.setClearColor(new THREE.Color(r, 0, b));

    /* فتح وإغلاق الأبواب */
    if (doorL && doorR) {
        doorL.rotation.y = -Math.sin(time) * 1.2;
        doorR.rotation.y = Math.sin(time) * 1.2;
    }

    renderer.render(scene, camera);
}

animate();

/* ريسبونس */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
