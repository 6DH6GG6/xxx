    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma;
        }

        body {
            min-height: 100vh;
            background: black;
            color: white;
            overflow: hidden;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; filter: blur(20px); }
            50% { opacity: 0.6; filter: blur(30px); }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes whiteFlashExpand {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

.door-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
        }

.door-bg {
            position: absolute;
            inset: 0;
            background: url('ALBOMS/IMAGE/SiteBackground/file_000000006e2c722f9a965efdf432912b.png') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.3);
            pointer-events: none;
        }

.door-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 80vh;
            background: radial-gradient(ellipse, rgba(255,0,0,0.6) 0%, transparent 70%);
            z-index: 2;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        #doorCanvas {
            width: 100%;
            height: 100%;

            position: relative;
            pointer-events: none;
        }

.click-hint {
            position: absolute;

            color: #ff0000;
            font-size: 18px;
            text-shadow: 0 0 15px #ff0000;
            z-index: 10001;
            opacity: 0;
            animation: fadeUp 1s ease 1s forwards;
            pointer-events: none;
        }

 /* القائمة الحمراء الوحيدة */
.gate-form-box {
            position: absolute;
            bottom: 12%;
            width: 380px;

.gate-form-box.active {

            transform: translateY(0) scale(1);

        }

.gate-form-title {
            color: #ff0000;

        }

.gate-input {

            margin-bottom: 12px;

            outline: none;
            background: rgba(0,0,0,0.9);

.gate-input:focus {

.gate-options-btn {

.gate-options-btn:hover {

        }

.gate-options-list {
            max-height: 0;
            overflow: hidden;

            margin-bottom: 12px;
        }

.gate-options-list.show {
            max-height: 100px;
        }

.gate-option {
            padding: 10px;

            background: rgba(0,0,0,0.8);
            border: 2px solid #ff0000;
            border-radius: 6px;
            color: #ff9999;
            cursor: pointer;

        }

.gate-option:hover,.gate-option.selected {

.gate-submit-btn {

.white-flash {

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const doorScreen = document.getElementById("doorScreen");
        const gateFormBox = document.getElementById("gateFormBox");
        const whiteFlash = document.getElementById("whiteFlash");
        const clickHint = document.getElementById("clickHint");
        const loadingMsg = document.getElementById("loadingMsg");
        const mainSite = document.getElementById("mainSite");
        const doorSound = document.getElementById("doorSound");
        const bgMusic = document.getElementById("bgMusic");
        const gateModalOverlay = document.getElementById("gateModalOverlay");
        const errorModal = document.getElementById("errorModal");
        const successModal = document.getElementById("successModal");
        const optionsList = document.getElementById("optionsList");
        const welcomeText = document.getElementById("welcomeText");

        let doorL = null, doorR = null;
        let scene, camera, renderer, model;
        let doorOpening = false;
        let doorOpenProgress = 0;
        let canClickDoor = false;
        let selectedOption = null;
        let visitorName = "";
        let formShown = false;

        const DOOR_OPEN_SPEED = 0.0058;
        const DOOR_MAX_ANGLE = Math.PI / 1.8;
        const FLASH_DELAY = 4200;
        const ENTER_DELAY = 5400;

        function initThreeJS() {
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById("doorCanvas"),
                antialias: true,
                alpha: true
            });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pointLight = new THREE.PointLight(0xff0000, 8, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(0, 5);
            scene.add(dirLight);

            loadGLBModel();

            // الضغط على أي مكان في البوابة يفتح القائمة الحمراء فقط
            doorScreen.addEventListener('click', onDoorClick);
        }

        function loadGLBModel() {
            const loader = new GLTFLoader();
            loadingMsg.innerText = "0%";

            loader.load(
                "ALBOMS/3D/GLB/بوابة_العبور.glb",
                (gltf) => {
                    loadingMsg.innerText = "100%";
                    setTimeout(() => loadingMsg.style.display = "none", 500);

                    model = gltf.scene;
                    scene.add(model);
                    model.scale.x = -1;

                    model.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.material = obj.material.clone();
                            obj.material.color.setHex(0xff0000);
                            obj.material.emissive = new THREE.Color(0x440000);
                            obj.material.emissiveIntensity = 0.3;
                        }
                    });

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3()).length();

                    model.position.sub(center);
                    model.position.y += size * 0.1;

                    camera.position.set(0, size * 0.35, size * 1.3);
                    camera.lookAt(0, size * 0.2, 0);

                    model.traverse((obj) => {
                        const name = obj.name.toLowerCase();
                        if (name.includes("door_l") || name.includes("left") || name.includes("l_door")) doorL = obj;
                        if (name.includes("door_r") || name.includes("right") || name.includes("r_door")) doorR = obj;
                    });

                    if (!doorL &&!doorR) doorL = model;
                    canClickDoor = true;
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    loadingMsg.innerText = `${percent}%`;
                },
                (err) => {
                    loadingMsg.innerText = "❌";
                    console.error("GLB Load Error:", err);
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            if (doorOpening && doorOpenProgress < DOOR_MAX_ANGLE) {
                doorOpenProgress += DOOR_OPEN_SPEED;
                if (doorL && doorR) {
                    doorL.rotation.y = -doorOpenProgress;
                    doorR.rotation.y = doorOpenProgress;
                } else if (doorL) {
                    doorL.rotation.y = -doorOpenProgress;
                }
            }
            renderer.render(scene, camera);
        }

        function onDoorClick(e) {
            if (!canClickDoor || formShown) return;
            if (gateFormBox.contains(e.target)) return;

            formShown = true;
            gateFormBox.classList.add("active");
            clickHint.style.display = "none";
        }

        window.toggleOptions = function() {
            optionsList.classList.toggle("show");
        }

        document.querySelectorAll('.gate-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.gate-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedOption = this.dataset.value;
                optionsList.classList.remove("show");
            });
        });

        window.submitGateForm = function() {
            const name = document.getElementById("visitorName").value.trim();
            const pass = document.getElementById("passInput").value;

            if (!name) {
                alert("ادخل اسم الزائر");
                return;
            }

            if (!selectedOption) {
                alert("اختر نوع الظل");
                return;
            }

            visitorName = name;
            gateFormBox.classList.remove("active");
            formShown = false;

            if (pass === "الظلال666") {
                showSuccessModal();
            } else {
                showErrorModal();
            }
        }

        function showErrorModal() {
            gateModalOverlay.classList.add("show");
            errorModal.classList.add("show");
        }

        function showSuccessModal() {
            const optionText = selectedOption === "new"? "ظل جديد" : "ظل سابق";
            welcomeText.innerHTML = `أهلاً بك يا ${visitorName}<br>نرحب بك أيها ${optionText}`;
            gateModalOverlay.classList.add("show");
            successModal.classList.add("show");
        }

        window.closeGateModal = function() {
            gateModalOverlay.classList.remove("show");
            errorModal.classList.remove("show");
            successModal.classList.remove("show");
        }

        window.enterKingdom = function() {
            closeGateModal();
            doorSound.currentTime = 0;
            doorSound.play().catch(() => {});
            setTimeout(() => { doorOpening = true; }, 300);
            setTimeout(() => { whiteFlash.classList.add("active"); }, FLASH_DELAY);
            setTimeout(() => {
                doorScreen.style.display = "none";
                mainSite.classList.add("active");
                bgMusic.volume = 0.6;
                bgMusic.play().catch(() => {});
                initMainSite();
            }, ENTER_DELAY);
        }

        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") submitGateForm();
        });

        gateFormBox.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        initThreeJS();
        animate();

        // كود موقعك الأصلي
        function initMainSite() {
            let cursor = document.getElementById("cursor");
            document.addEventListener("mousemove", e => {
                cursor.style.top = e.clientY + "px";
                cursor.style.left = e.clientX + "px";
            });

            let menuData = {
                "أنمي": "قسم الأنمي", "فضائح عصابات": "أرشيف الفضائح", "قوانين الدعس": "قوانين الطائفة",
                "ترسيم أعضاء": "نظام الترسيم", "أسماء الظلال": "قائمة الظلال", "تحميل ملفات": "قسم التحميل"
            };

            window.openMenu = function(title) {
                document.getElementById("menuTitle").innerText = title;
                document.getElementById("menuDesc").innerText = menuData[title] || "لا يوجد محتوى";
                document.getElementById("menuPage").classList.add("active");
                history.pushState({ page: "menu" }, "");
            }

            window.closeMenuPage = function() {
                document.getElementById("menuPage").classList.remove("active");
            }

            window.closeMenu = function() {
                document.getElementById("popup").classList.remove("active");
            }

            let exitArmed = false;
            history.pushState({page:"home"}, "");
            window.addEventListener("popstate", function () {
                let menu = document.getElementById("menuPage");
                if(menu.classList.contains("active")){
                    menu.classList.remove("active");
                    return;
                }
                if(!exitArmed){
                    exitArmed = true;
                    document.getElementById("exitPopup").classList.add("active");
                    history.pushState({page:"home"}, "");
                    setTimeout(()=> exitArmed = false, 3000);
                }else{
                    window.close();
                }
            });

            let frameTexts = [
                "طائفة الظلام، يعود تاريخ تأسيس المملكة في عام 2019",
                "لدينا أعين في كل مكان نحن الظلال نتربص في ظلال",
                "نخب 🥂 زوار الكرام، حتا لو كانو من الخصوم فا نشارك النخب تواضعًا 👑",
            ];
            let frameIndex = 0;
            let frameSpan = document.querySelector(".frame-text span");
            if (frameSpan) {
                setInterval(() => {
                    frameIndex = (frameIndex + 1) % frameTexts.length;
                    frameSpan.innerText = frameTexts[frameIndex];
                }, 4000);
            }

            window.confirmExit = function() { window.close(); }
            window.closeExit = function() { document.getElementById("exitPopup").classList.remove("active"); }

            const waveLayer = document.getElementById("waveLayer");
            document.addEventListener("pointerdown", createWave);
            document.addEventListener("pointermove", function(e){
                if(e.buttons!== 1) return;
                createWave(e);
            });
            function createWave(e){
                const wave = document.createElement("
                wave.style.left = e.clientX + "px";
                wave.style.top = e.clientY + "px";
                waveLayer.appendChild(wave);
                setTimeout(() => wave.remove(), 1200);
            }
        }
    </script>
</body>
</html>
