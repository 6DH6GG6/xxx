<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow:hidden;
}

/* ===== OVERLAY ===== */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95));
backdrop-filter:blur(3px);
z-index:0;
}

/* ===== SMOKE EFFECT ===== */
body::after{
content:"";
position:absolute;
inset:0;
background:url('Background/smoke.png') repeat;
opacity:0.08;
animation:smoke 60s linear infinite;
z-index:0;
}

@keyframes smoke{
0%{background-position:0 0;}
100%{background-position:1000px 1000px;}
}

/* ===== INTRO ===== */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#00eaff;
font-size:28px;
letter-spacing:4px;
animation:fadeOut 2s forwards 2s;
}

@keyframes fadeOut{
to{opacity:0; visibility:hidden;}
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:1;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== LOGO ===== */
.logo{
width:clamp(200px,40vw,340px);
margin-bottom:25px;
filter:drop-shadow(0 0 25px #00eaff);
}

/* ===== SOCIAL ===== */
.social{
position:fixed;
right:15px;
top:15px;
z-index:999;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#1877f2;
color:white;
font-weight:bold;
text-decoration:none;
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;
transition:0.2s;
}

.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:clamp(11px,1.6vw,16px);
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

/* hover */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* click */
.btn:active{
transform:scale(0.95);
}

/* ===== EYE EFFECT ===== */
.eye{
position:fixed;
bottom:20px;
left:20px;
width:40px;
height:40px;
border-radius:50%;
background:red;
box-shadow:0 0 15px red;
opacity:0;
animation:eyeBlink 8s infinite;
}

@keyframes eyeBlink{
0%,90%,100%{opacity:0;}
92%,96%{opacity:1;}
}

/* ===== FADE ===== */
.fade{
position:fixed;
inset:0;
background:black;
opacity:0;
display:flex;
justify-content:center;
align-items:center;
transition:0.6s;
z-index:9999;
}

.fade.active{
opacity:1;
}

/* loading */
.loading{
color:#00eaff;
font-size:20px;
letter-spacing:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
.menu{gap:12px;}
}

@media(max-width:350px){
.menu{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">KAGE NO TEIO</div>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- FADE -->
<div id="fade" class="fade">
<div class="loading">LOADING...</div>
</div>

<!-- EYE -->
<div class="eye"></div>

<!-- SOCIAL -->
<div class="social">
<a href="https://www.facebook.com/Kage.No.Teio2" target="_blank">F</a>
</div>

<div class="container">

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')">
<span>أنمي</span>
</div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')">
<span>فضائح<br>عصابات</span>
</div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')">
<span>قوانين<br>الدعس</span>
</div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')">
<span>ترسيم<br>أعضاء</span>
</div>

<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')">
<span>أسماء<br>الظلال</span>
</div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')">
<span>تحميل<br>ملفات</span>
</div>

</div>

</div>

<script>

function go(page){
let sound = document.getElementById("clickSound");
let fade = document.getElementById("fade");

sound.currentTime = 0;
sound.play();

if(navigator.vibrate){
navigator.vibrate(100);
}

fade.classList.add("active");

setTimeout(()=>{
window.location.href = page;
},2000);
}

</script>

</body>
</html>
