<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;

/* 🔥 الخلفية الجديدة */
background:url('file_0000000089e071f8b71e687d9cf82965.png') no-repeat center center fixed;
background-size:cover;
position:relative;
}

/* 🔴 طبقة سواد + دمج */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(3px);
z-index:0;
}

/* كل شيء فوق الطبقة */
body *{
position:relative;
z-index:1;
}

/* شعار */
.logo{
width:180px;
max-width:90%;
margin-bottom:10px;
filter:drop-shadow(0 0 10px red);
}

h1{
font-size:50px;
color:#ff0000;
text-shadow:0 0 20px red, 0 0 40px #ff0000;
letter-spacing:2px;
}

h2{
font-size:24px;
margin-bottom:30px;
color:#ccc;
}

/* الشبكة */
.menu{
display:grid;
grid-template-columns:repeat(3, 220px);
row-gap:14px;
justify-content:center;
}

/* العنصر */
.item{
display:flex;
flex-direction:column;
align-items:center;
}

/* 🔺 الزر */
.btn{
width:220px;
height:190px;
background:linear-gradient(145deg,#0a0a0a,#1a0000);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
cursor:pointer;
transition:.3s;
position:relative;
overflow:hidden;

/* 🔥 إطار أحمر */
box-shadow:0 0 10px red inset, 0 0 10px red;
}

/* توهج داخلي */
.btn::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,0,0,0.4), transparent 70%);
opacity:0;
transition:.3s;
}

/* Hover */
.btn:hover{
transform:scale(1.07);
box-shadow:0 0 25px red, 0 0 40px red;
}

.btn:hover::before{
opacity:1;
}

/* الصف الثاني */
.down .btn{
clip-path:polygon(0 0,100% 0,50% 100%);
}

.down{
margin-top:-45px;
}

/* النص */
.name{
margin-top:8px;
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px red, 0 0 20px red;
}

/* 📱 الهاتف */
@media(max-width:768px){

body{
background:url('bg-mobile.png') no-repeat center center fixed;
background-size:cover;
}

.logo{
width:130px;
}

h1{
font-size:32px;
}

h2{
font-size:18px;
margin-bottom:20px;
}

.menu{
grid-template-columns:repeat(3, 105px);
row-gap:8px;
}

.btn{
width:105px;
height:92px;
}

.down{
margin-top:-18px;
}

.name{
font-size:11px;
margin-top:5px;
}
}
</style>
</head>
<body>

<img src="logo.png" class="logo">

<h1>KAGE NO TEIO</h1>
<h2>(SHADOW)</h2>

<div class="menu">

<div class="item">
<div class="btn"></div>
<div class="name">قاعدة بيانات</div>
</div>

<div class="item">
<div class="btn"></div>
<div class="name">تحميل ملفات</div>
</div>

<div class="item">
<div class="btn"></div>
<div class="name">جميع أسماء الأعضاء</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">تسجيل الإنضمام</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">فضائح عصابات</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">قوانين الدعس</div>
</div>

</div>

</body>
</html>
