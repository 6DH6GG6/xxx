<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* LOADING */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#00eaff;
font-size:22px;
letter-spacing:3px;
}

/* BODY */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
}

/* overlay */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
}

/* 🔥 جوانب مظللة */
body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
linear-gradient(to right, rgba(0,0,0,0.8), transparent 100px),
linear-gradient(to left, rgba(0,0,0,0.8), transparent 100px);
}

/* WRAPPER (نقطة التحكم) */
.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

/* LOGO */
.logo{
width:340px;
margin-bottom:20px;
filter:drop-shadow(0 0 35px #00eaff);
}

/* MENU ثابت */
.menu{
display:grid;
grid-template-columns:repeat(3, 260px);
grid-template-rows:repeat(2, 220px);
gap:30px;
}

/* BUTTON */
.btn{
position:relative;
width:260px;
height:220px;
background-size:cover;
background-position:center;
cursor:pointer;
transition:0.25s;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
}

.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.btn span{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px #00eaff;
}

/* 🔥 تصغير حسب الشاشة */
@media(max-width:1200px){
.wrapper{ transform:scale(0.9); }
}

@media(max-width:900px){
.wrapper{ transform:scale(0.75); }
}

@media(max-width:600px){
.wrapper{ transform:scale(0.6); }
}

@media(max-width:400px){
.wrapper{ transform:scale(0.5); }
}

</style>
</head>

<body>

<div class="wrapper">

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')"><span>أنمي</span></div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')"><span>فضائح عصابات</span></div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')"><span>قوانين الدعس</span></div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')"><span>ترسيم أعضاء</span></div>

<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')"><span>أسماء الظلال</span></div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')"><span>تحميل ملفات</span></div>

</div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
