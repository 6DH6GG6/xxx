<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
background:url('صور_متحركة/866f30792413dcb70ce06c91c1ad3f4e.gif') center/cover no-repeat;
color:white;
overflow-x:hidden;
cursor:none;
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:12px;
height:12px;
background:#00eaff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 15px #00eaff;
z-index:9999;
}

/* ===== STARS ===== */
.stars{
position:fixed;
inset:0;
background:url('https://i.imgur.com/7b1eZ.png');
opacity:0.2;
animation:moveStars 60s linear infinite;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* ===== LOGO ===== */
.logo{
display:block;
margin:20px auto;
width:clamp(200px,60vw,450px);

filter:
drop-shadow(0 0 20px #00eaff)
drop-shadow(0 0 50px rgba(0,234,255,0.7));
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:2;
width:100%;
max-width:1200px;
margin:auto;
padding:10px;
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
width:100%;
aspect-ratio:4/3;

background-size:cover;
background-position:center;

clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;

cursor:pointer;
transition:0.3s;
}

/* شفافية خفيفة */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.3), transparent);
}

/* Hover */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:999;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:rgba(10,10,10,0.95);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px #00eaff;

transform:scale(0.7);
opacity:0;
transition:0.4s;
}

.popup.active .popup-box{
transform:scale(1);
opacity:1;
}

.popup-box h2{
color:#00eaff;
margin-bottom:10px;
}

.popup-box p{
color:#aaa;
margin-bottom:15px;
}

.popup-box button{
padding:10px 20px;
border:none;
background:#00eaff;
color:black;
border-radius:10px;
cursor:pointer;
}

/* ===== RESPONSIVE ===== */

/* تابلت */
@media(max-width:900px){
.menu{
grid-template-columns:repeat(2,1fr);
}
}

/* هاتف */
@media(max-width:500px){
.menu{
grid-template-columns:1fr;
}
.logo{
width:80%;
}
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="stars"></div>

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="container">

<div class="menu">

<div class="btn" onclick="openMenu('أنمي')" style="background-image:url('Pictures/20260426_155749.png')"></div>

<div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('Pictures/20260426_160952.png')"></div>

<div class="btn" onclick="openMenu('قوانين الدعس')" style="background-image:url('Pictures/20260426_155319.png')"></div>

<div class="btn" onclick="openMenu('ترسيم أعضاء')" style="background-image:url('Pictures/20260426_160315.png')"></div>

<div class="btn" onclick="openMenu('أسماء الظلال')" style="background-image:url('Pictures/20260426_160850.png')"></div>

<div class="btn" onclick="openMenu('تحميل ملفات')" style="background-image:url('Pictures/20260426_154329.png')"></div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h2 id="popupTitle"></h2>
<p>الظلال تتربص في ظلام</p>
<button onclick="closeMenu()">إغلاق</button>
</div>
</div>

<script>

/* CURSOR */
let cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* OPEN */
function openMenu(title){
document.getElementById("popupTitle").innerText = title;
document.getElementById("popup").classList.add("active");
}

/* CLOSE */
function closeMenu(){
document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
