<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio (Shadow)</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Tahoma;
}

body {
    background: radial-gradient(circle, #000 40%, #1a0000 100%);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* العنوان */
header {
    margin: 30px 0;
    text-align: center;
}

header h1 {
    color: gold;
    font-size: 40px;
}

header span {
    color: #ccc;
    font-size: 18px;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    gap: 20px;
    justify-content: center;
}

/* شكل المثلث */
.card {
    width: 200px;
    height: 180px;
    background: linear-gradient(135deg, #111, #330000);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 15px;
    cursor: pointer;
    transition: 0.3s;
    border: 2px solid rgba(255,0,0,0.3);
}

.card:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px red;
    border-color: red;
}

/* النص داخل الزر */
.card span {
    font-size: 14px;
    text-align: center;
    color: #00eaff;
}

/* صف ثاني مقلوب */
.card.down {
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* ريسبونسف */
@media(max-width: 768px){
    .grid {
        grid-template-columns: repeat(2, 150px);
    }

    .card {
        width: 150px;
        height: 140px;
    }
}
</style>

</head>
<body>

<header>
    <h1>Kage No Teio</h1>
    <span>(Shadow)</span>
</header>

<div class="grid">

    <div class="card"><span>قاعدة بيانات</span></div>
    <div class="card"><span>تحميل ملفات</span></div>
    <div class="card"><span>جميع أسماء أعضاء الطائفة</span></div>

    <div class="card down"><span>تسجيل الإنضمام</span></div>
    <div class="card down"><span>فضائح عصابات</span></div>
    <div class="card down"><span>قوانين الدعس</span></div>

</div>

</body>
</html>
