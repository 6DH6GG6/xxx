<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Game UI</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:#000;
  display:flex;
  justify-content:center;
}

/* الحاوية */
.container{
  width:100%;
  max-width:1200px;
  padding:40px 20px;
}

/* الشبكة */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

/* الكرت */
.card{
  position:relative;
  height:230px;
  color:#fff;
  overflow:hidden;
  cursor:pointer;

  clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
  border:2px solid rgba(0,255,255,0.2);
  transition:0.4s;
}

/* الصورة */
.card img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.7);
  transition:0.4s;
}

/* الطبقة الداكنة */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* النص */
.card span{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-weight:bold;
  letter-spacing:2px;
}

/* hover فاخر */
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f0ff;
}

.card:hover img{
  transform:scale(1.1);
  filter:brightness(1);
}

/* تأثير نيون خفيف */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid transparent;
  transition:0.3s;
}

.card:hover::after{
  border-color:#00f0ff;
  box-shadow:0 0 15px #00f0ff inset;
}

/* الاستجابة */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="container">
  <div class="grid">

    <div class="card">
      <img src="https://picsum.photos/400/300?1">
      <span>TEAM</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?2">
      <span>STORY</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?3">
      <span>CHALLENGE</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?4">
      <span>ARENA</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?5">
      <span>FAIR PLAY</span>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?6">
      <span>TRAINING</span>
    </div>

  </div>
</div>

</body>
</html>
