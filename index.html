<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/bg.jpg') center/cover no-repeat;
position:relative;
overflow:hidden;
color:white;
}

/* طبقة ظلام */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* الشعار */
.logo{
width:280px;
margin-bottom:30px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* ===== الشبكة 3x2 ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:30px;
justify-items:center;
align-items:center;
max-width:900px;
}

/* الزر PNG فقط */
.btn{
width:240px;
height:200px;

/* الصورة هي الشكل الحقيقي */
background-size:contain;
background-repeat:no-repeat;
background-position:center;

cursor:pointer;
transition:0.25s;

/* بدون أي شكل مستطيل */
border:none;
outline:none;
background-color:transparent;

/* عمق فقط */
filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));
}

/* hover */
.btn:hover{
transform:scale(1.08);
filter:drop-shadow(0 0 25px #00eaff);
}

/* موبايل */
@media(max-width:900px){
.menu{
grid-template-columns:repeat(2, 1fr);
}

.btn{
width:160px;
height:140px;
}
}

@media(max-width:500px){
.menu{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<!-- الشعار -->
<img src="Developer/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- 🔥 6 أزرار 3×2 -->
<div class="menu">

<div class="btn" onclick="go('background.html')" style="background-image:url('Pictures/20260426_131157.png')"></div>
<div class="btn" onclick="go('developers.html')" style="background-image:url('Pictures/btn2.png')"></div>
<div class="btn" onclick="go('pictures.html')" style="background-image:url('Pictures/btn3.png')"></div>

<div class="btn" onclick="go('team.html')" style="background-image:url('Pictures/btn4.png')"></div>
<div class="btn" onclick="go('arena.html')" style="background-image:url('Pictures/btn5.png')"></div>
<div class="btn" onclick="go('training.html')" style="background-image:url('Pictures/btn6.png')"></div>

</div>

<script>
function go(page){
window.location = page;
}
</script>

</body>
</html>
