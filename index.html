<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kage No Teio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: white;
            overflow-x: auto;
            overflow-y: auto;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        @keyframes scrollText {
            from { right: -100%; }
            to { right: 100%; }
        }

        @keyframes lightMove {
            from { left: -50%; }
            to { left: 120%; }
        }

        @keyframes waveMove {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translate(-50%, -50%) scale(25);
                opacity: 0;
            }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000; }
            25% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; }
            50% { text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
            75% { text-shadow: 0 0 5px #ff0000, 0 0 20px #ff0000; }
        }

       .profile-header {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10005;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px 6px 6px;
            border-radius: 50px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

       .profile-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255,0,0,0.6);
        }

       .profile-name {
            color: #ff0000;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
        }

        #mainSite {
            display: block;
            position: relative;
            min-height: 100vh;
            background: #000;
        }

       .wave-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            overflow: hidden;
        }

       .wave {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,0,0.35) 0%, rgba(255,0,0,0.15) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: waveMove 1.4s ease-out forwards;
            filter: blur(2px);
        }

       .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
            z-index: 1;
            pointer-events: none;
        }

       .stars {
            position: fixed;
            inset: 0;
            background: url('ALBOMS/IMAGE/GIF/866f30792413dcb70ce06c91c1ad3f4e.gif');
            opacity: 0.12;
            animation: moveStars 120s linear infinite;
            z-index: 2;
        }

       .menu-page {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
            transition: 0.4s ease;
        }

       .menu-page.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

       .menu-header {
            background: linear-gradient(90deg, #8b0000, #ff1a1a);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px red;
        }

       .menu-header h2 {
            color: white;
            font-size: 20px;
        }

       .menu-header button {
            background: black;
            color: red;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }

       .menu-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }

       .exit-popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
            z-index: 10000;
        }

       .exit-popup.active {
            opacity: 1;
            pointer-events: auto;
        }

       .exit-box {
            background: url('ALBOMS/IMAGE/GIF/abp45jcll7d51.gif') center/cover no-repeat;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px #ff0000;
            width: 90%;
            max-width: 400px;
        }

       .exit-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

       .exit-buttons button {
            padding: 10px 25px;
            border: none;
            background: #ff0000;
            color: black;
            border-radius: 10px;
            cursor: pointer;
            min-height: 44px;
        }

       .site-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 3;
            padding-top: 80px;
        }

       .logo {
            width: clamp(180px, 45vw, 420px);
            margin-top: 15px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 25px #ff0000);
            z-index: 2;
        }

       .frame-box {
            width: 100%;
            max-width: 1000px;
            height: 80px;
            margin: 10px 0 20px 0;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,234,255,0.3);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,234,255,0.2);
            z-index: 2;
        }

       .frame-gif {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }

       .frame-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

       .frame-text span {
            position: absolute;
            color: #ff0000;
            font-weight: bold;
            font-size: clamp(14px, 2.5vw, 18px);
            white-space: nowrap;
            text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
            animation: scrollText 10s linear infinite, glitch 1s infinite;
        }

       .frame-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: -50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(0,234,255,0.5), transparent);
            animation: lightMove 4s linear infinite;
        }

       .container {
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

       .fighter-grid {
            width: clamp(320px, 90vw, 1000px);
            position: relative;
        }

       .menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5%;
            width: 100%;
        }

       .btn {
            position: relative;
            aspect-ratio: 16/9;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 0.8s ease forwards;
            min-height: 44px;
        }

       .btn:nth-child(1) { animation-delay: 0.2s; }
       .btn:nth-child(2) { animation-delay: 0.4s; }
       .btn:nth-child(3) { animation-delay: 0.6s; }
       .btn:nth-child(4) { animation-delay: 0.8s; }
       .btn:nth-child(5) { animation-delay: 1s; }
       .btn:nth-child(6) { animation-delay: 1.2s; }

       .btn:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 20px #ff0000);
        }

       .popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
            z-index: 999;
        }

       .popup.active {
            opacity: 1;
            pointer-events: auto;
        }

       .popup-box {
            background: rgba(10,10,10,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px #ff0000;
            transform: scale(0.7);
            opacity: 0;
            transition: 0.4s;
            width: 90%;
            max-width: 400px;
        }

       .popup.active.popup-box {
            transform: scale(1);
            opacity: 1;
        }

       .popup-box h2 {
            color: #ff0000;
            margin-bottom: 10px;
        }

       .popup-box p {
            color: #aaa;
            margin-bottom: 20px;
        }

       .popup-box button {
            padding: 10px 25px;
            border: none;
            background: #ff0000;
            color: black;
            border-radius: 10px;
            cursor: pointer;
            min-height: 44px;
        }

        @media (max-width: 480px) {
           .profile-name {
                display: none;
            }
           .frame-box {
                height: 60px;
            }
           .menu-header h2 {
                font-size: 18px;
            }
           .exit-box {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-header">
        <img src="profile.jpg" class="profile-img" alt="Profile">
        <div class="profile-name">Kage No Teio</div>
    </div>

    <div id="mainSite">
        <div class="wave-layer" id="waveLayer"></div>
        <div class="bg-overlay"></div>
        <div class="stars"></div>

        <div class="exit-popup" id="exitPopup">
            <div class="exit-box">
                <h2>هل تريد الخروج؟</h2>
                <div class="exit-buttons">
                    <button onclick="confirmExit()">نعم</button>
                    <button onclick="closeExit()">لا</button>
                </div>
            </div>
        </div>

        <div class="menu-page" id="menuPage">
            <div class="menu-header">
                <h2 id="menuTitle"></h2>
                <button onclick="closeMenuPage()">رجوع</button>
            </div>
            <div class="menu-content">
                <p id="menuDesc"></p>
            </div>
        </div>

        <div class="site-wrapper">
            <img src="ALBOMS/IMAGE/PNG/20260429_130547.png" class="logo" alt="Logo">

            <div class="frame-box">
                <img src="ALBOMS/IMAGE/GIF/how-to-create-a-light-streak-animation-in-after-effects.gif" class="frame-gif" alt="">
                <div class="frame-text">
                    <span>☠ الظلال تتربص في الظلام ☠</span>
                </div>
            </div>

            <div class="container">
                <div class="fighter-grid">
                    <div class="menu">
                        <div class="btn" onclick="openMenu('أنمي')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155749.png')" aria-label="أنمي"></div>
                        <div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160952.png')" aria-label="فضائح عصابات"></div>
                        <div class="btn" onclick="openMenu('قوانين الدعس')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155319.png')" aria-label="قوانين الدعس"></div>
                        <div class="btn" onclick="openMenu('ترسيم أعضاء')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160315.png')" aria-label="ترسيم أعضاء"></div>
                        <div class="btn" onclick="openMenu('أسماء الظلال')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160850.png')" aria-label="أسماء الظلال"></div>
                        <div class="btn" onclick="openMenu('تحميل ملفات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_154329.png')" aria-label="تحميل ملفات"></div>
                    </div>
                </div>
            </div>

            <div class="popup" id="popup">
                <div class="popup-box">
                    <h2 id="popupTitle"></h2>
                    <p>الظلال تتربص في ظلام</p>
                    <button onclick="closeMenu()">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let menuData = {
            "أنمي": "قسم الأنمي - هنا تجد أحدث حلقات الأنمي المترجمة",
            "فضائح عصابات": "أرشيف الفضائح - ملفات سرية عن العصابات",
            "قوانين الدعس": "قوانين الطائفة - اقرأها قبل الدخول",
            "ترسيم أعضاء": "نظام الترسيم - كيف تصبح من الظلال",
            "أسماء الظلال": "قائمة الظلال - أعضاء المملكة",
            "تحميل ملفات": "قسم التحميل - أدوات وملفات خاصة"
        };

        window.openMenu = function(title) {
            document.getElementById("menuTitle").innerText = title;
            document.getElementById("menuDesc").innerText = menuData || "لا يوجد محتوى";
            document.getElementById("menuPage").classList.add("active");
            history.pushState({ page: "menu" }, "");
        }[title]

        window.closeMenuPage = function() {
            document.getElementById("menuPage").classList.remove("active");
        }

        window.closeMenu = function() {
            document.getElementById("popup").classList.remove("active");
        }

        let exitArmed = false;
        history.pushState({page:"home"}, "");

        window.addEventListener("popstate", function () {
            let menu = document.getElementById("menuPage");
            if(menu.classList.contains("active")){
                menu.classList.remove("active");
                return;
            }
            if(!exitArmed){
                exitArmed = true;
                document.getElementById("exitPopup").classList.add("active");
                history.pushState({page:"home"}, "");
                setTimeout(()=> exitArmed = false, 3000);
            } else {
                window.close();
            }
        });

        let frameTexts = [
            "طائفة الظلام، يعود تاريخ تأسيس المملكة في عام 2019",
            "لدينا أعين في كل مكان نحن الظلال نتربص في ظلال",
            "نخب 🥂 زوار الكرام، حتا لو كانو من الخصوم فا نشارك النخب تواضعًا 👑",
        ];
        let frameIndex = 0;
        let frameSpan = document.querySelector(".frame-text span");

        if (frameSpan) {
            setInterval(() => {
                frameIndex = (frameIndex + 1) % frameTexts.length;
                frameSpan.innerText = frameTexts;
            }, 4000);
        }[frameIndex]

        window.confirmExit = function() {
            window.close();
        }

        window.closeExit = function() {
            document.getElementById("exitPopup").classList.remove("active");
        }

        const waveLayer = document.getElementById("waveLayer");
        let canWave = true;
        document.addEventListener("pointerdown", createWave);

        function createWave(e){
            if(!canWave) return;
            canWave = false;
            const wave = document.createElement("div");
            wave.className = "wave";
            wave.style.left = e.clientX + "px";
            wave.style.top = e.clientY + "px";
            waveLayer.appendChild(wave);
            setTimeout(() => {
                wave.remove();
                canWave = true;
            }, 1200);
        }
    </script>
</body>
</html>
