<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Shadows</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #000000, #2b0000, #ff0000, #6a00ff, #000000);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* الغلاف */
.cover {
    width: 100%;
    height: 230px;
    background: url('20260328_013942.jpg') center/cover no-repeat;
}

/* الاسم */
.title {
    color: white;
    font-size: 28px;
    margin-top: 10px;
    text-shadow: 0 0 10px red, 0 0 25px purple, 0 0 40px red;
}

/* المربعات */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 15px;
    padding: 20px;
}

.box {
    width: 100%;
    padding-top: 100%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.box img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* عرض الصورة */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* الصورة الدائرية */
.profile {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid purple;
    box-shadow: 0 0 15px red;
    cursor: pointer;
}

.profile img {
    width: 100%;
    height: 100%;
}

/* القائمة */
.menu {
    position: fixed;
    bottom: 100px;
    left: 20px;
    width: 250px;
    background: rgba(0,0,0,0.9);
    border-radius: 15px;
    padding: 15px;
    display: none;
    box-shadow: 0 0 20px purple;
}

/* الأزرار */
.menu-btn {
    display: inline-block;
    margin: 10px;
    text-align: center;
}

.menu-btn img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

.menu-btn p {
    color: white;
    font-size: 12px;
    margin: 5px 0 0;
}
</style>
</head>

<body>

<div class="cover"></div>
<div class="title">KingDom Shadows ✦ مملكة الظلال</div>

<div class="grid">
    <div class="box" onclick="openImg(this)">
        <img src="1.png" data-full="1.png">
    </div>
    <div class="box" onclick="openImg(this)">
        <img src="2.png" data-full="2.png">
    </div>
    <div class="box" onclick="openImg(this)">
        <img src="3.png" data-full="3.png">
    </div>
    <div class="box" onclick="openImg(this)">
        <img src="4.png" data-full="4.png">
    </div>
    <div class="box" onclick="openImg(this)">
        <img src="5.png" data-full="5.png">
    </div>
    <div class="box" onclick="openImg(this)">
        <img src="6.png" data-full="6.png">
    </div>
</div>

<div class="viewer" id="viewer" onclick="closeImg(event)">
    <img id="viewerImg">
</div>

<div class="profile" onclick="toggleMenu()">
    <img src="20260329_085456.jpg">
</div>

<div class="menu" id="menu">
    <a href="Band1.html" class="menu-btn">
        <img src="hggg.png">
        <p>القانون رقم 1</p>
    </a>

    <a href="page2.html" class="menu-btn">
        <img src="hggg.png">
        <p>القانون رقم 2</p>
    </a>

    <a href="page3.html" class="menu-btn">
        <img src="القانون رقم 2.jpg">
        <p>القانون رقم 3</p>
    </a>
</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openImg(el) {
    const img = el.querySelector("img");
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = img.dataset.full;
}

function closeImg(e) {
    if (e.target.id === "viewer") {
        document.getElementById("viewer").style.display = "none";
    }
}
</script>

</body>
</html>
