<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow:hidden;
cursor:none;
}

/* طبقة */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95));
backdrop-filter:blur(3px);
z-index:0;
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:12px;
height:12px;
background:#00eaff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 15px #00eaff;
z-index:9999;
}

/* ===== STARS ===== */
.stars{
position:fixed;
inset:0;
background:url('https://i.imgur.com/7b1eZ.png');
opacity:0.2;
animation:moveStars 60s linear infinite;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* ===== HUD ===== */
.hud{
position:fixed;
top:10px;
left:15px;
font-size:12px;
color:#00eaff;
line-height:1.6;
text-shadow:0 0 10px #00eaff;
z-index:2;
}

/* ===== SOCIAL ===== */
.social{
position:fixed;
right:15px;
top:15px;
z-index:2;
}

.social a{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
overflow:hidden;
box-shadow:0 0 15px #1877f2;
transition:0.3s;
}

.social a img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

.social a:hover{
transform:scale(1.2) rotate(5deg);
box-shadow:0 0 25px #00eaff;
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== LOGO ===== */
.logo{
width:clamp(200px,40vw,340px);
margin-bottom:10px;
filter:drop-shadow(0 0 25px #00eaff);
}

/* ===== TYPE TEXT ===== */
.type{
margin-bottom:15px;
color:#00eaff;
letter-spacing:2px;
font-size:14px;
}

/* ===== QUOTES ===== */
.quote{
position:fixed;
bottom:80px;
font-size:14px;
color:#aaa;
opacity:0;
transition:1s;
z-index:2;
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;

opacity:0;
transform:translateY(40px);
animation:fadeUp 0.8s ease forwards;
}

.btn:nth-child(1){animation-delay:0.2s;}
.btn:nth-child(2){animation-delay:0.4s;}
.btn:nth-child(3){animation-delay:0.6s;}
.btn:nth-child(4){animation-delay:0.8s;}
.btn:nth-child(5){animation-delay:1s;}
.btn:nth-child(6){animation-delay:1.2s;}

.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* ===== TEXT داخل الأزرار ===== */
.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:clamp(12px,1.6vw,17px);
font-weight:bold;
color:#00f7ff;

text-shadow:
0 0 5px #00f7ff,
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 35px rgba(0,234,255,0.7);

animation:glowText 2s infinite alternate;
}

/* ===== HOVER ===== */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glowText{
from{opacity:0.8;}
to{opacity:1;}
}

/* ===== FOOTER ===== */
.footer{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:12px;
color:#555;
z-index:2;
}

/* ===== MOBILE ===== */
@media(max-width:350px){
.menu{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- STARS -->
<div class="stars"></div>

<!-- HUD -->
<div class="hud">
STATUS: ONLINE<br>
RANK: SHADOW ELITE<br>
POWER: 98%
</div>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- MUSIC -->
<audio autoplay loop>
<source src="music.mp3">
</audio>

<!-- SOCIAL -->
<div class="social">
<a href="https://www.facebook.com/Kage.No.Teio2" target="_blank">
<img src="Pictures/facebook.jpg" alt="fb">
</a>
</div>

<div class="container">

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="type" id="typeText"></div>

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')"><span>أنمي</span></div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')"><span>فضائح عصابات</span></div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')"><span>قوانين الدعس</span></div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')"><span>ترسيم أعضاء</span></div>

<div class="btn" onclick="alert('اعضاء الظلال 😈')" style="background-image:url('Pictures/20260426_160850.png')"><span>أسماء الظلال</span></div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')"><span>تحميل ملفات</span></div>

</div>
</div>

<div class="quote" id="quote"></div>

<div class="footer">© Kage No Teio - Shadow System</div>

<script>

/* ===== NAV ===== */
function go(page){
let s=document.getElementById("clickSound");
if(s){
s.currentTime=0;
s.play();
}
setTimeout(()=>{
window.location.href=page;
},2000);
}

/* ===== CURSOR ===== */
let cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* ===== TYPE ===== */
let text="WELCOME TO SHADOW SYSTEM";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typeText").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}
type();

/* ===== QUOTES ===== */
let quotes=[
"We are the shadows...",
"Power hides in darkness",
"Observe. Adapt. Dominate."
];

setInterval(()=>{
let q=document.getElementById("quote");
q.innerText=quotes[Math.floor(Math.random()*quotes.length)];
q.style.opacity=1;

setTimeout(()=>{
q.style.opacity=0;
},4000);

},6000);

</script>

</body>
</html>
