<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
background:url('file_0000000089e071f8b71e687d9cf82965.png') no-repeat center center fixed;
background-size:cover;
overflow:hidden;
}

/* طبقة الظلام */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(4px);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* ===== العنوان ===== */
.logo{
width:160px;
margin-bottom:10px;
filter:drop-shadow(0 0 15px red);
}

h1{
font-size:55px;
color:#ff0000;
letter-spacing:3px;
text-shadow:
0 0 10px red,
0 0 30px red,
0 0 60px #ff0000;
}

/* زخرفة */
h1::after{
content:"✦ KAGE NO TEIO ✦";
display:block;
font-size:14px;
color:#aaa;
margin-top:5px;
letter-spacing:4px;
}

h2{
font-size:22px;
color:#ccc;
margin-bottom:40px;
}

/* ===== القائمة ===== */
.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

/* الصفوف */
.row{
display:flex;
gap:25px;
}

/* الصف السفلي ينزاح */
.row.bottom{
margin-top:-70px;
}

/* ===== الزر ===== */
.btn{
width:260px;
height:220px;
background:linear-gradient(145deg,#0a0a0a,#1a0000);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
cursor:pointer;
transition:.3s;
box-shadow:0 0 15px red inset, 0 0 20px red;

display:flex;
align-items:flex-end;
justify-content:center;
padding-bottom:20px;
}

.btn span{
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px red,0 0 20px red;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px red, 0 0 80px red;
}

.btn:active{
transform:scale(1.2);
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* زر ستارت */
.hex{
width:180px;
height:100px;
background:red;
clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px red;
transition:.3s;
}

.hex:hover{
transform:scale(1.1);
box-shadow:0 0 40px red;
}

/* 📱 موبايل */
@media(max-width:768px){

.row{
flex-direction:column;
}

.row.bottom{
margin-top:0;
}

.btn{
width:90%;
height:140px;
}

h1{
font-size:30px;
}

}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>KAGE NO TEIO</h1>
<h2>( Shadow )</h2>

<div class="menu">

<!-- الصف العلوي -->
<div class="row">
<div class="btn" onclick="go('index.html')"><span>قاعدة بيانات</span></div>
<div class="btn" onclick="go('index.html')"><span>تحميل ملفات</span></div>
<div class="btn" onclick="openMembers()"><span>أسماء الأعضاء</span></div>
</div>

<!-- الصف السفلي -->
<div class="row bottom">
<div class="btn" onclick="openJoin()"><span>تسجيل الإنضمام</span></div>
<div class="btn" onclick="go('index.html')"><span>فضائح عصابات</span></div>
<div class="btn" onclick="go('index.html')"><span>قوانين الدعس</span></div>
</div>

</div>

<!-- الأعضاء -->
<div class="overlay" id="members">
<h2>أعضاء الطائفة</h2>
</div>

<!-- تسجيل -->
<div class="overlay" id="join">
<h2>انضمام لطائفة الظلام</h2>
<div class="hex" onclick="start()">START</div>
</div>

<script>
function go(page){
event.target.closest('.btn').style.transform="scale(1.2)";
setTimeout(()=>{window.location=page},1000);
}

function openMembers(){
document.getElementById("members").style.display="flex";
}

function openJoin(){
document.getElementById("join").style.display="flex";
}

function start(){
fetch('/api/send', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status:"join_request"})
});
alert("تم الإرسال");
}
</script>

</body>
</html>
