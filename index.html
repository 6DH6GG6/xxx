<!DOCTYPE html>  <html lang="ar">    <head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Kage No Teio</title>  <style>    .ripple{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
border:2px solid rgba(255,0,0,0.8);
transform:translate(-50%,-50%);
pointer-events:none;
animation:waveRipple 1s ease-out;
z-index:9998;
}

.menu-page{
position:fixed;
inset:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;

display:flex;
flex-direction:column;

opacity:0;
transform:scale(1.1);
pointer-events:none;

transition:0.4s ease;
}

.menu-page.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

.menu-header{
background:linear-gradient(90deg,#8b0000,#ff1a1a);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px red;
}

.menu-header h2{
color:white;
font-size:20px;
}

.menu-header button{
background:black;
color:red;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

.menu-content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:18px;
text-align:center;
padding:20px;
}

.exit-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:1000;
}

.exit-popup.active{
opacity:1;
pointer-events:auto;
}

.exit-box{
background:url('ALBOMS/IMAGE/GIF/abp45jcll7d51.gif') center/cover no-repeat;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px #ff0000;
}

.exit-buttons{
margin-top:20px;
display:flex;
gap:15px;
justify-content:center;
}

.exit-buttons button{
padding:10px 25px;
border:none;
background:#ff0000;
color:black;
border-radius:10px;
cursor:pointer;
}

@keyframes rippleAnim{
0%{
width:0;
height:0;
opacity:0.6;
}
100%{
width:200px;
height:200px;
opacity:0;
}
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;

background:url('ALBOMS/IMAGE/SiteBackground/file_0000000089e071f8b71e687d9cf82965.png') center/cover no-repeat;

color:white;
overflow-x:hidden;
cursor:none;
}

/* 🔻 تعتيم احترافي */
.bg-overlay{
position:fixed;
inset:0;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.6),
rgba(0,0,0,0.85)
);

z-index:1;
pointer-events:none;
}

/* ✨ النجوم فوق التعتيم */
.stars{
position:fixed;
inset:0;

background:url('ALBOMS/IMAGE/GIF/866f30792413dcb70ce06c91c1ad3f4e.gif');

opacity:0.12;
animation:moveStars 120s linear infinite;

z-index:2;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

.cursor{
display:none;
}

/* 🚪 نافذة الخروج */
.exit-popup{
position:fixed;
inset:0;

background:rgba(0,0,0,0.85);

display:flex;
justify-content:center;
align-items:center;

opacity:0;
pointer-events:none;
transition:0.4s;

z-index:1000;
}

.exit-popup.active{
opacity:1;
pointer-events:auto;
}

.logo{
width:clamp(180px,45vw,420px);
margin-top:15px;
margin-bottom:15px;
filter:drop-shadow(0 0 25px #ff0000);
z-index:2;
}

.container{
z-index:2;
width:100%;
max-width:1100px;
padding:10px;
}

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;

opacity:0;
transform:translateY(40px);
animation:fadeUp 0.8s ease forwards;
}

.btn:nth-child(1){animation-delay:0.2s;}
.btn:nth-child(2){animation-delay:0.4s;}
.btn:nth-child(3){animation-delay:0.6s;}
.btn:nth-child(4){animation-delay:0.8s;}
.btn:nth-child(5){animation-delay:1s;}
.btn:nth-child(6){animation-delay:1.2s;}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff0000;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:999;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:rgba(10,10,10,0.95);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px #ff0000;

transform:scale(0.7);
opacity:0;
transition:0.4s;
}

.popup.active .popup-box{
transform:scale(1);
opacity:1;
}

.popup-box h2{
color:#ff0000;
margin-bottom:10px;
}

.popup-box p{
color:#aaa;
margin-bottom:20px;
}

.popup-box button{
padding:10px 25px;
border:none;
background:#ff0000;
color:black;
border-radius:10px;
cursor:pointer;
}

.frame-box{
width:100%;
max-width:1000px;
height:80px;

margin:10px 0 20px 0;

position:relative;
overflow:hidden;

background:rgba(0,0,0,0.2);

border:1px solid rgba(0,234,255,0.3);
border-radius:12px;

box-shadow:0 0 15px rgba(0,234,255,0.2);

z-index:2;
}

.frame-gif{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
}

.frame-text{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
overflow:hidden;
}

.frame-text span{
position:absolute;
color:#ff0000;
font-weight:bold;
font-size:18px;
white-space:nowrap;

text-shadow:
0 0 5px #ff0000,
0 0 10px #ff0000,
0 0 20px #ff0000;

animation:
scrollText 10s linear infinite,
glitch 1s infinite;
}

@keyframes scrollText{
from{ right:-100%; }
to{ right:100%; }
}

.frame-box::after{
content:"";
position:absolute;
top:0;
left:-50%;
width:50%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(0,234,255,0.5),
transparent
);

animation:lightMove 4s linear infinite;
}

@keyframes lightMove{
from{ left:-50%; }
to{ left:120%; }
}

@keyframes waveRipple{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:0.8;
}
100%{
transform:translate(-50%,-50%) scale(15);
opacity:0;
}
}

</style>
</head>
<body>

<!-- 🌑 تعتيم الخلفية -->
<div class="bg-overlay"></div>

<!-- ✨ النجوم -->
<div class="stars"></div>

<!-- 🚪 نافذة الخروج -->
<div class="exit-popup" id="exitPopup">
  <div class="exit-box">
    <h2>هل تريد الخروج؟</h2>
    <div class="exit-buttons">
      <button onclick="confirmExit()">نعم</button>
      <button onclick="closeExit()">لا</button>
    </div>
  </div>
</div>

<!-- 🎯 الكيرسر -->
<div class="cursor" id="cursor"></div>

<!-- 📂 صفحة القائمة -->
<div class="menu-page" id="menuPage">
  <div class="menu-header">
    <h2 id="menuTitle"></h2>
    <button onclick="closeMenuPage()">رجوع</button>
  </div>

  <div class="menu-content">
    <p id="menuDesc"></p>
  </div>
</div>

<!-- 🧊 محتوى الموقع -->
<img src="ALBOMS/IMAGE/PNG/20260429_130547.png" class="logo">

<div class="frame-box">
  <img src="ALBOMS/IMAGE/GIF/how-to-create-a-light-streak-animation-in-after-effects.gif" class="frame-gif">
  <div class="frame-text">
    <span>☠ الظلال تتربص في الظلام ☠</span>
  </div>
</div>

<div class="container">
  <div class="menu">
    <div class="btn" onclick="openMenu('أنمي')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155749.png')"></div>
    <div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160952.png')"></div>
    <div class="btn" onclick="openMenu('قوانين الدعس')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155319.png')"></div>
    <div class="btn" onclick="openMenu('ترسيم أعضاء')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160315.png')"></div>
    <div class="btn" onclick="openMenu('أسماء الظلال')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160850.png')"></div>
    <div class="btn" onclick="openMenu('تحميل ملفات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_154329.png')"></div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupTitle"></h2>
    <p>الظلال تتربص في ظلام</p>
    <button onclick="closeMenu()">إغلاق</button>
  </div>
</div>

<script>
// 🎯 Cursor
let cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});

// 📂 بيانات القوائم
let menuData = {
  "أنمي": "قسم الأنمي",
  "فضائح عصابات": "أرشيف الفضائح",
  "قوانين الدعس": "قوانين الطائفة",
  "ترسيم أعضاء": "نظام الترسيم",
  "أسماء الظلال": "قائمة الظلال",
  "تحميل ملفات": "قسم التحميل"
};

// 📂 فتح قائمة
function openMenu(title) {
  document.getElementById("menuTitle").innerText = title;
  document.getElementById("menuDesc").innerText = menuData[title] || "لا يوجد محتوى";
  document.getElementById("menuPage").classList.add("active");
  history.pushState({ page: "menu" }, "");
}

// 🔙 رجوع من القائمة
function closeMenuPage() {
  document.getElementById("menuPage").classList.remove("active");
}

// ❌ إغلاق popup
function closeMenu() {
  document.getElementById("popup").classList.remove("active");
}

// 🚪 نظام الرجوع الذكي
let exitArmed = false;
history.pushState({page:"home"}, "");

window.addEventListener("popstate", function () {

  let menu = document.getElementById("menuPage");

  // إذا داخل قائمة → يرجع فقط
  if(menu.classList.contains("active")){
    menu.classList.remove("active");
    return;
  }

  // أول رجوع → يظهر popup
  if(!exitArmed){
    exitArmed = true;
    document.getElementById("exitPopup").classList.add("active");

    history.pushState({page:"home"}, "");
    setTimeout(()=> exitArmed = false, 3000);
  }else{
    window.close();
  }
});

// ✨ نص متحرك
let frameTexts = [
"طائفة الظلام، يعود تاريخ تأسيس المملكة في عام 2019",
"لدينا أعين في كل مكان نحن الظلال نتربص في ظلال",
"نخب 🥂 زوار الكرام، حتا لو كانو من الخصوم فا نشارك النخب تواضعًا 👑",
];

let frameIndex = 0;
let frameSpan = document.querySelector(".frame-text span");

if (frameSpan) {
  setInterval(() => {
    frameIndex = (frameIndex + 1) % frameTexts.length;
    frameSpan.innerText = frameTexts[frameIndex];
  }, 4000);
}

// 💥 تأثير الضغط
document.addEventListener("click", function (e) {
  let ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = e.clientX + "px";
  ripple.style.top = e.clientY + "px";

  document.body.appendChild(ripple);

  setTimeout(() => ripple.remove(), 1000);
});

// 🚪 خروج
function confirmExit() {
  window.close();
}

function closeExit() {
  document.getElementById("exitPopup").classList.remove("active");
}
</script>

</body>
</html>
