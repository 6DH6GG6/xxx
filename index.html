<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahome;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('bg.jpg') center/cover no-repeat;
color:white;
overflow:hidden;
}

/* طبقة غامقة */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* ===== الشعار (PNG) ===== */
.logo{
width:320px;
margin-bottom:30px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* ===== الشبكة ===== */
.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

/* الصف */
.row{
display:flex;
gap:20px;
}

/* الصف السفلي */
.row.bottom{
margin-top:-90px;
}

/* ===== زر سداسي مائل ===== */
.hex{
width:260px;
height:220px;

clip-path:polygon(
25% 0%,
75% 0%,
100% 50%,
75% 100%,
25% 100%,
0% 50%
);

position:relative;
cursor:pointer;
overflow:hidden;
transition:.3s;

/* إطار أزرق */
border:4px solid rgba(0,200,255,0.8);
box-shadow:
0 0 15px #00eaff,
0 0 40px rgba(0,200,255,0.6);
}

/* الصورة داخل الزر */
.hex img{
width:100%;
height:100%;
object-fit:cover;
}

/* طبقة إضاءة */
.hex::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* النص */
.hex span{
position:absolute;
bottom:12px;
width:100%;
text-align:center;
font-size:18px;
font-weight:bold;
color:#00eaff;
text-shadow:0 0 10px #000;
}

/* hover */
.hex:hover{
transform:scale(1.08);
filter:brightness(1.2);
box-shadow:
0 0 30px #00eaff,
0 0 80px #00eaff;
}

/* ===== overlay ===== */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* زر START */
.start{
padding:15px 40px;
background:#00eaff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* 📱 موبايل */
@media(max-width:768px){

.row{
flex-direction:column;
}

.row.bottom{
margin-top:0;
}

.hex{
width:85%;
height:180px;
}

.logo{
width:200px;
}

}
</style>
</head>

<body>

<!-- 🔥 الشعار PNG -->
<img src="file_0000000066f471f7a9d478b981699827.png" class="logo">
<!-- حط هنا صورة Kage No Teio (shadow) شفافة -->

<div class="menu">

<!-- الصف العلوي -->
<div class="row">

<div class="hex" onclick="go('index.html')">
<img src="team.jpg">
<span>TEAM</span>
</div>

<div class="hex" onclick="go('index.html')">
<img src="story.jpg">
<span>STORY</span>
</div>

<div class="hex" onclick="openMembers()">
<img src="challenge.jpg">
<span>CHALLENGE</span>
</div>

</div>

<!-- الصف السفلي -->
<div class="row bottom">

<div class="hex" onclick="openJoin()">
<img src="arena.jpg">
<span>ARENA</span>
</div>

<div class="hex" onclick="go('index.html')">
<img src="fairplay.jpg">
<span>Fair Play</span>
</div>

<div class="hex" onclick="go('index.html')">
<img src="training.jpg">
<span>TRAINING</span>
</div>

</div>

</div>

<!-- الأعضاء -->
<div class="overlay" id="members">
<h2>أعضاء الطائفة</h2>
</div>

<!-- تسجيل -->
<div class="overlay" id="join">
<h2>انضمام لطائفة الظلام</h2>
<button class="start" onclick="start()">START</button>
</div>

<script>
function go(page){
window.location=page;
}

function openMembers(){
document.getElementById("members").style.display="flex";
}

function openJoin(){
document.getElementById("join").style.display="flex";
}

function start(){
fetch('/api/send', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status:"join_request"})
});
alert("تم الإرسال");
}
</script>

</body>
</html>
