<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95));
backdrop-filter:blur(3px);
z-index:0;
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:1;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== LOGO ===== */
.logo{
width:clamp(200px,40vw,340px);
margin-bottom:25px;
filter:drop-shadow(0 0 25px #00eaff);
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;
transition:0.2s;
}

.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:14px;
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:9999;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#0b0b0b;
padding:25px;
width:90%;
max-width:400px;
border-radius:15px;
text-align:center;
box-shadow:0 0 40px #00eaff;

transform:scale(0.7) translateY(40px);
opacity:0;
transition:0.4s;
}

.popup.active .popup-box{
transform:scale(1) translateY(0);
opacity:1;
}

/* زر إغلاق */
.close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
font-size:20px;
color:#00eaff;
}

/* وصف */
.desc{
margin-bottom:15px;
color:#aaa;
font-size:13px;
}

/* قائمة الأسماء */
.names{
max-height:200px;
overflow-y:auto;
padding:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

/* اسم */
.name{
padding:8px;
margin:5px 0;
background:rgba(0,0,0,0.5);
border-radius:8px;

/* glow */
text-shadow:0 0 8px #00eaff;
animation:glow 2s infinite alternate;
}

/* أنيميشن توهج */
@keyframes glow{
from{ text-shadow:0 0 5px #00eaff; }
to{ text-shadow:0 0 20px #00eaff; }
}

</style>
</head>

<body>

<div class="container">

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="btn"><span>أنمي</span></div>
<div class="btn"><span>فضائح عصابات</span></div>
<div class="btn"><span>قوانين الدعس</span></div>
<div class="btn"><span>ترسيم أعضاء</span></div>

<!-- 🔥 زر الظلال -->
<div class="btn" onclick="openShadows()">
<span>أسماء الظلال</span>
</div>

<div class="btn"><span>تحميل ملفات</span></div>

</div>

</div>

<!-- 💀 POPUP -->
<div id="popup" class="popup">

<div class="popup-box">

<span class="close" onclick="closePopup()">✕</span>

<h2>أسماء الظلال</h2>

<p class="desc">
اعضاء السابقين و الحاضرين في طائفة الظلام
</p>

<div class="names">

<div class="name">Shadow</div>
<div class="name">Alpha</div>
<div class="name">Beta</div>
<div class="name">Gamma</div>
<div class="name">Delta</div>
<div class="name">Epsilon</div>
<div class="name">Zeta</div>
<div class="name">Eta</div>
<div class="name">Theta</div>
<div class="name">Lambda</div>
<div class="name">Omega</div>

</div>

</div>

</div>

<script>

/* فتح */
function openShadows(){
document.getElementById("popup").classList.add("active");
}

/* إغلاق */
function closePopup(){
document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
