<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
}

/* طبقة احترافية */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* اللوقو */
.logo{
width:360px;
margin-bottom:25px;
filter:drop-shadow(0 0 35px #00eaff);
}

/* الشبكة */
.menu{
display:grid;
grid-template-columns:repeat(3, 280px);
grid-template-rows:repeat(2, 240px);
gap:35px;
justify-content:center;
}

/* الزر */
.btn{
position:relative;
width:280px;
height:240px;

background-size:cover;
background-position:center;

cursor:pointer;
transition:0.35s;

border:none;
overflow:hidden;

/* شكل مائل */
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);

filter:drop-shadow(0 10px 25px rgba(0,0,0,0.7));
}

/* طبقة تغميق داخل الزر */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* النص داخل الزر */
.btn span{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 10px #00eaff;
}

/* Hover */
.btn:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 30px #00eaff);
}

/* نزول الصف الثاني */
.menu .btn:nth-child(4),
.menu .btn:nth-child(5),
.menu .btn:nth-child(6){
margin-top:40px;
}

/* استجابة */
@media (max-width: 900px){
.menu{ transform:scale(0.8); }
.logo{ transform:scale(0.8); }
}

@media (max-width: 600px){
.menu{ transform:scale(0.65); }
.logo{ transform:scale(0.65); }
}

@media (max-width: 400px){
.menu{ transform:scale(0.5); }
.logo{ transform:scale(0.5); }
}

</style>
</head>

<body>

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')">
<span>أنمي</span>
</div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')">
<span>فضائح عصابات</span>
</div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')">
<span>قوانين الدعس</span>
</div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')">
<span>ترسيم أعضاء</span>
</div>

<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')">
<span>أسماء الظلال</span>
</div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')">
<span>تحميل ملفات</span>
</div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
