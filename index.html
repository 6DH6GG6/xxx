<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Gate</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#msg{
 position:fixed; top:10px; left:10px;
 color:white; background:#0008; padding:8px;
 font-size:13px;
}
</style>
</head>
<body>

<div id="msg">loading...</div>
<canvas id="c"></canvas>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

const msg = document.getElementById("msg");

/* renderer */
const renderer = new THREE.WebGLRenderer({
 canvas: document.getElementById("c"),
 antialias:true
});
renderer.setSize(innerWidth, innerHeight);

/* scene */
const scene = new THREE.Scene();

/* camera */
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,1.5,5);

/* light */
scene.add(new THREE.AmbientLight(0xffffff,2));

const l = new THREE.PointLight(0xffffff,3);
l.position.set(5,5,5);
scene.add(l);

/* debug cube (يتأكد إن المشهد شغال) */
const cube = new THREE.Mesh(
 new THREE.BoxGeometry(),
 new THREE.MeshNormalMaterial()
);
scene.add(cube);

/* loader */
let doorL=null, doorR=null;

new GLTFLoader().load(
"ALBOMS/3D/GLB/wooden_fantasy_double_doors.glb",

(gltf)=>{

 msg.innerText = "GLB loaded ✅";

 scene.remove(cube);

 const model = gltf.scene;
 scene.add(model);

 model.scale.set(1,1,1);

 /* إجبار الموديل يبان */
 const box = new THREE.Box3().setFromObject(model);
 const center = box.getCenter(new THREE.Vector3());
 const size = box.getSize(new THREE.Vector3()).length();

 model.position.sub(center);

 camera.position.set(0, size*0.5, size*1.5);
 camera.lookAt(0,0,0);

 /* أسماء */
 model.traverse(o=>{
  console.log("OBJ:",o.name);

  if(o.name.includes("Door_L")) doorL=o;
  if(o.name.includes("Door_R")) doorR=o;
 });

},

undefined,

(err)=>{
 msg.innerText = "❌ failed to load GLB";
 console.error(err);
}
);

/* animate */
let t=0;

function animate(){
 requestAnimationFrame(animate);
 t+=0.02;

 cube.rotation.y += 0.03;

 if(doorL && doorR){
  doorL.rotation.y = -Math.sin(t);
  doorR.rotation.y = Math.sin(t);
 }

 renderer.setClearColor(new THREE.Color(
  Math.sin(t)*0.5+0.5,
  0,
  Math.cos(t)*0.5+0.5
 ));

 renderer.render(scene,camera);
}
animate();

/* resize */
addEventListener("resize",()=>{
 renderer.setSize(innerWidth, innerHeight);
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
});

</script>
</body>
</html>
