<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Shadows</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0000, #000000 40%, #2b0033);
    text-align: center;
    overflow-x: hidden;
}

/* الغلاف */
.cover {
    width: 100%;
    height: 230px;
    background: url('20260328_013942.jpg') center/cover no-repeat;
}

/* الاسم */
.title {
    color: white;
    font-size: 28px;
    margin-top: 10px;
    text-shadow: 0 0 10px red, 0 0 25px purple, 0 0 40px red;
}

/* المربعات */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 15px;
    padding: 20px;
}

.box {
    width: 100%;
    padding-top: 100%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.box img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* عرض الصورة */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* الصورة الدائرية */
.profile {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid purple;
    box-shadow: 0 0 15px red;
    cursor: pointer;
}

.profile img {
    width: 100%;
    height: 100%;
}

/* القائمة */
.menu {
    position: fixed;
    bottom: 100px;
    left: 20px;
    width: 250px;
    background: rgba(0,0,0,0.9);
    border-radius: 15px;
    padding: 15px;
    display: none;
    box-shadow: 0 0 20px purple;
}

/* الأزرار */
.menu-btn {
    display: inline-block;
    margin: 10px;
    text-align: center;
}

.menu-btn img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

.menu-btn p {
    color: white;
    font-size: 12px;
    margin: 5px 0 0;
}
</style>
</head>

<body>

<div class="cover"></div>
<div class="title">KingDom Shadows ✦ مملكة الظلال</div>

<div class="grid">
    <div class="box" onclick="openImg('20260328_013942.jpg')"><img src="1.png"></div>
    <div class="box" onclick="openImg('2.png')"><img src="2.png"></div>
    <div class="box" onclick="openImg('3.png')"><img src="3.png"></div>
    <div class="box" onclick="openImg('4.png')"><img src="4.png"></div>
    <div class="box" onclick="openImg('5.png')"><img src="5.png"></div>
    <div class="box" onclick="openImg('6.png')"><img src="6.png"></div>
</div>

<div class="viewer" id="viewer" onclick="closeImg()">
    <img id="viewerImg">
</div>

<div class="profile" onclick="toggleMenu()">
    <img src="hggg.png">
</div>

<div class="menu" id="menu">
    <a href="page1.html" class="menu-btn">
        <img src="hggg.png">
        <p>زر 1</p>
    </a>

    <a href="page2.html" class="menu-btn">
        <img src="hggg.png">
        <p>زر 2</p>
    </a>

    <a href="page3.html" class="menu-btn">
        <img src="20260328_013942.jpg">
        <p>زر 3</p>
    </a>
</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openImg(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
