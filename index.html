<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== LOADING ===== */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:#00eaff;
font-size:22px;
letter-spacing:3px;
}

/* ===== BODY ===== */
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
opacity:0;
transition:opacity 1s;
}

body.show{
opacity:1;
}

/* overlay */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
}

/* ===== SOCIAL ===== */
.social{
position:fixed;
right:20px;
top:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#111;
transition:0.3s;
}

.social a.fb{ background:#1877f2; }

.social a:hover{
transform:scale(1.2);
box-shadow:0 0 20px currentColor;
}

/* ===== LOGO ===== */
.logo{
width:340px;
margin-bottom:20px;
filter:drop-shadow(0 0 35px #00eaff);
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 260px);
grid-template-rows:repeat(2, 220px);
gap:30px;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
width:260px;
height:220px;
background-size:cover;
background-position:center;
cursor:pointer;
transition:0.2s;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
transform-style:preserve-3d;
}

/* overlay */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* text */
.btn span{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

/* hover glow */
.btn:hover{
box-shadow:0 0 30px #00eaff;
}

/* ===== MOBILE SCALE ===== */
@media(max-width:900px){
.menu{transform:scale(0.8);}
.logo{transform:scale(0.8);}
}

@media(max-width:600px){
.menu{transform:scale(0.65);}
.logo{transform:scale(0.65);}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">LOADING...</div>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- SOCIAL -->
<div class="social">
<a href="https://www.facebook.com/Kage.No.Teio2" target="_blank" class="fb">F</a>
</div>

<!-- LOGO -->
<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- MENU -->
<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')"><span>أنمي</span></div>
<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')"><span>فضائح عصابات</span></div>
<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')"><span>قوانين الدعس</span></div>
<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')"><span>ترسيم أعضاء</span></div>
<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')"><span>أسماء الظلال</span></div>
<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')"><span>تحميل ملفات</span></div>

</div>

<script>

/* ===== LOADING ===== */
window.onload = () => {
document.getElementById("loader").style.display = "none";
document.body.classList.add("show");
};

/* ===== SOUND + NAV ===== */
function go(page){
document.getElementById("clickSound").play();
document.body.style.opacity = "0";

setTimeout(()=>{
window.location.href = page;
},400);
}

/* ===== 3D EFFECT ===== */
document.querySelectorAll('.btn').forEach(btn=>{
btn.addEventListener('mousemove', e=>{
const rect = btn.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

const rotateX = -(y - rect.height/2) / 10;
const rotateY = (x - rect.width/2) / 10;

btn.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});

btn.addEventListener('mouseleave', ()=>{
btn.style.transform = "rotateX(0) rotateY(0)";
});
});

</script>

</body>
</html>
