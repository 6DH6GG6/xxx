<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kage No Teio - GLB Gate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma;
        }

        body {
            min-height: 100vh;
            background: black;
            color: white;
            overflow: hidden;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; filter: blur(20px); }
            50% { opacity: 0.6; filter: blur(30px); }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes whiteFlashExpand {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .door-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .door-bg {
            position: absolute;
            inset: 0;
            background: url('ALBOMS/IMAGE/SiteBackground/file_000000006e2c722f9a965efdf432912b.png') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.3);
        }

        .door-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 80vh;
            background: radial-gradient(ellipse, rgba(160,32,240,0.6) 0%, transparent 70%);
            z-index: 2;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        #doorCanvas {
            width: 100%;
            height: 100%;
            display: block;
            z-index: 3;
            position: relative;
        }

        .click-hint {
            position: absolute;
            top: 20%;
            color: #a020f0;
            font-size: 18px;
            text-shadow: 0 0 15px #a020f0;
            z-index: 10001;
            opacity: 0;
            animation: fadeUp 1s ease 1s forwards;
            pointer-events: none;
        }

        .password-box {
            position: absolute;
            bottom: 15%;
            display: flex;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.4s;
            z-index: 10001;
        }

        .password-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .password-box input {
            padding: 12px 20px;
            border: 2px solid #a020f0;
            border-radius: 8px;
            outline: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(160,32,240,0.3);
        }

        .password-box button {
            padding: 12px 25px;
            background: #a020f0;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .password-box button:hover {
            background: #c040ff;
            box-shadow: 0 0 25px #a020f0;
            transform: scale(1.05);
        }

        .white-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            background: #fff;
            border-radius: 50%;
            z-index: 10002;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        .white-flash.active {
            animation: whiteFlashExpand 1.2s ease-out forwards;
        }

        .loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a020f0;
            font-size: 20px;
            z-index: 10001;
            text-shadow: 0 0 10px #a020f0;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, rgba(20,0,30,0.98), rgba(0,0,0,0.98));
            border: 3px solid;
            border-radius: 15px;
            padding: 40px 50px;
            text-align: center;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            min-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .modal-box.show {
            animation: modalIn 0.4s ease forwards;
            pointer-events: all;
        }

        .modal-box.error {
            border-color: #ff0000;
            box-shadow: 0 0 40px rgba(255,0,0,0.5);
        }

        .modal-box.success {
            border-color: #a020f0;
            box-shadow: 0 0 40px rgba(160,32,240,0.6);
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px currentColor);
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 15px currentColor;
        }

        .modal-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ddd;
        }

        .modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #a020f0, #7a1bb0);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .modal-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px #a020f0;
        }

        .modal-box.error .modal-btn {
            background: linear-gradient(135deg, #ff0000, #cc0000);
        }

        .modal-box.error .modal-btn:hover {
            box-shadow: 0 0 25px #ff0000;
        }

        .main-content {
            position: fixed;
            inset: 0;
            background: url('ALBOMS/IMAGE/SiteBackground/file_0000000089e071f8b71e687d9cf82965.png') center/cover no-repeat;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            opacity: 0;
        }

        .main-content.active {
            display: flex;
            opacity: 1;
        }

        .logo {
            width: clamp(180px, 45vw, 420px);
            margin: 15px 0;
            filter: drop-shadow(0 0 25px #ff0000);
            opacity: 0;
            animation: fadeUp 1s ease 0.3s forwards;
        }

        .welcome-text {
            font-size: 32px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin: 20px;
            opacity: 0;
            animation: fadeUp 1s ease 0.8s forwards;
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="modal-box error" id="errorModal">
        <div class="modal-icon">⚔️</div>
        <div class="modal-title" style="color: #ff0000;">مرفوض</div>
        <div class="modal-text">لست مؤهلاً لدخول المملكة<br>تم ركلك خارج المملكة من قبل الحراس</div>
        <button class="modal-btn" onclick="closeModal()">فهمت</button>
    </div>

    <div class="modal-box success" id="successModal">
        <div class="modal-icon">👑</div>
        <div class="modal-title" style="color: #a020f0;">مرحباً بك</div>
        <div class="modal-text">أهلاً بك في المملكة<br>نحن نرحب بك أيها الظل</div>
        <button class="modal-btn" onclick="enterKingdom()">دخول المملكة</button>
    </div>

    <div class="white-flash" id="whiteFlash"></div>

    <div class="door-screen" id="doorScreen">
        <div class="door-bg"></div>
        <div class="door-glow"></div>
        <div class="loading-msg" id="loadingMsg">جاري تحميل البوابة...</div>
        <div class="click-hint" id="clickHint">اضغط على البوابة للمتابعة</div>
        <canvas id="doorCanvas"></canvas>
        <div class="password-box" id="passBox">
            <input type="password" id="passInput" placeholder="كلمة السر">
            <button onclick="checkPass()">دخول</button>
        </div>
    </div>

    <audio id="doorSound" src="open.mp3"></audio>
    <audio id="bgMusic" src="bg.mp3" loop></audio>

    <div class="main-content" id="mainContent">
        <img src="ALBOMS/IMAGE/SiteBackground/file_00000000fc0c71f79e36a77cf0fc8677.png" class="logo">
        <div class="welcome-text">☠ مرحباً بك في طائفة الظلال ☠</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const doorScreen = document.getElementById("doorScreen");
        const passBox = document.getElementById("passBox");
        const whiteFlash = document.getElementById("whiteFlash");
        const clickHint = document.getElementById("clickHint");
        const loadingMsg = document.getElementById("loadingMsg");
        const mainContent = document.getElementById("mainContent");
        const doorSound = document.getElementById("doorSound");
        const bgMusic = document.getElementById("bgMusic");
        const modalOverlay = document.getElementById("modalOverlay");
        const errorModal = document.getElementById("errorModal");
        const successModal = document.getElementById("successModal");

        let doorL = null, doorR = null;
        let scene, camera, renderer, model;
        let doorOpening = false;
        let doorOpenProgress = 0;
        let canClickDoor = false;
        let passwordEntered = false;

        function initThreeJS() {
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById("doorCanvas"),
                antialias: true,
                alpha: true
            });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pointLight = new THREE.PointLight(0xa020f0, 8, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(0, 5);
            scene.add(dirLight);

            loadGLBModel();
            renderer.domElement.addEventListener('click', onDoorClick);
        }

        function loadGLBModel() {
            const loader = new GLTFLoader();
            
            loader.load(
                "ALBOMS/3D/GLB/بوابة_العبور.glb",
                (gltf) => {
                    loadingMsg.innerText = "";
                    setTimeout(() => loadingMsg.style.display = "none", 1000);

                    model = gltf.scene;
                    scene.add(model);

                    model.scale.x = -1;

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3()).length();
                    
                    model.position.sub(center);
                    model.position.y += size * 0.1;
                    
                    camera.position.set(0, size * 0.35, size * 1.3);
                    camera.lookAt(0, size * 0.2, 0);

                    model.traverse((obj) => {
                        const name = obj.name.toLowerCase();
                        if (name.includes("door_l") || name.includes("left") || name.includes("l_door")) {
                            doorL = obj;
                        }
                        if (name.includes("door_r") || name.includes("right") || name.includes("r_door")) {
                            doorR = obj;
                        }
                    });

                    if (!doorL && !doorR) {
                        doorL = model;
                        doorR = null;
                    }

                    canClickDoor = true;
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    loadingMsg.innerText = `جاري التحميل... ${percent}%`;
                },
                (err) => {
                    loadingMsg.innerText = "❌ فشل تحميل البوابة";
                    console.error("GLB Load Error:", err);
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);

            if (doorOpening && doorOpenProgress < Math.PI / 1.8) {
                doorOpenProgress += 0.025;
                
                if (doorL && doorR) {
                    doorL.rotation.y = -doorOpenProgress;
                    doorR.rotation.y = doorOpenProgress;
                } else if (doorL) {
                    doorL.rotation.y = -doorOpenProgress;
                }
            }

            renderer.render(scene, camera);
        }

        function onDoorClick() {
            if (!canClickDoor || passwordEntered) return;
            passBox.classList.add("active");
            clickHint.style.display = "none";
        }

        window.checkPass = function() {
            const val = document.getElementById("passInput").value;
            passBox.classList.remove("active");
            
            if (val === "الظلال666") {
                passwordEntered = true;
                showSuccessModal();
            } else {
                showErrorModal();
            }
        }

        function showErrorModal() {
            modalOverlay.classList.add("show");
            errorModal.classList.add("show");
        }

        function showSuccessModal() {
            modalOverlay.classList.add("show");
            successModal.classList.add("show");
        }

        window.closeModal = function() {
            modalOverlay.classList.remove("show");
            errorModal.classList.remove("show");
            successModal.classList.remove("show");
        }

        window.enterKingdom = function() {
            closeModal();
            
            doorSound.currentTime = 0;
            doorSound.play().catch(() => {});

            setTimeout(() => {
                doorOpening = true;
            }, 300);

            setTimeout(() => {
                whiteFlash.classList.add("active");
            }, 800);

            setTimeout(() => {
                doorScreen.style.display = "none";
                mainContent.classList.add("active");
                bgMusic.volume = 0.6;
                bgMusic.play().catch(() => {});
            }, 2000);
        }

        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") checkPass();
        });

        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        initThreeJS();
        animate();
    </script>
</body>
</html>
