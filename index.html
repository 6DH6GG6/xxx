<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow-x:hidden;
cursor:none;
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:10px;
height:10px;
background:#00eaff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 10px #00eaff;
z-index:9999;
}

/* ===== STARS ===== */
.stars{
position:fixed;
inset:0;
background:url('GIF/866f30792413dcb70ce06c91c1ad3f4e.gif');
opacity:0.2;
animation:moveStars 60s linear infinite;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* ===== LOGO ===== */
.logo{
width:clamp(180px,45vw,420px);
margin:20px 0;
filter:drop-shadow(0 0 25px #00eaff);
z-index:2;
}

/* ===== FRAME ===== */
.frame-box{
width:90%;
max-width:1000px;
height:80px;
margin-bottom:20px;
position:relative;
overflow:hidden;
background:rgba(0,0,0,0.2);
border-radius:12px;
box-shadow:0 0 15px rgba(0,234,255,0.2);
z-index:2;
}

.frame-gif{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
}

.frame-text{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
overflow:hidden;
}

.frame-text span{
position:absolute;
left:-100%;
white-space:nowrap;
color:#00eaff;
font-weight:bold;
font-size:18px;
animation:scrollText 6s linear;
}

@keyframes scrollText{
from{ left:-100%; }
to{ left:100%; }
}

/* ===== MENU ===== */
.container{
width:100%;
max-width:1100px;
padding:10px;
z-index:2;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.btn{
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
transition:0.3s;
opacity:0;
transform:translateY(40px);
animation:fadeUp 0.8s forwards;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00eaff;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px #00eaff;
}

.popup-box h2{
color:#00eaff;
margin-bottom:10px;
}

.popup-box button{
margin-top:15px;
padding:10px 25px;
border:none;
background:#00eaff;
color:black;
border-radius:10px;
cursor:pointer;
}

/* ===== RIPPLE ===== */
.ripple{
position:fixed;
border-radius:50%;
background:rgba(0,234,255,0.3);
transform:translate(-50%,-50%);
pointer-events:none;
animation:rippleAnim 0.8s ease-out;
z-index:9998;
}

@keyframes rippleAnim{
0%{width:0;height:0;opacity:0.6;}
100%{width:200px;height:200px;opacity:0;}
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="stars"></div>

<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="frame-box">
<img src="GIF/how-to-create-a-light-streak-animation-in-after-effects.gif" class="frame-gif">
<div class="frame-text">
<span></span>
</div>
</div>

<div class="container">
<div class="menu">

<div class="btn" onclick="openMenu('أنمي')" style="background-image:url('Pictures/20260426_155749.png')"></div>
<div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('Pictures/20260426_160952.png')"></div>
<div class="btn" onclick="openMenu('قوانين الدعس')" style="background-image:url('Pictures/20260426_155319.png')"></div>
<div class="btn" onclick="openMenu('ترسيم أعضاء')" style="background-image:url('Pictures/20260426_160315.png')"></div>
<div class="btn" onclick="openMenu('أسماء الظلال')" style="background-image:url('Pictures/20260426_160850.png')"></div>
<div class="btn" onclick="openMenu('تحميل ملفات')" style="background-image:url('Pictures/20260426_154329.png')"></div>

</div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<h2 id="popupTitle"></h2>
<button onclick="closeMenu()">إغلاق</button>
</div>
</div>

<script>

/* CURSOR */
let cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* POPUP */
function openMenu(title){
document.getElementById("popupTitle").innerText=title;
document.getElementById("popup").classList.add("active");
}

function closeMenu(){
document.getElementById("popup").classList.remove("active");
}

/* RIPPLE */
document.addEventListener("click",function(e){
let ripple=document.createElement("div");
ripple.className="ripple";
ripple.style.left=e.clientX+"px";
ripple.style.top=e.clientY+"px";
document.body.appendChild(ripple);
setTimeout(()=>ripple.remove(),800);
});

/* TEXT */
let texts=[
"☠ الظلال تتربص في الظلام ☠",
"♦𖤐طائفة الظلام منذ 2019𖤐♦",
"♠👁لدينا أعين في كل مكان👁♠",
"👑نرحب بالزوار الكرام👑"
];

let i=0;
let span=document.querySelector(".frame-text span");

function runText(){
span.innerText=texts[i];
span.style.animation="none";
span.style.left="-100%";
void span.offsetWidth;
span.style.animation="scrollText 6s linear";

i=(i+1)%texts.length;
}

runText();
setInterval(runText,6000);

</script>

</body>
</html>
