<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
color:white;
overflow:hidden;
}

/* overlay */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
z-index:0;
}

.container{
position:relative;
z-index:1;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== SOCIAL ===== */
.social{
position:fixed;
right:15px;
top:15px;
z-index:999;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#1877f2;
color:white;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
box-shadow:0 0 20px #1877f2;
}

/* ===== LOGO ===== */
.logo{
width:clamp(200px, 40vw, 340px);
margin-bottom:25px;
filter:drop-shadow(0 0 25px #00eaff);
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio: 4/3; /* يخلي الحجم ثابت */
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
transition:0.3s;
overflow:hidden;
}

/* overlay */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* text */
.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:clamp(12px, 2vw, 18px);
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

/* hover */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* ===== SMALL SCREENS ===== */
@media(max-width:600px){

.menu{
gap:12px;
}

.btn span{
font-size:12px;
}

}

/* ===== VERY SMALL ===== */
@media(max-width:350px){

.menu{
grid-template-columns:repeat(2, 1fr);
}

}

</style>
</head>

<body>

<!-- SOCIAL -->
<div class="social">
<a href="https://www.facebook.com/Kage.No.Teio2" target="_blank">F</a>
</div>

<div class="container">

<!-- LOGO -->
<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- MENU -->
<div class="menu">

<div class="btn" onclick="go('anime.html')" style="background-image:url('Pictures/20260426_155749.png')"><span>أنمي</span></div>

<div class="btn" onclick="go('gangs.html')" style="background-image:url('Pictures/20260426_160952.png')"><span>فضائح عصابات</span></div>

<div class="btn" onclick="go('rules.html')" style="background-image:url('Pictures/20260426_155319.png')"><span>قوانين الدعس</span></div>

<div class="btn" onclick="go('members.html')" style="background-image:url('Pictures/20260426_160315.png')"><span>ترسيم أعضاء</span></div>

<div class="btn" onclick="go('shadows.html')" style="background-image:url('Pictures/20260426_160850.png')"><span>أسماء الظلال</span></div>

<div class="btn" onclick="go('download.html')" style="background-image:url('Pictures/20260426_154329.png')"><span>تحميل ملفات</span></div>

</div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
