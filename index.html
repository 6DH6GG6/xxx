<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الظلال</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>

</head>
<body>

<canvas id="bg"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

/* إعداد */
const renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("bg"),
    antialias:true
});
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

/* إضاءة */
scene.add(new THREE.AmbientLight(0xffffff,2));

const red = new THREE.PointLight(0xff0000,3);
red.position.set(5,5,5);
scene.add(red);

const purple = new THREE.PointLight(0x8000ff,3);
purple.position.set(-5,5,5);
scene.add(purple);

/* =========================
   🔥 بوابة وهمية تظهر فورًا
========================= */

const doorGeo = new THREE.BoxGeometry(1, 2, 0.2);
const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });

const fakeDoorL = new THREE.Mesh(doorGeo, mat);
const fakeDoorR = new THREE.Mesh(doorGeo, mat);

fakeDoorL.position.x = -0.6;
fakeDoorR.position.x = 0.6;

scene.add(fakeDoorL);
scene.add(fakeDoorR);

/* إطار */
const frameGeo = new THREE.BoxGeometry(2.5, 3, 0.2);
const frameMat = new THREE.MeshStandardMaterial({
    color: 0x550000,
    wireframe: false
});
const frame = new THREE.Mesh(frameGeo, frameMat);
scene.add(frame);

/* =========================
   تحميل الموديل الحقيقي
========================= */

let realDoorL=null, realDoorR=null;
let modelLoaded = false;

new GLTFLoader().load(
"ALBOMS/3D/GLB/بوابة_العبور.glb",

(gltf)=>{
    const model = gltf.scene;
    scene.add(model);

    model.scale.set(2,2,2);
    model.position.set(0,-1,0);

    model.traverse((c)=>{
        if(c.name.includes("Door_L")) realDoorL=c;
        if(c.name.includes("Door_R")) realDoorR=c;
    });

    // 🔥 حذف الوهمية
    scene.remove(fakeDoorL);
    scene.remove(fakeDoorR);
    scene.remove(frame);

    modelLoaded = true;
},

undefined,

(err)=>{
    console.log("GLB فشل — نستخدم الوهمية");
}
);

/* حركة */
let t=0;

function animate(){
requestAnimationFrame(animate);
t+=0.02;

/* خلفية */
const r=Math.sin(t)*0.5+0.5;
const b=Math.cos(t)*0.5+0.5;
renderer.setClearColor(new THREE.Color(r,0,b));

/* تحريك */
if(modelLoaded && realDoorL && realDoorR){
    realDoorL.rotation.y = -Math.sin(t)*1.2;
    realDoorR.rotation.y = Math.sin(t)*1.2;
}else{
    // 👇 لو الموديل ما اشتغل
    fakeDoorL.rotation.y = -Math.sin(t)*1.2;
    fakeDoorR.rotation.y = Math.sin(t)*1.2;
}

renderer.render(scene,camera);
}

animate();

/* ريسبونس */
window.addEventListener("resize", ()=>{
renderer.setSize(innerWidth, innerHeight);
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
});

</script>

</body>
</html>
