<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/bg.jpg') center/cover no-repeat;
position:relative;
overflow:hidden;
color:white;
}

/* طبقة ظلام */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* الشعار */
.logo{
width:280px;
margin-bottom:25px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* ===== الهرم الرئيسي ===== */
.pyramid{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

/* الصف */
.row{
display:flex;
justify-content:center;
gap:40px;
}

/* زر الصورة (احترافي) */
.btn{
width:200px;
height:180px;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

cursor:pointer;
transition:0.3s;

border-radius:18px;

/* عمق وظل */
box-shadow:
0 10px 25px rgba(0,0,0,0.6),
0 0 15px rgba(0,200,255,0.4);

/* ميل خفيف يعطي إحساس هرمي */
transform: perspective(600px) rotateX(8deg);
}

/* عند المرور */
.btn:hover{
transform: perspective(600px) rotateX(0deg) scale(1.08);
box-shadow:
0 15px 35px rgba(0,0,0,0.8),
0 0 25px #00eaff;
}

/* موبايل */
@media(max-width:768px){
.row{
flex-direction:column;
gap:20px;
}

.btn{
width:80%;
height:160px;
}
}

</style>
</head>

<body>

<img src="Developer/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- 🔺 Pyramid Layout (6 buttons) -->
<div class="pyramid">

<!-- الصف 1 -->
<div class="row">
<div class="btn" onclick="go('background.html')" style="background-image:url('Pictures/bg_btn.png')"></div>
<div class="btn" onclick="go('developers.html')" style="background-image:url('Pictures/dev_btn.png')"></div>
</div>

<!-- الصف 2 -->
<div class="row">
<div class="btn" onclick="go('pictures.html')" style="background-image:url('Pictures/pic_btn.png')"></div>
<div class="btn" onclick="go('team.html')" style="background-image:url('Pictures/team_btn.png')"></div>
</div>

<!-- الصف 3 -->
<div class="row">
<div class="btn" onclick="go('arena.html')" style="background-image:url('Pictures/arena_btn.png')"></div>
<div class="btn" onclick="go('training.html')" style="background-image:url('Pictures/train_btn.png')"></div>
</div>

</div>

<script>
function go(page){
window.location = page;
}
</script>

</body>
</html>
