<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Door Gate</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Tahoma;
}

/* شاشة القفل */
#lockScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #000, #120012);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

input {
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #111;
    color: white;
    text-align: center;
    width: 200px;
}

#msg {
    color: red;
    margin-top: 10px;
}

/* المشهد */
#scene {
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="lockScreen">
    <input type="password" id="pass" placeholder="Enter Password">
    <div id="msg"></div>
</div>

<!-- 3D -->
<div id="scene"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let model;

// =========================
// تشغيل المشهد
// =========================
function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("scene").appendChild(renderer.domElement);

    // 🔥 إضاءة قوية
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(2, 2, 5);
    scene.add(light);

    // تحميل الباب
    const loader = new THREE.GLTFLoader();

    loader.load(
        "ALBOMS/3D/GLB/gate_renamed.glb",

        function(gltf) {

            model = gltf.scene;

            // 🔥 إصلاح مهم جداً (حجم + مكان)
            model.scale.set(1.5, 1.5, 1.5);
            model.position.set(0, -1, 0);

            scene.add(model);

            animate();
        },

        undefined,
        function(error) {
            console.log("GLB ERROR:", error);
        }
    );

    camera.position.z = 4;
}

// =========================
// أنيميشن
// =========================
function animate() {

    requestAnimationFrame(animate);

    if (model) {
        model.rotation.y += 0.003;
    }

    renderer.render(scene, camera);
}

init();

// =========================
// كلمة السر
// =========================
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");
const lock = document.getElementById("lockScreen");

pass.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {

        if (pass.value === "shadow") {

            msg.innerText = "✔ Opening Gate...";

            setTimeout(() => {

                lock.style.transition = "1s";
                lock.style.opacity = "0";

                setTimeout(() => {
                    lock.style.display = "none";
                    openDoor();
                }, 1000);

            }, 500);

        } else {
            msg.innerText = "❌ Wrong Password";
        }
    }
});

// =========================
// فتح الباب
// =========================
function openDoor() {

    if (!model) return;

    let speed = 0;

    function anim() {

        speed += 0.02;

        model.rotation.y += 0.03;
        model.position.z += 0.02;

        if (speed < 2) {
            requestAnimationFrame(anim);
        }
    }

    anim();
}

</script>

</body>
</html>
