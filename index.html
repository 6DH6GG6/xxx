<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/bg.jpg') center/cover no-repeat;
color:white;
overflow:hidden;
position:relative;
}

/* طبقة غامقة */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* الشعار */
.logo{
width:300px;
margin-bottom:25px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* الشبكة */
.menu{
display:grid;
grid-template-columns:repeat(3, 260px);
gap:25px;
justify-content:center;
}

/* زر سداسي */
.hex{
width:260px;
height:220px;
clip-path:polygon(
25% 0%,
75% 0%,
100% 50%,
75% 100%,
25% 100%,
0% 50%
);

cursor:pointer;
overflow:hidden;
transition:.3s;
border:4px solid rgba(0,200,255,0.8);
box-shadow:0 0 15px #00eaff;
position:relative;
}

/* الصورة */
.hex img{
width:100%;
height:100%;
object-fit:cover;
}

/* overlay */
.hex::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* النص */
.hex span{
position:absolute;
bottom:12px;
width:100%;
text-align:center;
font-size:18px;
font-weight:bold;
color:#00eaff;
text-shadow:0 0 10px #000;
}

/* hover */
.hex:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00eaff;
}

/* overlay */
.overlay{
position:fixed;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* زر */
.start{
padding:15px 40px;
background:#00eaff;
border:none;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

/* موبايل */
@media(max-width:900px){
.menu{
grid-template-columns:1fr;
}

.hex{
width:80%;
margin:auto;
}

.logo{
width:200px;
}
}
</style>
</head>

<body>

<!-- 🔥 الشعار (Developer) -->
<img src="Developer/Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<div class="menu">

<div class="hex" onclick="go('background.html')">
<img src="Pictures/team.jpg">
<span>Background</span>
</div>

<div class="hex" onclick="go('developers.html')">
<img src="Pictures/story.jpg">
<span>Developers</span>
</div>

<div class="hex" onclick="openMembers()">
<img src="Pictures/challenge.jpg">
<span>Pictures</span>
</div>

</div>

<!-- الأعضاء -->
<div class="overlay" id="members">
<h2>أعضاء الطائفة</h2>
</div>

<!-- تسجيل -->
<div class="overlay" id="join">
<h2>انضمام لطائفة الظلام</h2>
<button class="start" onclick="start()">START</button>
</div>

<script>
function go(page){
window.location = page;
}

function openMembers(){
document.getElementById("members").style.display="flex";
}

function start(){
alert("تم الإرسال");
}
</script>

</body>
</html>
