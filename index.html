<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
}

/* طبقة احترافية */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* ===== Social Menu ===== */
.social{
position:fixed;
right:20px;
top:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#111;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* ألوان */
.social a.fb{ background:#1877f2; }
.social a.dc{ background:#5865F2; }
.social a.tg{ background:#0088cc; }

.social a:hover{
transform:scale(1.15);
box-shadow:0 0 20px currentColor;
}

/* ===== اللوقو ===== */
.logo{
width:360px;
margin-bottom:25px;
filter:drop-shadow(0 0 35px #00eaff);
}

/* ===== الشبكة ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 280px);
grid-template-rows:repeat(2, 240px);
gap:35px;
justify-content:center;
}

/* ===== الأزرار ===== */
.btn{
position:relative;
width:280px;
height:240px;

background-size:cover;
background-position:center;

cursor:pointer;
transition:0.35s;

border:none;
overflow:hidden;

clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
filter:drop-shadow(0 10px 25px rgba(0,0,0,0.7));
}

.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.btn span{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 10px #00eaff;
}

.btn:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 30px #00eaff);
}

/* نزول الصف الثاني */
.menu .btn:nth-child(4),
.menu .btn:nth-child(5),
.menu .btn:nth-child(6){
margin-top:40px;
}

/* استجابة */
@media (max-width: 900px){
.menu{ transform:scale(0.8); }
.logo{ transform:scale(0.8); }
}

@media (max-width: 600px){
.menu{ transform:scale(0.65); }
.logo{ transform:scale(0.65); }
}

@media (max-width: 400px){
.menu{ transform:scale(0.5); }
.logo{ transform:scale(0.5); }
}

</style>
</head>

<body>

<!-- 🔥 Social Menu -->
<div class="social">

<!-- فيسبوك -->

</a>

</svg>
</a>

</div>
