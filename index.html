<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الظلال</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}
</style>

</head>
<body>

<canvas id="bg"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

/* إعداد */
const renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("bg"),
    antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

/* كاميرا */
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

/* إضاءة قوية */
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light1 = new THREE.PointLight(0xff0000, 3);
light1.position.set(5, 5, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0x8000ff, 3);
light2.position.set(-5, 5, 5);
scene.add(light2);

/* متغيرات الأبواب */
let doorL = null;
let doorR = null;

/* تحميل الموديل */
const loader = new GLTFLoader();

loader.load(
    "ALBOMS/3D/GLB/بوابة_العبور.glb",

    (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 🔥 تكبير وضبط
        model.scale.set(2, 2, 2);
        model.position.set(0, -1, 0);

        // 🔍 طباعة كل الأسماء (مهم)
        model.traverse((child) => {
            console.log("Object:", child.name);

            if (child.name.includes("Door_L")) {
                doorL = child;
            }

            if (child.name.includes("Door_R")) {
                doorR = child;
            }
        });

        // 🎯 ضبط الكاميرا تلقائيًا
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3()).length();

        camera.position.set(center.x, center.y + 1, size * 1.2);
        camera.lookAt(center);
    },

    undefined,

    (error) => {
        console.error("❌ فشل تحميل الموديل:", error);
        alert("الموديل لم يتحمل! تأكد من المسار أو شغل الموقع عبر سيرفر.");
    }
);

/* حركة */
let time = 0;

function animate() {
    requestAnimationFrame(animate);

    time += 0.02;

    // خلفية
    const r = Math.sin(time) * 0.5 + 0.5;
    const b = Math.cos(time) * 0.5 + 0.5;
    renderer.setClearColor(new THREE.Color(r, 0, b));

    // حركة الأبواب
    if (doorL && doorR) {
        doorL.rotation.y = -Math.sin(time) * 1.2;
        doorR.rotation.y = Math.sin(time) * 1.2;
    }

    renderer.render(scene, camera);
}

animate();

/* ريسبونس */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
