<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Shadow Gate</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #3a0000, #000);
    font-family: Tahoma;
}

/* شاشة الدخول */
#lockScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 10px;
}

input {
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #111;
    color: white;
    text-align: center;
    width: 200px;
}

button {
    padding: 10px 20px;
    background: darkred;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#msg {
    color: red;
}

/* المشهد */
#scene {
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="lockScreen">
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="checkPass()">OK</button>
    <div id="msg"></div>
</div>

<!-- 3D -->
<div id="scene"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let doorLeft, doorRight;

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("scene").appendChild(renderer.domElement);

    // 🔥 إضاءة قوية
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 5, 5);
    scene.add(light);

    const loader = new THREE.GLTFLoader();

    loader.load(
        "ALBOMS/3D/GLB/gate_renamed.glb",

        function(gltf) {

            scene.add(gltf.scene);

            // 🔥 نجيب أجزاء الباب
            doorLeft = gltf.scene.getObjectByName("Door_Left");
            doorRight = gltf.scene.getObjectByName("Door_Right");

            // 🔥 ضبط مكان الباب
            gltf.scene.scale.set(2,2,2);
            gltf.scene.position.set(0,-1,0);

            animate();
        }
    );

    camera.position.z = 4;
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

init();

/* =========================
   كلمة السر + زر OK
========================= */
function checkPass() {

    const pass = document.getElementById("pass").value;
    const msg = document.getElementById("msg");

    if (pass === "shadow") {

        msg.innerText = "✔ Opening Gate...";

        setTimeout(() => {
            document.getElementById("lockScreen").style.display = "none";
            openDoor();
        }, 800);

    } else {
        msg.innerText = "❌ Wrong Password";
    }
}

/* =========================
   فتح الباب الحقيقي
========================= */
function openDoor() {

    let t = 0;

    function anim() {

        t += 0.02;

        // 🔥 فتح الباب يمين ويسار
        if (doorLeft) {
            doorLeft.position.x = -t * 1.5;
            doorLeft.rotation.y = t;
        }

        if (doorRight) {
            doorRight.position.x = t * 1.5;
            doorRight.rotation.y = -t;
        }

        if (t < 1) {
            requestAnimationFrame(anim);
        }
    }

    anim();
}

</script>

</body>
</html>
