<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

/* ===== BODY ===== */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
overflow:hidden;
cursor:none;
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:12px;
height:12px;
background:#00eaff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 15px #00eaff;
z-index:9999;
}

/* ===== STARS ===== */
.stars{
position:fixed;
inset:0;
background:url('https://i.imgur.com/7b1eZ.png');
opacity:0.2;
animation:moveStars 60s linear infinite;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* ===== CONTAINER ===== */
.container{
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:1200px;
padding:20px;
}

/* ===== LOGO ===== */
.logo{
width:250px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px #00eaff);
}

/* ===== MENU ===== */
.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:100%;
}

/* ===== BUTTON ===== */
.btn{
position:relative;
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
overflow:hidden;

opacity:0;
transform:translateY(40px);
animation:fadeUp 0.8s ease forwards;
}

/* Glow فاخر */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00eaff;
}

/* نص */
.btn span{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:#00eaff;
font-weight:bold;
text-shadow:0 0 10px #00eaff;
}

/* دخول */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== POPUP ===== */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.5s;
z-index:999;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

/* BOX */
.popup-box{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px #00eaff;
}

/* TITLE */
.popup-box h2{
color:#00eaff;
margin-bottom:15px;
}

/* TEXT */
.popup-box p{
color:#aaa;
margin-bottom:20px;
}

/* BUTTON */
.popup-box button{
padding:10px 20px;
border:none;
background:#00eaff;
cursor:pointer;
border-radius:10px;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="stars"></div>

<div class="container">

<img src="https://via.placeholder.com/300x100" class="logo">

<div class="menu">

<div class="btn" onclick="openMenu('أنمي')" style="background-image:url('https://picsum.photos/300?1')"><span>أنمي</span></div>

<div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('https://picsum.photos/300?2')"><span>فضائح عصابات</span></div>

<div class="btn" onclick="openMenu('قوانين')" style="background-image:url('https://picsum.photos/300?3')"><span>قوانين</span></div>

<div class="btn" onclick="openMenu('أعضاء')" style="background-image:url('https://picsum.photos/300?4')"><span>أعضاء</span></div>

<div class="btn" onclick="openMenu('الظلال')" style="background-image:url('https://picsum.photos/300?5')"><span>أسماء الظلال</span></div>

<div class="btn" onclick="openMenu('تحميل')" style="background-image:url('https://picsum.photos/300?6')"><span>تحميل</span></div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h2 id="popupTitle"></h2>
<p>الظلال تتربص في ظلال</p>
<button onclick="closeMenu()">إغلاق</button>
</div>
</div>

<script>

/* ===== CURSOR ===== */
let cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* ===== OPEN MENU ===== */
function openMenu(title){
document.getElementById("popupTitle").innerText = title;
document.getElementById("popup").classList.add("active");
}

/* ===== CLOSE ===== */
function closeMenu(){
document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
