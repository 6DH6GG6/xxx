<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:url('ALBOMS/IMAGE/SiteBackground/file_0000000089e071f8b71e687d9cf82965.png') center/cover no-repeat;
color:white;
overflow-x:hidden;
cursor:none;
}

/* المؤشر */
.cursor{
position:fixed;
width:10px;
height:10px;
background:#00eaff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 12px #00eaff;
z-index:9999;
}

/* النجوم */
.stars{
position:fixed;
inset:0;
background:url('ALBOMS/IMAGE/GIF/866f30792413dcb70ce06c91c1ad3f4e.gif');
opacity:0.18;
animation:moveStars 60s linear infinite;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* لوقو */
.logo{
width:clamp(180px,45vw,420px);
margin:15px 0;
filter:drop-shadow(0 0 25px #00eaff);
z-index:2;
}

/* القائمة */
.container{
z-index:2;
width:100%;
max-width:1100px;
padding:10px;
}

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
aspect-ratio:4/3;
background-size:cover;
background-position:center;
cursor:pointer;
clip-path:polygon(15% 0%,85% 0%,100% 100%,0% 100%);
transition:0.3s ease;
box-shadow:0 0 10px rgba(0,234,255,0.15);
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 25px #00eaff;
}

/* صفحة القائمة */
.menu-page{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
backdrop-filter:blur(6px);
z-index:9999;
display:flex;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:0.35s ease;
}

.menu-page.active{
opacity:1;
pointer-events:auto;
}

.menu-header{
background:linear-gradient(90deg,#8b0000,#ff1a1a);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.menu-header button{
background:#000;
color:#00eaff;
border:none;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.menu-header button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00eaff;
}

.menu-content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
text-align:center;
padding:20px;
}

/* زر الخروج (شريط كامل) */
.exit-popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:85px;
background:linear-gradient(90deg,#00eaff,#0066ff);
display:flex;
justify-content:center;
align-items:center;
z-index:10000;
opacity:0;
pointer-events:none;
transition:0.3s ease;
box-shadow:0 0 25px rgba(0,234,255,0.4);
}

.exit-popup.active{
opacity:1;
pointer-events:auto;
}

.exit-box{
display:flex;
gap:25px;
align-items:center;
}

.exit-box h2{
color:black;
font-size:18px;
font-weight:bold;
}

.exit-box button{
padding:10px 45px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.exit-box button:first-child{
background:#ff0033;
color:white;
}

.exit-box button:first-child:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff0033;
}

.exit-box button:last-child{
background:#000;
color:#00eaff;
}

.exit-box button:last-child:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00eaff;
}
</style>
</style>
</head>
<body>

<div class="exit-popup" id="exitPopup">
  <div class="exit-box">
    <h2>هل تريد الخروج؟</h2>
    <div class="exit-buttons">
      <button onclick="confirmExit()">نعم</button>
      <button onclick="closeExit()">لا</button>
    </div>
  </div>
</div>

<div class="menu-page" id="menuPage">
  <div class="menu-header">
    <h2 id="menuTitle"></h2>
    <button onclick="closeMenuPage()">رجوع</button>
  </div>

  <div class="menu-content">
    <p id="menuDesc"></p>
  </div>
</div>

<div class="cursor" id="cursor"></div>

<div class="stars"></div>

<img src="ALBOMS/IMAGE/PNG/20260429_130547.png" class="logo">

<div class="frame-box">
  <img src="ALBOMS/IMAGE/GIF/how-to-create-a-light-streak-animation-in-after-effects.gif" class="frame-gif">
  <div class="frame-text">
    <span>☠ الظلال تتربص في الظلام ☠</span>
  </div>
</div>

<div class="container">
  <div class="menu">
    <div class="btn" onclick="openMenu('أنمي')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155749.png')"></div>
    <div class="btn" onclick="openMenu('فضائح عصابات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160952.png')"></div>
    <div class="btn" onclick="openMenu('قوانين الدعس')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_155319.png')"></div>
    <div class="btn" onclick="openMenu('ترسيم أعضاء')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160315.png')"></div>
    <div class="btn" onclick="openMenu('أسماء الظلال')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_160850.png')"></div>
    <div class="btn" onclick="openMenu('تحميل ملفات')" style="background-image:url('ALBOMS/IMAGE/PicturesOfButtons/20260426_154329.png')"></div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupTitle"></h2>
    <p>الظلال تتربص في ظلام</p>
    <button onclick="closeMenu()">إغلاق</button>
  </div>
</div>

<script>
let cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

let menuData = {
  "أنمي": "قسم الأنمي",
  "فضائح عصابات": "أرشيف الفضائح",
  "قوانين الدعس": "قوانين الطائفة",
  "ترسيم أعضاء": "نظام الترسيم",
  "أسماء الظلال": "قائمة الظلال",
  "تحميل ملفات": "قسم التحميل"
};

let menuOpen = false;

function openMenu(title) {
  menuOpen = true;
  document.getElementById("menuTitle").innerText = title;
  document.getElementById("menuDesc").innerText = menuData[title] || "لا يوجد محتوى";
  document.getElementById("menuPage").classList.add("active");
  history.pushState({ page: "menu" }, "");
}

function closeMenuPage() {
  menuOpen = false;
  document.getElementById("menuPage").classList.remove("active");
}

function closeMenu() {
  document.getElementById("popup").classList.remove("active");
}

window.addEventListener("popstate", function () {
  if (menuOpen) {
    closeMenuPage();
  } else {
    document.getElementById("exitPopup").classList.add("active");
  }
});

let frameTexts = [
  "♦𖤐طائفة الظلام، يعود تاريخ تأسيس المملكة في عام 2019𖤐♦",
  "♠👁لدينا أعين في كل مكان نحن الظلال نتربص في ظلام👁♠",
  "👑نخب الزوار الكرام 🥂 حتا لو كانو من لخصوم نشارك النخب تواضعًا👑"
];

let frameIndex = 0;
let frameSpan = document.querySelector(".frame-text span");

if (frameSpan) {
  setInterval(() => {
    frameIndex = (frameIndex + 1) % frameTexts.length;
    frameSpan.innerText = frameTexts[frameIndex];
  }, 4000);
}

document.addEventListener("click", function (e) {
  let ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = e.clientX + "px";
  ripple.style.top = e.clientY + "px";
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
});

function confirmExit() {
  window.close();
}

function closeExit() {
  document.getElementById("exitPopup").classList.remove("active");
}
</script>

</body>
</html>
