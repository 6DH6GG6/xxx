<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kage No Teio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('Background/file_000000004fc871f5bf5a65f2f5d3cf7d.png') center/cover no-repeat;
overflow:hidden;
color:white;
}

/* 🔥 طبقة احترافية (Blur + Glow) */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
backdrop-filter:blur(4px);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* ===== اللوقو ===== */
.logo{
width:380px;
margin-bottom:30px;
filter:drop-shadow(0 0 35px #00eaff);
animation:fadeDown 1s ease;
}

/* ===== الشبكة ===== */
.menu{
display:grid;
grid-template-columns:repeat(3, 240px);
grid-template-rows:repeat(2, 200px);
gap:30px;
justify-content:center;
}

/* ===== الأزرار ===== */
.btn{
width:240px;
height:200px;

background-size:contain;
background-repeat:no-repeat;
background-position:center;

cursor:pointer;
transition:0.35s;

border:none;
background-color:transparent;

filter:drop-shadow(0 10px 25px rgba(0,0,0,0.7));

/* دخول */
animation:fadeUp 1s ease;
}

/* 🔥 تأثير احترافي */
.btn:hover{
transform:scale(1.12);
filter:drop-shadow(0 0 35px #00eaff);
}

/* 🔥 glow إضافي */
.btn::after{
content:"";
position:absolute;
inset:0;
border-radius:10px;
box-shadow:0 0 0px transparent;
transition:0.3s;
}

.btn:hover::after{
box-shadow:0 0 25px #00eaff;
}

/* نزول الصف الثاني */
.menu .btn:nth-child(4),
.menu .btn:nth-child(5),
.menu .btn:nth-child(6){
margin-top:40px;
}

/* ===== أنيميشن ===== */
@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== استجابة ===== */
@media (max-width: 900px){
.menu{ transform:scale(0.8); }
.logo{ transform:scale(0.8); }
}

@media (max-width: 600px){
.menu{ transform:scale(0.65); }
.logo{ transform:scale(0.65); }
}

@media (max-width: 400px){
.menu{ transform:scale(0.5); }
.logo{ transform:scale(0.5); }
}

</style>
</head>

<body>

<!-- اللوقو -->
<img src="Developers/file_0000000066f471f7a9d478b981699827.png" class="logo">

<!-- القائمة -->
<div class="menu">

<div class="btn" onclick="go('background.html')" style="background-image:url('Pictures/20260426_155749.png')"></div>

<div class="btn" onclick="go('developers.html')" style="background-image:url('Pictures/20260426_160952.png')"></div>

<div class="btn" onclick="go('pictures.html')" style="background-image:url('Pictures/20260426_155319.png')"></div>

<div class="btn" onclick="go('team.html')" style="background-image:url('Pictures/20260426_160315.png')"></div>

<div class="btn" onclick="go('arena.html')" style="background-image:url('Pictures/20260426_160850.png')"></div>

<div class="btn" onclick="go('training.html')" style="background-image:url('Pictures/20260426_154329.png')"></div>

</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
