<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;

/* خلفية الكمبيوتر */
background:url('file_0000000089e071f8b71e687d9cf82965.png') no-repeat center center fixed;
background-size:cover;
padding:20px;
}

/* شعار */
.logo{
width:180px;
max-width:90%;
margin-bottom:10px;
}

h1{
font-size:50px;
color:#d80000;
text-shadow:0 0 15px red;
}

h2{
font-size:24px;
margin-bottom:30px;
color:#ddd;
}

/* شبكة الأزرار */
.menu{
display:grid;
grid-template-columns:repeat(3, 220px);
gap:0;
row-gap:14px;
justify-content:center;
}

/* الزر */
.item{
display:flex;
flex-direction:column;
align-items:center;
margin-top:0;
}

/* المثلث */
.btn{
width:220px;
height:190px;
background:url('btn.png') no-repeat center center;
background-size:100% 100%;
clip-path:polygon(50% 0%,100% 100%,0% 100%);
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 15px red);
}

/* الصف الثاني مقلوب */
.down .btn{
clip-path:polygon(0 0,100% 0,50% 100%);
}

/* رفع الصف الثاني */
.down{
margin-top:-45px;
}

/* الاسم تحت الزر */
.name{
margin-top:8px;
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px red;
}

/* الهاتف */
@media(max-width:768px){

body{
/* خلفية الهاتف */
background:url('file_00000000bb7c71fda234bb3f16d6a03f.png') no-repeat center center fixed;
background-size:cover;
}

.logo{
width:130px;
}

h1{
font-size:32px;
}

h2{
font-size:18px;
margin-bottom:20px;
}

.menu{
grid-template-columns:repeat(3, 105px);
row-gap:8px;
}

.item{
margin-top:0;
}

.btn{
width:105px;
height:92px;
}

.down{
margin-top:-18px;
}

.name{
font-size:11px;
margin-top:5px;
}
}
</style>
</head>
<body>

<img src="logo.png" class="logo">

<h1>KAGE NO TEIO</h1>
<h2>(SHADOW)</h2>

<div class="menu">

<div class="item">
<div class="btn"></div>
<div class="name">قاعدة بيانات</div>
</div>

<div class="item">
<div class="btn"></div>
<div class="name">تحميل ملفات</div>
</div>

<div class="item">
<div class="btn"></div>
<div class="name">جميع أسماء الأعضاء</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">تسجيل الإنضمام</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">فضائح عصابات</div>
</div>

<div class="item down">
<div class="btn"></div>
<div class="name">قوانين الدعس</div>
</div>

</div>

</body>
</html>
