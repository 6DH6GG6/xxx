<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Door Gate</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Tahoma;
}

/* شاشة الدخول */
#lockScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #000, #100010);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

input {
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #111;
    color: white;
    text-align: center;
}

#msg {
    color: red;
    margin-top: 10px;
    font-size: 14px;
}

/* طبقة 3D */
#scene {
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<!-- شاشة القفل -->
<div id="lockScreen">
    <input type="password" id="pass" placeholder="Enter Password">
    <div id="msg"></div>
</div>

<!-- المشهد -->
<div id="scene"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer;
let door;

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("scene").appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));

    const loader = new THREE.GLTFLoader();

    loader.load(
        "ALBOMS/3D/GLB/gate_renamed.glb", // غيّر المسار إذا تريد
        function(gltf) {
            scene.add(gltf.scene);
            door = gltf.scene;
            animate();
        }
    );

    camera.position.z = 3;
}

function animate() {
    requestAnimationFrame(animate);

    if (door) {
        door.rotation.y += 0.002; // حركة خفيفة
    }

    renderer.render(scene, camera);
}

init();

/* =========================
   كلمة السر
========================= */
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");
const lock = document.getElementById("lockScreen");

pass.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {

        if (pass.value === "shadow") {

            // فتح الباب
            lock.style.opacity = "0";
            lock.style.transition = "1s";

            setTimeout(() => {
                lock.style.display = "none";
                openDoor();
            }, 1000);

        } else {
            msg.innerText = "Wrong Password";
        }
    }
});

/* =========================
   فتح الباب
========================= */
function openDoor() {

    if (!door) return;

    let left = door.position.x - 1.5;
    let right = door.position.x + 1.5;

    let t = 0;

    function animateDoor() {
        t += 0.02;

        door.rotation.y += 0.02;
        door.position.z += 0.02;

        if (t < 2) {
            requestAnimationFrame(animateDoor);
        }
    }

    animateDoor();
}
</script>

</body>
</html>
