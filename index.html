<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Tahoma; }
        body { min-height: 100vh; background: #000; color: white; overflow: hidden; }

        @keyframes doorAppear {
            0% { opacity: 0; filter: blur(20px) brightness(0); transform: scale(0.8); }
            100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; filter: blur(20px); }
            50% { opacity: 0.6; filter: blur(30px); }
        }

        @keyframes whiteFlashExpand {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        @keyframes formShow {
            0% { opacity: 0; transform: translateY(50px) scale(0.8); filter: blur(10px); }
            60% { opacity: 1; transform: translateY(-10px) scale(1.05); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .door-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: doorAppear 2s ease-out forwards;
        }

        .door-bg {
            position: absolute;
            inset: 0;
            background: url('ALBOMS/IMAGE/SiteBackground/file_000000006e2c722f9a965efdf432912b.png') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.3);
            pointer-events: none;
        }

        .door-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 80vh;
            background: radial-gradient(ellipse, rgba(255,0,0,0.6) 0%, transparent 70%);
            z-index: 2;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        #doorCanvas {
            width: 100%;
            height: 100%;
            display: block;
            z-index: 3;
            position: relative;
            cursor: pointer;
        }

        .click-hint {
            position: absolute;
            top: 20%;
            color: #ff0000;
            font-size: 18px;
            text-shadow: 0 0 15px #ff0000;
            z-index: 10001;
            pointer-events: none;
        }

        .gate-form-box {
            position: absolute;
            bottom: 12%;
            width: 400px;
            background: linear-gradient(135deg, rgba(40,0,0,0.98), rgba(0,0,0,0.98));
            border: 3px solid #ff0000;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(255,0,0,0.8), inset 0 0 20px rgba(255,0,0,0.2);
            z-index: 10002;
            cursor: default;
            display: none;
        }

        .gate-form-box.active {
            display: block;
            animation: formShow 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gate-form-title {
            color: #ff0000;
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff0000;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 30px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255,0,0,0.6);
        }

        .close-btn:hover {
            background: #ff3030;
            transform: scale(1.1);
        }

        .gate-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 2px solid #ff0000;
            border-radius: 8px;
            outline: none;
            background: rgba(0,0,0,0.9);
            color: #fff;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(255,0,0,0.3), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .gate-input::placeholder { color: #ff6666; }

        .gate-options-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #ff0000;
            border-radius: 8px;
            background: rgba(60,0,0,0.8);
            color: #ff0000;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .gate-options-btn:hover {
            background: rgba(255,0,0,0.3);
            box-shadow: 0 0 25px rgba(255,0,0,0.6);
        }

        .gate-options-list {
            max-height: 0;
            overflow: hidden;
            transition: 0.4s ease;
            margin-bottom: 12px;
        }

        .gate-options-list.show { max-height: 120px; }

        .gate-option {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff0000;
            border-radius: 6px;
            color: #ff9999;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            font-size: 14px;
        }

        .gate-option:hover,.gate-option.selected {
            background: rgba(255,0,0,0.4);
            color: white;
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
            text-shadow: 0 0 10px #ff0000;
        }

        .gate-submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        .gate-submit-btn:hover {
            background: linear-gradient(135deg, #ff3030, #ff0000);
            box-shadow: 0 0 35px #ff0000;
            transform: scale(1.03);
        }

        .white-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            background: #fff;
            border-radius: 50%;
            z-index: 10003;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        .white-flash.active { animation: whiteFlashExpand 1.2s ease-out forwards; }

        #mainSite {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            color: white;
            font-size: 30px;
            justify-content: center;
            align-items: center;
        }
        #mainSite.active { display: flex; }
    </style>
</head>
<body>
    <div class="white-flash" id="whiteFlash"></div>

    <div class="door-screen" id="doorScreen">
        <div class="door-bg"></div>
        <div class="door-glow"></div>
        <canvas id="doorCanvas"></canvas>
        <div class="click-hint">اضغط على الباب</div>

        <div class="gate-form-box" id="gateFormBox">
            <button class="close-btn" onclick="hideForm()">×</button>
            <div class="gate-form-title">☠ بوابة الظلال ☠</div>
            <input type="text" class="gate-input" id="visitorName" placeholder="اسم الدخيل *">
            <input type="password" class="gate-input" id="passInput" placeholder="كلمة السر *">
            <button class="gate-options-btn" onclick="toggleOptions()">⚔️ من أي مصدر قادم انت</button>
            <div class="gate-options-list" id="optionsList">
                <div class="gate-option" data-value="dark">انا من طائفة الظلام</div>
                <div class="gate-option" data-value="new">انا فقط جديد اود الانضمام للمملكة والخضوع لها</div>
            </div>
            <button class="gate-submit-btn" onclick="submitGateForm()">دخول المملكة</button>
        </div>
    </div>

    <audio id="doorSound" src="ALBOMS/AUDIOS/MP3/screen-20260502-213818.mp3"></audio>

    <div id="mainSite">تم الدخول بنجاح 👑</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const doorCanvas = document.getElementById("doorCanvas");
        const gateFormBox = document.getElementById("gateFormBox");
        const whiteFlash = document.getElementById("whiteFlash");
        const mainSite = document.getElementById("mainSite");
        const doorSound = document.getElementById("doorSound");
        const optionsList = document.getElementById("optionsList");

        let doorL = null, doorR = null;
        let scene, camera, renderer, model;
        let doorOpening = false;
        let doorOpenProgress = 0;
        let selectedOption = null;
        let formShown = false;

        const DOOR_OPEN_SPEED = 0.0058;
        const DOOR_MAX_ANGLE = Math.PI / 1.8;

        function initThreeJS() {
            renderer = new THREE.WebGLRenderer({
                canvas: doorCanvas,
                antialias: true,
                alpha: true
            });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const pointLight = new THREE.PointLight(0xff0000, 8, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(0, 5);
            scene.add(dirLight);

            loadGLBModel();
            doorCanvas.addEventListener('click', onDoorClick);
        }

        function loadGLBModel() {
            const loader = new GLTFLoader();
            loader.load(
                "ALBOMS/3D/GLB/بوابة_العبور.glb",
                (gltf) => {
                    model = gltf.scene;
                    scene.add(model);
                    model.scale.x = -1;

                    model.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.material = obj.material.clone();
                            obj.material.color.setHex(0xff0000);
                            obj.material.emissive = new THREE.Color(0x440000);
                            obj.material.emissiveIntensity = 0.3;
                        }
                    });

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3()).length();

                    model.position.sub(center);
                    model.position.y += size * 0.1;

                    camera.position.set(0, size * 0.35, size * 1.3);
                    camera.lookAt(0, size * 0.2, 0);

                    model.traverse((obj) => {
                        const name = obj.name.toLowerCase();
                        if (name.includes("door_l") || name.includes("left") || name.includes("l_door")) doorL = obj;
                        if (name.includes("door_r") || name.includes("right") || name.includes("r_door")) doorR = obj;
                    });

                    if (!doorL && !doorR) doorL = model;
                },
                null,
                (err) => { console.error("GLB Load Error:", err); }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            if (doorOpening && doorOpenProgress < DOOR_MAX_ANGLE) {
                doorOpenProgress += DOOR_OPEN_SPEED;
                if (doorL && doorR) {
                    doorL.rotation.y = -doorOpenProgress;
                    doorR.rotation.y = doorOpenProgress;
                } else if (doorL) {
                    doorL.rotation.y = -doorOpenProgress;
                }
            }
            renderer.render(scene, camera);
        }

        function onDoorClick(e) {
            e.stopPropagation();
            if (!formShown) {
                formShown = true;
                gateFormBox.classList.add("active");
                
                if (model) {
                    model.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.material.emissive = new THREE.Color(0xff0000);
                            obj.material.emissiveIntensity = 0.6;
                        }
                    });
                }
            }
        }

        window.hideForm = function() {
            gateFormBox.classList.remove("active");
            formShown = false;
            
            if (model) {
                model.traverse((obj) => {
                    if (obj.isMesh) {
                        obj.material.emissive = new THREE.Color(0x440000);
                        obj.material.emissiveIntensity = 0.3;
                    }
                });
            }
        }

        window.toggleOptions = function() {
            optionsList.classList.toggle("show");
        }

        document.querySelectorAll('.gate-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.gate-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedOption = this.dataset.value;
                optionsList.classList.remove("show");
            });
        });

        window.submitGateForm = function() {
            const name = document.getElementById("visitorName").value.trim();
            const pass = document.getElementById("passInput").value;

            if (!name) {
                alert("يجب ادخال اسم الدخيل");
                return;
            }

            if (!pass) {
                alert("كلمة السر إجباري");
                return;
            }

            if (!selectedOption) {
                alert("يجب تحديد من أي مصدر قادم انت");
                return;
            }

            if (pass === "الظلال666") {
                enterKingdom();
            } else {
                alert("كلمة السر خاطئة - مرفوض");
            }
        }

        function enterKingdom() {
            hideForm();
            doorSound.currentTime = 0;
            doorSound.play().catch(() => {});
            setTimeout(() => { doorOpening = true; }, 300);
            setTimeout(() => { whiteFlash.classList.add("active"); }, 4200);
            setTimeout(() => {
                document.getElementById("doorScreen").style.display = "none";
                mainSite.classList.add("active");
            }, 5400);
        }

        document.getElementById("passInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") submitGateForm();
        });

        gateFormBox.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.addEventListener('click', (e) => {
            if (formShown && !gateFormBox.contains(e.target) && !doorCanvas.contains(e.target)) {
                hideForm();
            }
        });

        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        initThreeJS();
        animate();
    </script>
</body>
</html>
