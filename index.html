<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kage No Teio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
background:url('file_0000000089e071f8b71e687d9cf82965.png') no-repeat center center fixed;
background-size:cover;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(3px);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

/* شعار */
.logo{
width:180px;
margin-bottom:10px;
filter:drop-shadow(0 0 10px red);
}

h1{
font-size:50px;
color:#ff0000;
text-shadow:0 0 20px red, 0 0 40px #ff0000;
}

h2{
font-size:24px;
margin-bottom:30px;
color:#ccc;
}

/* الشبكة */
.menu{
display:grid;
grid-template-columns:repeat(3, 220px);
row-gap:14px;
justify-content:center;
}

/* العنصر */
.item{
display:flex;
flex-direction:column;
align-items:center;
}

/* الزر */
.btn{
width:220px;
height:190px;
background:linear-gradient(145deg,#0a0a0a,#1a0000);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
cursor:pointer;
transition:.4s;
position:relative;
overflow:hidden;
box-shadow:0 0 10px red inset, 0 0 10px red;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:15px;
}

/* نص داخل الزر */
.btn span{
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px red,0 0 20px red;
}

/* تأثير الضغط */
.btn:active{
transform:scale(1.2);
box-shadow:0 0 40px red,0 0 60px red;
}

/* الصف الثاني */
.down .btn{
clip-path:polygon(0 0,100% 0,50% 100%);
}

.down{
margin-top:-45px;
}

/* القائمة */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* زر مسدسي */
.hex{
width:180px;
height:100px;
background:red;
clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 0 20px red;
transition:.3s;
}

.hex:hover{
transform:scale(1.1);
box-shadow:0 0 40px red;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>KAGE NO TEIO</h1>
<h2>(SHADOW)</h2>

<div class="menu">

<div class="item">
<div class="btn" onclick="go('db.html')"><span>قاعدة بيانات</span></div>
</div>

<div class="item">
<div class="btn" onclick="go('files.html')"><span>تحميل ملفات</span></div>
</div>

<div class="item">
<div class="btn" onclick="openMembers()"><span>أسماء الأعضاء</span></div>
</div>

<div class="item down">
<div class="btn" onclick="openJoin()"><span>تسجيل الإنضمام</span></div>
</div>

<div class="item down">
<div class="btn" onclick="go('leaks.html')"><span>فضائح عصابات</span></div>
</div>

<div class="item down">
<div class="btn" onclick="go('rules.html')"><span>قوانين الدعس</span></div>
</div>

</div>

<!-- قائمة الأعضاء -->
<div class="overlay" id="members">
<h2>أعضاء الطائفة</h2>
</div>

<!-- قائمة التسجيل -->
<div class="overlay" id="join">
<h2>انضمام لطائفة الظلام</h2>
<div class="hex" onclick="start()">START</div>
</div>

<script>
function go(link){
event.target.closest('.btn').style.transform="scale(1.3)";
setTimeout(()=>{window.location=link},1000);
}

function openMembers(){
document.getElementById("members").style.display="flex";
}

function openJoin(){
document.getElementById("join").style.display="flex";
}

function start(){
fetch('/api/send',{
method:'POST'
});
}
</script>

</body>
</html>
